configResolveChainAndDeepRedirects=Разрешать цепочки перенаправлений
configResolveChainAndDeepRedirectsHelpTitle=Разрешать цепочки перенаправлений
configResolveChainAndDeepRedirectsHelp=Эта опция заставляет приложение разрешать цепочки плейлистов HLS и проходить более глубокие цепочки перенаправлений перед началом воспроизведения.\n\nИспользуйте её, когда поток попадает на мастер-плейлист, относительные варианты HLS или перенаправляющий шлюз, с которым плеер сам по себе справляется плохо.\n\nОставьте её выключенной, если ваши потоки уже воспроизводятся корректно без дополнительной проверки или если вам нужна минимальная задержка запуска. Включение может добавить небольшую задержку перед началом воспроизведения.
configWideViewHelpTitle=Широкий вид
configWideViewHelp=Широкий вид позволяет встроенному плееру использовать больше доступной ширины, чтобы область видео казалась менее тесной.\n\nИспользуйте его на больших экранах или если предпочитаете более просторную компоновку встроенного плеера.\n\nОставьте его выключенным в маленьких окнах или на узких экранах, где стандартная компоновка подходит лучше. Эта настройка может сделать плеер визуально шире, но не предназначена для изменения качества воспроизведения.
configEnableFfmpegHelpTitle=Транскодирование FFmpeg
configEnableFfmpegHelp=Транскодирование FFmpeg позволяет приложению перекодировать потоки через FFmpeg перед воспроизведением.\n\nИспользуйте его, когда поток нестабилен, требует преобразования формата или неправильно воспроизводится во встроенном плеере.\n\nОставьте его выключенным, если потоки уже работают нормально и вы хотите минимальную нагрузку на CPU, потому что транскодирование может быть затратным.
configEnableLitePlayerFfmpegHelpTitle=Совместимость FFmpeg для плеера Lite
configEnableLitePlayerFfmpegHelp=Совместимость FFmpeg для плеера Lite использует FFmpeg как резервный путь для потоков, с которыми прямой backend плеера Lite справляется плохо.\n\nИспользуйте её для проблемных потоков или когда плеер Lite не может надёжно начать воспроизведение.\n\nОставьте её выключенной для потоков, которые уже нормально работают напрямую, так как резервный путь может добавить нагрузку на CPU и небольшую дополнительную задержку перед воспроизведением.

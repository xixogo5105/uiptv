configResolveChainAndDeepRedirects=ری ڈائریکٹ سلسلوں کو حل کریں
configResolveChainAndDeepRedirectsHelpTitle=ری ڈائریکٹ سلسلوں کو حل کریں
configResolveChainAndDeepRedirectsHelp=یہ اختیار ایپ کو پلے بیک شروع ہونے سے پہلے HLS پلے لسٹ سلسلوں کو حل کرنے اور مزید گہرے ری ڈائریکٹ سلسلوں کا پتا لگانے دیتا ہے۔\n\nاسے تب استعمال کریں جب کوئی اسٹریم ماسٹر پلے لسٹ، relative HLS variants، یا ایسے redirecting gateway تک پہنچتی ہو جسے پلیئر خود سے اچھی طرح سنبھال نہیں پاتا۔\n\nاگر آپ کی اسٹریمز اضافی جانچ کے بغیر پہلے ہی درست چل رہی ہیں، یا آپ کم سے کم شروعاتی تاخیر چاہتے ہیں، تو اسے بند رہنے دیں۔ اسے فعال کرنے سے پلے بیک شروع ہونے سے پہلے ہلکی سی تاخیر آ سکتی ہے۔
configWideViewHelpTitle=وائیڈ ویو
configWideViewHelp=وائیڈ ویو ایمبیڈڈ پلیئر کے لے آؤٹ کو دستیاب چوڑائی کا زیادہ حصہ استعمال کرنے دیتا ہے تاکہ ویڈیو کا حصہ کم تنگ محسوس ہو۔\n\nاسے بڑی اسکرینوں پر یا تب استعمال کریں جب آپ زیادہ کھلا ہوا ایمبیڈڈ پلیئر لے آؤٹ پسند کرتے ہوں۔\n\nچھوٹی ونڈوز یا تنگ ڈسپلے پر اسے بند رکھیں، جہاں معیاری لے آؤٹ زیادہ بہتر بیٹھتا ہے۔ یہ ترتیب پلیئر کو زیادہ چوڑا محسوس کرا سکتی ہے، لیکن اس کا مقصد پلے بیک کے معیار کو بدلنا نہیں ہے۔
configEnableFfmpegHelpTitle=FFmpeg ٹرانسکوڈنگ
configEnableFfmpegHelp=FFmpeg ٹرانسکوڈنگ ایپ کو پلے بیک سے پہلے FFmpeg کے ذریعے اسٹریمز کو دوبارہ encode کرنے دیتی ہے۔\n\nاسے تب استعمال کریں جب کوئی اسٹریم غیر مستحکم ہو، format conversion درکار ہو، یا ایمبیڈڈ پلیئر میں درست نہ چل رہی ہو۔\n\nاگر اسٹریمز پہلے ہی ہموار چل رہی ہوں اور آپ کم سے کم CPU استعمال چاہتے ہوں تو اسے بند رکھیں، کیونکہ ٹرانسکوڈنگ مہنگی پڑ سکتی ہے۔
configEnableLitePlayerFfmpegHelpTitle=Lite پلیئر کے لیے FFmpeg مطابقت
configEnableLitePlayerFfmpegHelp=Lite پلیئر کے لیے FFmpeg مطابقت ایسے اسٹریمز کے لیے FFmpeg کو fallback راستے کے طور پر استعمال کرتی ہے جنہیں Lite پلیئر کا direct backend اچھی طرح سنبھال نہیں پاتا۔\n\nاسے مسئلہ دینے والی اسٹریمز کے لیے یا تب استعمال کریں جب Lite پلیئر قابلِ اعتماد طریقے سے پلے بیک شروع نہ کر پا رہا ہو۔\n\nجو اسٹریمز پہلے ہی براہِ راست ٹھیک چلتی ہیں ان کے لیے اسے بند رکھیں، کیونکہ fallback راستہ CPU خرچ اور تھوڑی اضافی پلے بیک تاخیر بڑھا سکتا ہے۔

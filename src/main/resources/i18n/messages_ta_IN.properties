configResolveChainAndDeepRedirectsHelpTitle=திருப்பிசைச் சங்கிலிகளை தீர்க்கவும்
configResolveChainAndDeepRedirectsHelp=இந்த விருப்பம் பிளேபேக்குக்கு முன் HLS பிளேலிஸ்ட் சங்கிலிகளைத் தீர்த்து, மேலும் ஆழமான திருப்பிசைச் சங்கிலிகளைப் பின்தொடர பயன்பாட்டை அனுமதிக்கிறது.\n\nஒரு ஸ்ட்ரீம் master playlist, relative HLS variant, அல்லது player தனியாக நன்றாக கையாளாத redirect gateway ஒன்றில் முடிவடையும் போது இதைப் பயன்படுத்தவும்.\n\nஉங்கள் ஸ்ட்ரீம்கள் கூடுதல் சோதனையில்லாமல் ஏற்கனவே சரியாக இயங்கினால், அல்லது குறைந்த தொடக்க தாமதம் வேண்டும் என்றால் இதை முடக்கியே விடுங்கள். இதை இயக்கினால் பிளேபேக் தொடங்குவதற்கு முன் சிறிய தாமதம் ஏற்படலாம்.
configWideViewHelpTitle=அகலக் காட்சி
configWideViewHelp=அகலக் காட்சி embedded player வடிவமைப்பை கிடைக்கும் அகலத்தின் அதிக பகுதியைப் பயன்படுத்தச் செய்கிறது, அதனால் வீடியோ பகுதி குறைவாக நெருக்கமாகத் தோன்றும்.\n\nபெரிய திரைகளில் அல்லது நீங்கள் மேலும் விசாலமான embedded player அமைப்பை விரும்பும்போது இதைப் பயன்படுத்தவும்.\n\nசிறிய சாளரங்கள் அல்லது குறுகிய திரைகளில் இதை முடக்கியே விடுங்கள்; அங்கு இயல்புநிலை அமைப்பே சிறப்பாகப் பொருந்தும். இந்த அமைப்பு player-ஐ மேலும் அகலமாகத் தோற்றமளிக்கலாம், ஆனால் இது பிளேபேக் தரத்தை மாற்றுவதற்காக அல்ல.
configEnableFfmpegHelpTitle=FFmpeg டிரான்ஸ்கோடிங்
configEnableFfmpegHelp=FFmpeg டிரான்ஸ்கோடிங் பிளேபேக்கிற்கு முன் FFmpeg மூலம் ஸ்ட்ரீம்களை மறுபடியும் encode செய்ய பயன்பாட்டை அனுமதிக்கிறது.\n\nஒரு ஸ்ட்ரீம் நிலைத்தன்மையற்றதாக இருந்தால், format conversion தேவைப்பட்டால், அல்லது embedded player-ல் சரியாக இயங்காவிட்டால் இதைப் பயன்படுத்தவும்.\n\nஸ்ட்ரீம்கள் ஏற்கனவே சரியாக இயங்கி, குறைந்த CPU பயன்பாடு வேண்டும் என்றால் இதை முடக்கியே விடுங்கள், ஏனெனில் டிரான்ஸ்கோடிங் அதிகச் செலவானதாக இருக்கலாம்.
configEnableLitePlayerFfmpegHelpTitle=Lite player-க்கான FFmpeg இணக்கம்
configEnableLitePlayerFfmpegHelp=Lite player-க்கான FFmpeg இணக்கம், Lite player-ன் direct backend நன்றாக கையாள முடியாத ஸ்ட்ரீம்களுக்கு FFmpeg-ஐ fallback பாதையாகப் பயன்படுத்துகிறது.\n\nசிக்கலான ஸ்ட்ரீம்களுக்கு அல்லது Lite player நம்பகமாக பிளேபேக் தொடங்காதபோது இதைப் பயன்படுத்தவும்.\n\nஏற்கனவே நேரடியாகச் சரியாக இயங்கும் ஸ்ட்ரீம்களுக்கு இதை முடக்கியே விடுங்கள், ஏனெனில் fallback பாதை CPU செலவையும் சிறிய கூடுதல் தாமதத்தையும் சேர்க்கலாம்.

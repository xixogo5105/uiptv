configVideoPlayersHelp=மூன்று வெளிப்புற வீடியோ பிளேயர்களை உள்ளமைத்து, UIPTV ஸ்ட்ரீம்களை எவ்வாறு திறக்கிறது என்பதைத் தேர்வுசெய்யவும்.\n\n• முதன்மை, இரண்டாம் நிலை மற்றும் மூன்றாம் நிலை பிளேயர் பாதைகள் ஒவ்வொரு டெஸ்க்டாப் பிளேயருக்கும் உண்மையான எக்ஸிகியூட் செய்யக்கூடியதாக இருக்க வேண்டும்.\n\n• தேர்ந்தெடுக்கப்பட்ட இயல்புநிலை பிளேயர் UIPTV சாதாரண பிளேபேக்கிற்கு பயன்படுத்தும் முதல் விருப்பமாகும். அந்த பிளேயர் கிடைக்கவில்லை என்றால், UIPTV மற்றொரு உள்ளமைக்கப்பட்ட விருப்பத்திற்கு திரும்பலாம்.\n\n• உட்பொதிக்கப்பட்ட பிளேயர் UIPTV க்குள் பிளேபேக்கை வைத்திருக்கிறது. பரந்த கோடெக் ஆதரவிற்கு VLC பயன்முறையைப் பயன்படுத்தவும் அல்லது இலகுவான உள்ளமைக்கப்பட்ட விருப்பத்தை நீங்கள் விரும்பும் போது லைட் பயன்முறையைப் பயன்படுத்தவும்.\n\n• உலாவியில் மட்டுமே நம்பகத்தன்மையுடன் செயல்படும் டிஆர்எம்-பாதுகாக்கப்பட்ட ஸ்ட்ரீம்கள் அல்லது சேவைகளுக்கு வெப் பிரவுசர் பிளேயர் பயனுள்ளதாக இருக்கும்.\n\n• வைட் வியூ உட்பொதிக்கப்பட்ட பிளேயர் பகுதியை பெரிதாக்குகிறது, மேலும் HLS மாஸ்டர் பிளேலிஸ்ட்கள், குறுகிய இணைப்புகள் அல்லது பல-படி வழிமாற்றுகளை வழங்குநர் பயன்படுத்தும் போது, ​​Resolve redirect chains உதவுகிறது.\n\nபிளேயர் பாதைகளை மாற்றிய பிறகு, ஒவ்வொரு பாதையும் இந்த கணினியில் சரியான பயன்பாட்டைத் தொடங்குகிறதா என்பதைச் சரிபார்க்கவும்.
configFiltersHelpTitle=பெற்றோர் பூட்டு
configFiltersHelpText=வகைகளையும் சேனல்களையும் முக்கிய வார்த்தையின் மூலம் மறைக்க மற்றும் கடவுச்சொல் மூலம் அந்த விதிகளைப் பாதுகாக்க இந்தப் பகுதியைப் பயன்படுத்தவும்.\n\n• தடுக்கப்பட்ட வகை முக்கிய வார்த்தைகள் பொருந்தும் வகைப் பெயர்களை மறைக்கின்றன.\n\n• தடுக்கப்பட்ட சேனல் முக்கிய வார்த்தைகள் பொருந்தும் சேனல் பெயர்களை மறைக்கும்.\n\n• பிற பயனர்கள் இந்த வடிப்பான்களைப் படிக்கவோ, மாற்றவோ அல்லது தற்காலிகமாக இடைநிறுத்தவோ விரும்பவில்லை என்றால், பெற்றோர் பூட்டு கடவுச்சொல்லை அமைக்கவும்.\n\n• பூட்டு செயலில் இருக்கும்போது, ​​ஸ்டாக்கர் போர்டல் தணிக்கை செய்யப்பட்டதாகக் குறிக்கும் உள்ளடக்கத்தைத் திறப்பதற்கு முன், UIPTV க்கு கடவுச்சொல் தேவைப்படும்.\n\nபரந்த முக்கிய வார்த்தைகளை கவனமாக பயன்படுத்தவும். குறுகிய அல்லது பொதுவான சொற்கள் எதிர்பார்த்ததை விட அதிகமான உள்ளடக்கத்தை மறைக்க முடியும்.
configThemeHelpTitle=தீம் மற்றும் தோற்றம்
configThemeHelp=UIPTV இன் காட்சித் தோற்றத்தைக் கட்டுப்படுத்தவும், நீங்கள் பயன்படுத்தும் திரையில் இடைமுகத்தை மாற்றியமைக்கவும் இந்தப் பகுதியைப் பயன்படுத்தவும்.\n\n• டார்க் தீம் ஒளி மற்றும் இருண்ட தட்டுகளுக்கு இடையே பயன்பாட்டை மாற்றுகிறது.\n\n• வீடியோ சிறுபடங்கள் உலாவலை மேம்படுத்தலாம், ஆனால் அவற்றை முடக்குவது காட்சி ஒழுங்கீனத்தைக் குறைக்கலாம் மற்றும் மெதுவான அமைப்புகளுக்கு உதவலாம்.\n\n• மெனுக்கள், லேபிள்கள் மற்றும் உரையாடல்களுக்கான UI மொழியை மொழி மாற்றுகிறது.\n\n• UI ஜூம் இடைமுகத்தின் அளவை மாற்றுகிறது. உயர் தெளிவுத்திறன் கொண்ட காட்சிகளில் அல்லது பெரிய கட்டுப்பாடுகள் மற்றும் உரை தேவைப்படும்போது அதை அதிகரிக்கவும்.\n\n• ஒளி மற்றும் இருண்ட CSS மேலெழுதுதல்கள் உள்ளமைக்கப்பட்ட தீமின் பகுதிகளை மாற்ற உங்களை அனுமதிக்கும். பாதுகாப்பான தொடக்கப் புள்ளியை நீங்கள் விரும்பினால், முதலில் டெம்ப்ளேட்டைப் பதிவிறக்கவும், மேலும் இயல்புநிலை தீம்க்குத் திரும்புவதற்கு மேலெழுதங்களை மீட்டமைக்கவும்.
configCacheFilteringHelpTitle=தற்காலிக சேமிப்பு மற்றும் அமர்வு தரவு
configCacheFilteringHelpText=இந்தப் பிரிவு, தற்போதைய உள்ளமைவுக்கான பெற்றோர்-பூட்டு வடிகட்டலை இடைநிறுத்துவதற்கான விருப்பத்துடன் தற்காலிக பின்னணி தரவை ஒருங்கிணைக்கிறது.\n\n• பெற்றோர் பூட்டுக் கட்டுப்பாடுகளை இடைநிறுத்துவது, தடுக்கும் விதிகளை நீக்காமல் தற்காலிகமாக முடக்குகிறது.\n\n• கேச் காலாவதியானது, பழையதாகக் கருதப்படுவதற்கு முன், பிளேபேக் தொடர்பான தற்காலிகச் சேமிப்புத் தரவு எவ்வளவு நேரம் சேமிக்கப்படுகிறது என்பதைக் கட்டுப்படுத்துகிறது.\n\n• பிளேபேக் தற்காலிகச் சேமிப்பானது தற்காலிக சேமிப்பில் உள்ள ஸ்ட்ரீம் தரவை நீக்குகிறது மற்றும் காலாவதியான அல்லது உடைந்த மீடியா பதில்களைப் பிளேபேக் தொடர்ந்து பயன்படுத்தும் போது உதவும்.\n\n• இப்போது பார்ப்பதை அழிக்கவும் வரலாறு சேமிக்கப்பட்ட செயல்பாட்டில் உள்ள பார்வை பட்டியலை நீக்குகிறது.\n\n• போர்ட்டல் பக்க தரவு மாறி, தற்போதைய உள்ளூர் கேச் காலாவதியாகும்போது கணக்குத் தரவு கேச் தற்காலிகச் சேமிப்புத் தரவைப் புதுப்பிக்கிறது.
configDatabaseSyncHelpTitle=தரவுத்தள ஒத்திசைவு
configDatabaseSyncHelpText=இறக்குமதி மற்றும் ஏற்றுமதி உங்கள் UIPTV தரவை காப்புப்பிரதிகள் அல்லது வெவ்வேறு UIPTV நிறுவல்களுக்கு இடையில் நகர்த்த அனுமதிக்கிறது.\n\n• தற்போதைய நிறுவலில் தரவுத்தள ஸ்னாப்ஷாட்டை இறக்குமதி செய்கிறது.\n\n• ஏற்றுமதி தற்போதைய தரவை உள்ளூரில் சேமிக்கக்கூடிய அல்லது மற்றொரு UIPTV நிகழ்விற்கு அனுப்பக்கூடிய ஸ்னாப்ஷாட்டிற்கு எழுதுகிறது.\n\n• ஒத்திசைவு உரையாடலில் நீங்கள் செய்யும் தேர்வுகளைப் பொறுத்து, ஒத்திசைவு ஓட்டத்தில் கணக்குகள், புக்மார்க்குகள் மற்றும் விருப்ப உள்ளமைவுத் தரவு ஆகியவை அடங்கும்.\n\n• ரிமோட் ஒத்திசைவுக்கு மற்ற இயந்திரம் அணுகக்கூடியதாக இருக்க வேண்டும் மற்றும் தரவு பரிமாற்றத்திற்கு முன் அங்கீகரிக்கப்பட வேண்டும்.\n\n• தரவுத்தள ஒத்திசைவு என்பது ஒரு வழி இணைப்பாகும். புதிய அல்லது மாற்றப்பட்ட மூலப் பதிவுகள் நகலெடுக்கப்படும், ஆனால் மூலத்திலிருந்து நீக்கப்பட்டவை தானாகப் பயன்படுத்தப்படாது.
configFfmpegAndWebServerHelpTitle=FFmpeg மற்றும் உள் வலை சேவையகம்
configFfmpegAndWebServerHelpText=ஒரு ஸ்ட்ரீமுக்கு முன் செயலாக்கம், உலாவி வழங்குதல் அல்லது UIPTV இன் உள்ளூர் இணையக் கருவிகள் மூலம் அணுகல் தேவைப்படும்போது இந்தப் பிரிவைப் பயன்படுத்தவும்.\n\n• ஸ்ட்ரீமுக்கு வடிவமைப்பு மாற்றம் தேவைப்படும்போது அல்லது சாதாரண பாதையில் நம்பகத்தன்மை இல்லாமல் இயங்கும்போது FFmpeg டிரான்ஸ்கோடிங்கை இயக்கவும்.\n\n• லைட் பிளேயருக்கான FFmpeg இணக்கத்தன்மையை இயக்கு, லைட் பிளேயர் நேரடியாகக் கையாள முடியாத ஸ்ட்ரீம்களுக்கு FFmpeg-அடிப்படையிலான ஃபால்பேக்கைச் சேர்க்கிறது.\n\n• பிரவுசர் பிளேயர், வெப் ஆப்ஸ், டிஆர்எம் ஃப்ளோக்கள் மற்றும் ரிமோட் சின்க் அம்சங்களுக்கான உள்ளூர் பின்னணி வழிகளை அக இணைய சேவையகம் வெளியிடுகிறது.\n\n• இந்த கணினியில் சர்வர் போர்ட் இலவசமாக இருக்க வேண்டும். நீங்கள் அதை மாற்றினால், உள்நாட்டில் UIPTV உடன் இணைக்கும் எல்லா இடங்களிலும் புதிய முகவரியைப் பயன்படுத்தவும்.\n\n• M3U8 பிளேலிஸ்ட்டை வெளியிடுவது, UIPTV இயங்கும் போது மற்ற பிளேயர்கள் அல்லது கருவிகள் திறக்கக்கூடிய உள்ளூர் பிளேலிஸ்ட் இறுதிப் புள்ளியை உருவாக்குகிறது.\n\nFFmpeg அம்சங்களை உங்களுக்குத் தேவையில்லாதபோது முடக்கி வைக்கவும். அவர்கள் CPU பயன்பாடு மற்றும் தொடக்க நேரத்தை அதிகரிக்க முடியும்.
configTmdbMetadataHelpTitle=TMDB மெட்டாடேட்டா
configTmdbMetadataHelpText=திரைப்படங்கள் மற்றும் தொடர்களுக்கான ரிச்சர் மெட்டாடேட்டாவை UIPTV பெற விரும்பினால், TMDB படிக்கும் அணுகல் டோக்கனை இங்கே சேர்க்கவும்.\n\n• TMDB மெட்டாடேட்டாவில் உள்ளூர்மயமாக்கப்பட்ட தலைப்புகள், அடுக்குகள், வகைகள், கலைப்படைப்பு குறிப்புகள் மற்றும் பிற விளக்கமான விவரங்கள் இருக்கலாம்.\n\n• டோக்கன் விருப்பமானது. UIPTV இன்றியும் உள்ளடக்கத்தை இயக்க முடியும், ஆனால் மெட்டாடேட்டா கவரேஜ் மிகவும் குறைவாகவே இருக்கும்.\n\n• TMDB API கணக்கை உருவாக்குவதற்கான வழிமுறைகள் தேவைப்பட்டால் வழிகாட்டி இணைப்பைப் பயன்படுத்தவும், மேலும் ஏற்கனவே உள்ள வாசிப்பு அணுகல் டோக்கனை நகலெடுக்க கணக்கு இணைப்பைப் பயன்படுத்தவும்.\n\n• மெட்டாடேட்டா முடிவுகள் தவறாகத் தெரிந்தால், டோக்கன் செல்லுபடியாகும் என்பதையும், தேர்ந்தெடுக்கப்பட்ட UI மொழி நீங்கள் எதிர்பார்க்கும் மெட்டாடேட்டா மொழியுடன் பொருந்துகிறதா என்பதையும் சரிபார்க்கவும்.\n\nடோக்கனை ஒரு தனிப்பட்ட நற்சான்றிதழாகக் கருதி, அது தற்செயலாகப் பகிரப்பட்டதாக நீங்கள் நம்பினால், அதை மாற்றவும்.

configVideoPlayersHelpTitle=Videoplayer
configVideoPlayersHelp=Konfigurieren Sie bis zu drei externe Videoplayer und wählen Sie aus, wie UIPTV Streams öffnet.\n\n• Primäre, sekundäre und tertiäre Player-Pfade sollten auf die tatsächliche ausführbare Datei für jeden Desktop-Player verweisen.\n\n• Der ausgewählte Standardplayer ist die erste Option, die UIPTV für die normale Wiedergabe verwendet. Wenn dieser Player nicht verfügbar ist, kann UIPTV auf eine andere konfigurierte Option zurückgreifen.\n\n• Der eingebettete Player sorgt dafür, dass die Wiedergabe innerhalb von UIPTV erfolgt. Verwenden Sie den VLC-Modus für eine breitere Codec-Unterstützung oder den Lite-Modus, wenn Sie eine leichtere integrierte Option wünschen.\n\n• Der Webbrowser-Player eignet sich für DRM-geschützte Streams oder Dienste, die nur in einem Browser zuverlässig funktionieren.\n\n• Wide View vergrößert den eingebetteten Player-Bereich und Resolve Redirect Chains hilft, wenn ein Anbieter HLS-Master-Playlists, Kurzlinks oder mehrstufige Weiterleitungen verwendet.\n\nÜberprüfen Sie nach dem Ändern der Player-Pfade, ob jeder Pfad die richtige Anwendung auf diesem Computer startet.
configFiltersHelpTitle=Kindersicherung
configFiltersHelpText=Verwenden Sie diesen Abschnitt, um Kategorien und Kanäle nach Schlüsselwörtern auszublenden und diese Regeln mit einem Passwort zu schützen.\n\n• Blockierte Kategorieschlüsselwörter verbergen übereinstimmende Kategorienamen.\n\n• Blockierte Kanalschlüsselwörter verbergen übereinstimmende Kanalnamen.\n\n• Legen Sie ein Kindersicherungskennwort fest, wenn Sie nicht möchten, dass andere Benutzer diese Filter lesen, ändern oder vorübergehend pausieren können.\n\n• Wenn die Sperre aktiv ist, kann UIPTV auch das Passwort anfordern, bevor es Inhalte öffnet, die das Stalker-Portal als zensiert markiert.\n\nVerwenden Sie breite Schlüsselwörter sorgfältig. Kurze oder generische Wörter können viel mehr Inhalt verbergen als erwartet.
configThemeHelpTitle=Thema und Aussehen
configThemeHelp=In diesem Abschnitt können Sie das visuelle Erscheinungsbild von UIPTV steuern und die Benutzeroberfläche an den von Ihnen verwendeten Bildschirm anpassen.\n\n• Dunkles Design schaltet die Anwendung zwischen hellen und dunklen Paletten um.\n\n• Video-Miniaturansichten können das Surfen verbessern, aber ihre Deaktivierung kann die visuelle Unordnung verringern und langsamere Systeme unterstützen.\n\n• „Sprache“ ändert die UI-Sprache für Menüs, Beschriftungen und Dialoge.\n\n• UI-Zoom ändert den Maßstab der Benutzeroberfläche. Erhöhen Sie den Wert auf hochauflösenden Displays oder wenn Sie größere Steuerelemente und Text wünschen.\n\n• Mit hellen und dunklen CSS-Überschreibungen können Sie Teile des integrierten Designs ersetzen. Laden Sie zuerst die Vorlage herunter, wenn Sie einen sicheren Ausgangspunkt wünschen, und setzen Sie die Überschreibungen zurück, um zum Standardthema zurückzukehren.
configCacheFilteringHelpTitle=Cache- und Sitzungsdaten
configCacheFilteringHelpText=Dieser Abschnitt kombiniert temporäre Wiedergabedaten mit der Option, die Kindersicherungsfilterung für die aktuelle Konfiguration anzuhalten.\n\nMit „Einschränkungen der Kindersicherung pausieren“ werden die Sperrregeln vorübergehend deaktiviert, ohne sie zu löschen.\n\n• Der Cache-Ablauf steuert, wie lange wiedergabebezogene Cache-Daten aufbewahrt werden, bevor sie als veraltet behandelt werden.\n\n• Clear Playback Cache entfernt zwischengespeicherte Stream-Daten und kann hilfreich sein, wenn bei der Wiedergabe weiterhin veraltete oder fehlerhafte Medienantworten verwendet werden.\n\n• „Jetzt ansehen-Verlauf löschen“ entfernt die gespeicherte Liste der laufenden Wiedergaben.\n\n• Kontodaten-Cache neu laden aktualisiert zwischengespeicherte Kontodaten, wenn sich portalseitige Daten geändert haben und der aktuelle lokale Cache veraltet ist.
configDatabaseSyncHelpTitle=Datenbanksynchronisierung
configDatabaseSyncHelpText=Mit Import und Export können Sie Ihre UIPTV-Daten zwischen Backups oder verschiedenen UIPTV-Installationen verschieben.\n\n• Importieren liest einen Datenbank-Snapshot in die aktuelle Installation.\n\n• Exportieren schreibt die aktuellen Daten in einen Snapshot, der lokal gespeichert oder an eine andere UIPTV-Instanz gesendet werden kann.\n\n• Der Synchronisierungsablauf kann Konten, Lesezeichen und optionale Konfigurationsdaten umfassen, je nachdem, welche Auswahl Sie im Synchronisierungsdialog treffen.\n\n• Für die Remote-Synchronisierung muss der andere Computer erreichbar und genehmigt sein, bevor Daten übertragen werden.\n\n• Die Datenbanksynchronisierung ist eine einseitige Zusammenführung. Neue oder geänderte Quelldatensätze werden kopiert, Löschungen aus der Quelle werden jedoch nicht automatisch angewendet.
configFfmpegAndWebServerHelpTitle=FFmpeg und interner Webserver
configFfmpegAndWebServerHelpText=Verwenden Sie diesen Abschnitt, wenn ein Stream eine Vorverarbeitung, Browserbereitstellung oder Zugriff über die lokalen Webtools von UIPTV benötigt.\n\n• Aktivieren Sie die FFmpeg-Transkodierung, wenn ein Stream eine Formatkonvertierung benötigt oder unzuverlässig im normalen Pfad abgespielt wird.\n\n• „FFmpeg-Kompatibilität für Lite Player aktivieren“ fügt einen FFmpeg-basierten Fallback für Streams hinzu, die der Lite Player nicht direkt verarbeiten kann.\n\n• Der interne Webserver veröffentlicht lokale Wiedergaberouten für den Browser-Player, die Web-App, DRM-Flows und Remote-Synchronisierungsfunktionen.\n\n• Der Server-Port muss auf dieser Maschine frei sein. Wenn Sie sie ändern, verwenden Sie die neue Adresse überall dort, wo eine lokale Verbindung zu UIPTV hergestellt wird.\n\n• „M3U8-Playlist veröffentlichen“ generiert einen lokalen Playlist-Endpunkt, den andere Player oder Tools öffnen können, während UIPTV ausgeführt wird.\n\nDeaktivieren Sie die FFmpeg-Funktionen, wenn Sie sie nicht benötigen. Sie können die CPU-Auslastung und die Startzeit erhöhen.
configTmdbMetadataHelpTitle=TMDB-Metadaten
configTmdbMetadataHelpText=Fügen Sie hier ein TMDB-Lesezugriffstoken hinzu, wenn Sie möchten, dass UIPTV umfangreichere Metadaten für Filme und Serien abruft.\n\n• TMDB-Metadaten können lokalisierte Titel, Handlungsstränge, Genres, Bildreferenzen und andere beschreibende Details umfassen.\n\n• Der Token ist optional. UIPTV kann weiterhin Inhalte ohne diese Funktion abspielen, die Metadatenabdeckung wird jedoch eingeschränkter sein.\n\n• Verwenden Sie den Leitfaden-Link, wenn Sie Anweisungen zum Erstellen eines TMDB-API-Kontos benötigen, und verwenden Sie den Kontolink, um ein vorhandenes Lesezugriffstoken zu kopieren.\n\n• Wenn die Metadatenergebnisse falsch aussehen, überprüfen Sie, ob das Token gültig ist und ob die ausgewählte UI-Sprache mit der erwarteten Metadatensprache übereinstimmt.\n\nBehandeln Sie das Token wie einen privaten Zugangsdatensatz und ersetzen Sie ihn, wenn Sie glauben, dass er versehentlich weitergegeben wurde.

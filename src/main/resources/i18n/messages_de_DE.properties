configResolveChainAndDeepRedirects=Weiterleitungsketten auflösen
configResolveChainAndDeepRedirectsHelpTitle=Weiterleitungsketten auflösen
configResolveChainAndDeepRedirectsHelp=Diese Option veranlasst die App, HLS-Playlist-Ketten aufzulösen und tiefere Weiterleitungsketten vor der Wiedergabe zu verfolgen.\n\nVerwenden Sie sie, wenn ein Stream auf einer Master-Playlist, relativen HLS-Varianten oder einem weiterleitenden Gateway landet, das der Player allein nicht gut verarbeitet.\n\nLassen Sie sie deaktiviert, wenn Ihre Streams bereits ohne zusätzliche Prüfung korrekt laufen oder wenn Sie die geringstmögliche Startverzögerung möchten. Das Aktivieren kann die Wiedergabe leicht verzögern.
configWideViewHelpTitle=Breite Ansicht
configWideViewHelp=Die breite Ansicht nutzt mehr der verfügbaren Breite für das eingebettete Player-Layout, sodass der Videobereich weniger beengt wirkt.\n\nVerwenden Sie sie auf größeren Bildschirmen oder wenn Sie ein großzügigeres Layout für den eingebetteten Player bevorzugen.\n\nLassen Sie sie in kleinen Fenstern oder auf schmalen Displays deaktiviert, wo das Standardlayout besser passt. Diese Einstellung kann den Player breiter wirken lassen, soll aber die Wiedergabequalität nicht verändern.
configEnableFfmpegHelpTitle=FFmpeg-Transkodierung
configEnableFfmpegHelp=Die FFmpeg-Transkodierung ermöglicht es der App, Streams vor der Wiedergabe über FFmpeg neu zu kodieren.\n\nVerwenden Sie sie, wenn ein Stream instabil ist, eine Formatumwandlung benötigt oder im eingebetteten Player nicht korrekt abgespielt wird.\n\nLassen Sie sie deaktiviert, wenn Streams bereits flüssig laufen und Sie die CPU-Auslastung niedrig halten möchten, denn Transkodierung kann aufwendig sein.
configEnableLitePlayerFfmpegHelpTitle=FFmpeg-Kompatibilität für Lite-Player
configEnableLitePlayerFfmpegHelp=Die FFmpeg-Kompatibilität für den Lite-Player nutzt FFmpeg als Fallback-Pfad für Streams, die das direkte Lite-Backend nicht gut verarbeiten kann.\n\nVerwenden Sie sie bei problematischen Streams oder wenn der Lite-Player die Wiedergabe nicht zuverlässig startet.\n\nLassen Sie sie für Streams deaktiviert, die bereits direkt funktionieren, da der Fallback zusätzliche CPU-Last und eine kleine Startverzögerung verursachen kann.

configVideoPlayersHelpTitle=వీడియో ప్లేయర్లు
configVideoPlayersHelp=మూడు బాహ్య వీడియో ప్లేయర్‌లను కాన్ఫిగర్ చేయండి మరియు UIPTV స్ట్రీమ్‌లను ఎలా తెరుస్తుందో ఎంచుకోండి.\n\n• ప్రైమరీ, సెకండరీ మరియు తృతీయ ప్లేయర్ పాత్‌లు ప్రతి డెస్క్‌టాప్ ప్లేయర్‌కు అసలు ఎక్జిక్యూటబుల్‌ను సూచించాలి.\n\n• ఎంచుకున్న డిఫాల్ట్ ప్లేయర్ సాధారణ ప్లేబ్యాక్ కోసం UIPTV ఉపయోగించే మొదటి ఎంపిక. ఆ ప్లేయర్ అందుబాటులో లేకుంటే, UIPTV మరొక కాన్ఫిగర్ చేసిన ఎంపికకు తిరిగి రావచ్చు.\n\n• ఎంబెడెడ్ ప్లేయర్ UIPTV లోపల ప్లేబ్యాక్‌ను ఉంచుతుంది. విస్తృత కోడెక్ మద్దతు కోసం VLC మోడ్‌ని ఉపయోగించండి లేదా మీకు తేలికపాటి అంతర్నిర్మిత ఎంపిక కావాలనుకున్నప్పుడు లైట్ మోడ్‌ని ఉపయోగించండి.\n\n• బ్రౌజర్‌లో మాత్రమే విశ్వసనీయంగా పని చేసే DRM-రక్షిత స్ట్రీమ్‌లు లేదా సేవలకు వెబ్ బ్రౌజర్ ప్లేయర్ ఉపయోగపడుతుంది.\n\n• వైడ్ వ్యూ ఎంబెడెడ్-ప్లేయర్ ప్రాంతాన్ని విస్తరిస్తుంది మరియు ప్రొవైడర్ HLS మాస్టర్ ప్లేజాబితాలు, షార్ట్ లింక్‌లు లేదా బహుళ-దశల మళ్లింపులను ఉపయోగించినప్పుడు రీడైరెక్ట్ చైన్‌లను పరిష్కరించడంలో సహాయపడుతుంది.\n\nప్లేయర్ పాత్‌లను మార్చిన తర్వాత, ప్రతి పాత్ ఈ మెషీన్‌లో సరైన అప్లికేషన్‌ను ప్రారంభించిందని ధృవీకరించండి.
configFiltersHelpTitle=పేరెంటల్ లాక్
configFiltersHelpText=కీవర్డ్ ద్వారా వర్గాలు మరియు ఛానెల్‌లను దాచడానికి మరియు పాస్‌వర్డ్‌తో ఆ నియమాలను రక్షించడానికి ఈ విభాగాన్ని ఉపయోగించండి.\n\n• బ్లాక్ చేయబడిన వర్గం కీలకపదాలు సరిపోలే వర్గం పేర్లను దాచిపెడతాయి.\n\n• బ్లాక్ చేయబడిన ఛానెల్ కీవర్డ్‌లు సరిపోలే ఛానెల్ పేర్లను దాచిపెడతాయి.\n\n• ఇతర వినియోగదారులు ఈ ఫిల్టర్‌లను చదవడం, మార్చడం లేదా తాత్కాలికంగా పాజ్ చేయడం వంటివి చేయకూడదనుకుంటే పేరెంటల్ లాక్ పాస్‌వర్డ్‌ను సెట్ చేయండి.\n\n• లాక్ సక్రియంగా ఉన్నప్పుడు, స్టాకర్ పోర్టల్ సెన్సార్ చేయబడినట్లు గుర్తించే కంటెంట్‌ను తెరవడానికి ముందు UIPTVకి పాస్‌వర్డ్ కూడా అవసరం కావచ్చు.\n\nవిస్తృత కీలకపదాలను జాగ్రత్తగా ఉపయోగించండి. చిన్న లేదా సాధారణ పదాలు ఊహించిన దాని కంటే ఎక్కువ కంటెంట్‌ను దాచగలవు.
configThemeHelpTitle=థీమ్ మరియు స్వరూపం
configThemeHelp=UIPTV యొక్క దృశ్య రూపాన్ని నియంత్రించడానికి మరియు మీరు ఉపయోగిస్తున్న స్క్రీన్‌కు ఇంటర్‌ఫేస్‌ను స్వీకరించడానికి ఈ విభాగాన్ని ఉపయోగించండి.\n\n• డార్క్ థీమ్ లైట్ మరియు డార్క్ ప్యాలెట్‌ల మధ్య అప్లికేషన్‌ను మారుస్తుంది.\n\n• వీడియో థంబ్‌నెయిల్‌లు బ్రౌజింగ్‌ను మెరుగుపరుస్తాయి, కానీ వాటిని నిలిపివేయడం వలన దృశ్య అయోమయాన్ని తగ్గించవచ్చు మరియు సిస్టమ్‌లు నెమ్మదించడంలో సహాయపడవచ్చు.\n\n• భాష మెనులు, లేబుల్‌లు మరియు డైలాగ్‌ల కోసం UI భాషను మారుస్తుంది.\n\n• UI జూమ్ ఇంటర్‌ఫేస్ స్థాయిని మారుస్తుంది. అధిక రిజల్యూషన్ డిస్‌ప్లేలపై లేదా మీకు పెద్ద నియంత్రణలు మరియు టెక్స్ట్ కావాలనుకున్నప్పుడు దీన్ని పెంచండి.\n\n• లైట్ మరియు డార్క్ CSS ఓవర్‌రైడ్‌లు అంతర్నిర్మిత థీమ్ యొక్క భాగాలను భర్తీ చేయడానికి మిమ్మల్ని అనుమతిస్తాయి. మీకు సురక్షితమైన ప్రారంభ స్థానం కావాలంటే ముందుగా టెంప్లేట్‌ను డౌన్‌లోడ్ చేయండి మరియు డిఫాల్ట్ థీమ్‌కి తిరిగి రావడానికి ఓవర్‌రైడ్‌లను రీసెట్ చేయండి.
configCacheFilteringHelpTitle=కాష్ మరియు సెషన్ డేటా
configCacheFilteringHelpText=ఈ విభాగం ప్రస్తుత కాన్ఫిగరేషన్ కోసం పేరెంటల్-లాక్ ఫిల్టరింగ్‌ను పాజ్ చేసే ఎంపికతో తాత్కాలిక ప్లేబ్యాక్ డేటాను మిళితం చేస్తుంది.\n\n• పేరెంటల్ లాక్ పరిమితులను పాజ్ చేయడం వలన బ్లాక్ చేసే నియమాలను తొలగించకుండా వాటిని తాత్కాలికంగా నిలిపివేస్తుంది.\n\n• ప్లేబ్యాక్-సంబంధిత కాష్ చేయబడిన డేటా పాతదిగా పరిగణించబడటానికి ముందు ఎంతసేపు ఉంచబడుతుందో కాష్ గడువు నియంత్రిస్తుంది.\n\n• ప్లేబ్యాక్ కాష్ క్లియర్ కాష్ చేయబడిన స్ట్రీమ్ డేటాను తొలగిస్తుంది మరియు ప్లేబ్యాక్ కాలం చెల్లిన లేదా విరిగిన మీడియా ప్రతిస్పందనలను ఉపయోగిస్తూనే ఉన్నప్పుడు సహాయపడుతుంది.\n\n• ఇప్పుడు చూడటం క్లియర్ చేయి చరిత్ర సేవ్ చేయబడిన ప్రోగ్రెస్ వీక్షణ జాబితాను తొలగిస్తుంది.\n\n• పోర్టల్ వైపు డేటా మారినప్పుడు మరియు ప్రస్తుత స్థానిక కాష్ గడువు ముగిసినప్పుడు ఖాతా డేటా కాష్ కాష్ చేసిన ఖాతా డేటాను రీలోడ్ చేస్తుంది.
configDatabaseSyncHelpTitle=డేటాబేస్ సమకాలీకరణ
configDatabaseSyncHelpText=దిగుమతి మరియు ఎగుమతి మీ UIPTV డేటాను బ్యాకప్‌లు లేదా విభిన్న UIPTV ఇన్‌స్టాలేషన్‌ల మధ్య తరలించడానికి మిమ్మల్ని అనుమతిస్తుంది.\n\n• దిగుమతి ప్రస్తుత ఇన్‌స్టాలేషన్‌లో డేటాబేస్ స్నాప్‌షాట్‌ను రీడ్ చేస్తుంది.\n\n• ఎగుమతి స్థానికంగా నిల్వ చేయగల లేదా మరొక UIPTV ఉదాహరణకి పంపబడే స్నాప్‌షాట్‌కి ప్రస్తుత డేటాను వ్రాస్తుంది.\n\n• సమకాలీకరణ డైలాగ్‌లో మీరు చేసే ఎంపికలను బట్టి, సమకాలీకరణ ప్రవాహం ఖాతాలు, బుక్‌మార్క్‌లు మరియు ఐచ్ఛిక కాన్ఫిగరేషన్ డేటాను కలిగి ఉంటుంది.\n\n• రిమోట్ సమకాలీకరణకు డేటాను బదిలీ చేయడానికి ముందు ఇతర యంత్రాన్ని చేరుకోవడం మరియు ఆమోదించడం అవసరం.\n\n• డేటాబేస్ సమకాలీకరణ అనేది ఒక-మార్గం విలీనం. కొత్త లేదా మార్చబడిన సోర్స్ రికార్డ్‌లు కాపీ చేయబడతాయి, కానీ మూలం నుండి తొలగింపులు స్వయంచాలకంగా వర్తించబడవు.
configFfmpegAndWebServerHelpTitle=FFmpeg మరియు అంతర్గత వెబ్ సర్వర్
configFfmpegAndWebServerHelpText=స్ట్రీమ్‌కు ప్రీప్రాసెసింగ్, బ్రౌజర్ డెలివరీ లేదా UIPTV యొక్క స్థానిక వెబ్ సాధనాల ద్వారా యాక్సెస్ అవసరమైనప్పుడు ఈ విభాగాన్ని ఉపయోగించండి.\n\n• స్ట్రీమ్‌కు ఫార్మాట్ మార్పిడి అవసరమైనప్పుడు లేదా సాధారణ మార్గంలో అవిశ్వసనీయంగా ప్లే అయినప్పుడు FFmpeg ట్రాన్స్‌కోడింగ్‌ని ప్రారంభించండి.\n\n• లైట్ ప్లేయర్ కోసం FFmpeg అనుకూలతను ప్రారంభించండి లైట్ ప్లేయర్ నేరుగా నిర్వహించలేని స్ట్రీమ్‌ల కోసం FFmpeg-ఆధారిత ఫాల్‌బ్యాక్‌ని జోడిస్తుంది.\n\n• అంతర్గత వెబ్ సర్వర్ బ్రౌజర్ ప్లేయర్, వెబ్ యాప్, DRM ఫ్లోలు మరియు రిమోట్ సమకాలీకరణ లక్షణాల కోసం స్థానిక ప్లేబ్యాక్ మార్గాలను ప్రచురిస్తుంది.\n\n• ఈ మెషీన్‌లో సర్వర్ పోర్ట్ తప్పనిసరిగా ఉచితంగా ఉండాలి. మీరు దీన్ని మార్చినట్లయితే, స్థానికంగా UIPTVకి కనెక్ట్ అయ్యే ప్రతిచోటా కొత్త చిరునామాను ఉపయోగించండి.\n\n• M3U8 ప్లేజాబితాను ప్రచురించడం అనేది UIPTV రన్ అవుతున్నప్పుడు ఇతర ప్లేయర్‌లు లేదా టూల్స్ తెరవగల స్థానిక ప్లేజాబితా ముగింపు పాయింట్‌ని ఉత్పత్తి చేస్తుంది.\n\nFFmpeg ఫీచర్‌లు మీకు అవసరం లేనప్పుడు వాటిని ఆఫ్ చేయండి. వారు CPU వినియోగం మరియు ప్రారంభ సమయాన్ని పెంచగలరు.
configTmdbMetadataHelpTitle=TMDB మెటాడేటా
configTmdbMetadataHelpText=మీరు UIPTV చలనచిత్రాలు మరియు సిరీస్‌ల కోసం రిచ్ మెటాడేటాను పొందాలనుకుంటే ఇక్కడ TMDB రీడ్ యాక్సెస్ టోకెన్‌ను జోడించండి.\n\n• TMDB మెటాడేటా స్థానికీకరించిన శీర్షికలు, ప్లాట్లు, కళా ప్రక్రియలు, కళాకృతి సూచనలు మరియు ఇతర వివరణాత్మక వివరాలను కలిగి ఉంటుంది.\n\n• టోకెన్ ఐచ్ఛికం. UIPTV ఇప్పటికీ అది లేకుండా కంటెంట్‌ను ప్లే చేయగలదు, అయితే మెటాడేటా కవరేజీ మరింత పరిమితంగా ఉంటుంది.\n\n• మీకు TMDB API ఖాతాను సృష్టించడానికి సూచనలు అవసరమైతే గైడ్ లింక్‌ని ఉపయోగించండి మరియు ఇప్పటికే ఉన్న రీడ్ యాక్సెస్ టోకెన్‌ను కాపీ చేయడానికి ఖాతా లింక్‌ని ఉపయోగించండి.\n\n• మెటాడేటా ఫలితాలు తప్పుగా అనిపిస్తే, టోకెన్ చెల్లుబాటవుతుందని మరియు ఎంచుకున్న UI భాష మీరు ఆశించే మెటాడేటా భాషతో సరిపోలుతుందని ధృవీకరించండి.\n\nటోకెన్‌ను ప్రైవేట్ క్రెడెన్షియల్ లాగా పరిగణించండి మరియు అది అనుకోకుండా షేర్ చేయబడిందని మీరు విశ్వసిస్తే దాన్ని భర్తీ చేయండి.

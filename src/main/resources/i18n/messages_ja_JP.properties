configResolveChainAndDeepRedirects=リダイレクト連鎖を解決
configResolveChainAndDeepRedirectsHelpTitle=リダイレクト連鎖を解決
configResolveChainAndDeepRedirectsHelp=このオプションを有効にすると、再生前にアプリが HLS プレイリストの連鎖を解決し、より深いリダイレクト連鎖をたどります。\n\nストリームがマスタープレイリスト、相対 HLS バリアント、またはプレイヤー単体ではうまく処理できないリダイレクトゲートウェイに到達する場合に使用してください。\n\n追加の探索なしでストリームがすでに正しく再生される場合や、起動遅延を最小にしたい場合は無効のままにしてください。有効にすると、再生開始前にわずかな遅延が発生することがあります。
configWideViewHelpTitle=ワイド表示
configWideViewHelp=ワイド表示を使うと、埋め込みプレイヤーのレイアウトが利用可能な横幅をより多く使うため、動画エリアの窮屈さが減ります。\n\n大きな画面で使う場合や、よりゆったりした埋め込みプレイヤーのレイアウトを好む場合に使用してください。\n\n小さなウィンドウや幅の狭い画面では、標準レイアウトの方が収まりやすいため無効のままにしてください。この設定でプレイヤーは横に広く見えるようになりますが、再生品質を変更するものではありません。
configEnableFfmpegHelpTitle=FFmpeg トランスコード
configEnableFfmpegHelp=FFmpeg トランスコードを使うと、再生前にアプリが FFmpeg 経由でストリームを再エンコードできます。\n\nストリームが不安定な場合、形式変換が必要な場合、または埋め込みプレイヤーで正しく再生できない場合に使用してください。\n\nストリームがすでに問題なく再生され、CPU 使用量をできるだけ抑えたい場合は無効のままにしてください。トランスコードは負荷が高くなることがあります。
configEnableLitePlayerFfmpegHelpTitle=Lite プレイヤー用 FFmpeg 互換
configEnableLitePlayerFfmpegHelp=Lite プレイヤー用 FFmpeg 互換は、Lite プレイヤーの直接バックエンドではうまく扱えないストリームに対して、FFmpeg をフォールバック経路として使用します。\n\n問題のあるストリームや、Lite プレイヤーが安定して再生を開始できない場合に使用してください。\n\nすでに直接再生できるストリームでは無効のままにしてください。フォールバック経路により CPU 負荷や再生開始までのわずかな遅延が増えることがあります。

configVideoPlayersHelpTitle=ビデオプレーヤー
configVideoPlayersHelp=最大 3 つの外部ビデオ プレーヤーを設定し、UIPTV がストリームを開く方法を選択します。\n\n• プライマリ、セカンダリ、およびターシャリ プレーヤーのパスは、各デスクトップ プレーヤーの実際の実行可能ファイルを指す必要があります。\n\n• 選択されたデフォルトのプレーヤーは、UIPTV が通常の再生に使用する最初のオプションです。そのプレーヤーが利用できない場合、UIPTV は別の構成されたオプションにフォールバックできます。\n\n• 埋め込みプレーヤーは UIPTV 内で再生を維持します。より広範なコーデックをサポートするには VLC モードを使用し、軽量の組み込みオプションが必要な場合は Lite モードを使用します。\n\n• Web Browser Player は、ブラウザ内でのみ確実に動作する DRM で保護されたストリームまたはサービスに役立ちます。\n\n• Wide View は埋め込みプレーヤー領域を拡大し、プロバイダーが HLS マスター プレイリスト、ショート リンク、またはマルチステップ リダイレクトを使用する場合に、リダイレクト チェーンの解決が役立ちます。\n\nプレーヤーのパスを変更した後、各パスがこのマシン上で正しいアプリケーションを起動することを確認します。
configFiltersHelpTitle=ペアレンタルロック
configFiltersHelpText=このセクションを使用して、キーワードによってカテゴリとチャネルを非表示にし、それらのルールをパスワードで保護します。\n\n• ブロックされたカテゴリのキーワードは、一致するカテゴリ名を非表示にします。\n\n• ブロックされたチャネル キーワードは、一致するチャネル名を非表示にします。\n\n• 他のユーザーがこれらのフィルターを読み取り、変更、一時停止できないようにするには、ペアレンタル ロックのパスワードを設定します。\n\n• ロックがアクティブな場合、UIPTV は、ストーカー ポータルが検閲済みとしてマークしたコンテンツを開く前にパスワードを要求することもできます。\n\n幅広いキーワードを慎重に使用してください。短い単語や一般的な単語では、予想よりもはるかに多くの内容が隠されている可能性があります。
configThemeHelpTitle=テーマと外観
configThemeHelp=このセクションを使用して、UIPTV の外観を制御し、インターフェイスを使用している画面に適合させます。\n\n• ダークテーマは、アプリケーションを明るいパレットと暗いパレットの間で切り替えます。\n\n• ビデオのサムネイルを使用するとブラウジングが改善されますが、サムネイルを無効にすると視覚的な煩雑さが軽減され、システムの速度が低下する可能性があります。\n\n• [言語] では、メニュー、ラベル、ダイアログの UI 言語を変更します。\n\n• UI Zoom はインターフェイスのスケールを変更します。高解像度ディスプレイの場合、またはより大きなコントロールやテキストが必要な場合は、値を増やします。\n\n• ライトおよびダーク CSS オーバーライドを使用すると、組み込みテーマの一部を置き換えることができます。安全な開始点が必要な場合は、まずテンプレートをダウンロードし、オーバーライドをリセットしてデフォルトのテーマに戻します。
configCacheFilteringHelpTitle=キャッシュとセッションデータ
configCacheFilteringHelpText=このセクションでは、一時的な再生データと、現在の構成のペアレンタル ロック フィルタリングを一時停止するオプションを組み合わせます。\n\n• ペアレンタル ロック制限を一時停止すると、ブロック ルールは削除されずに一時的に無効になります。\n\n• キャッシュの有効期限は、再生関連のキャッシュされたデータが古いものとして扱われるまでの保持期間を制御します。\n\n• 再生キャッシュのクリアは、キャッシュされたストリーム データを削除し、古いメディア応答や壊れたメディア応答を再生で使用し続ける場合に役立ちます。\n\n• 現在視聴履歴をクリアすると、保存されている進行中の視聴リストが削除されます。\n\n• アカウント データ キャッシュの再読み込みは、ポータル側のデータが変更され、現在のローカル キャッシュが古くなった場合に、キャッシュされたアカウント データを更新します。
configDatabaseSyncHelpTitle=データベースの同期
configDatabaseSyncHelpText=インポートとエクスポートを使用すると、バックアップまたは異なる UIPTV インストール間で UIPTV データを移動できます。\n\n• インポートは、データベースのスナップショットを現在のインストールに読み込みます。\n\n• エクスポートでは、現在のデータをスナップショットに書き込みます。スナップショットはローカルに保存したり、別の UIPTV インスタンスに送信したりできます。\n\n• 同期フローには、同期ダイアログでの選択に応じて、アカウント、ブックマーク、およびオプションの構成データを含めることができます。\n\n• リモート同期では、データが転送される前に、他のマシンがアクセス可能で承認されている必要があります。\n\n• データベース同期は一方向のマージです。新規または変更されたソース レコードはコピーされますが、ソースからの削除は自動的には適用されません。
configFfmpegAndWebServerHelpTitle=FFmpeg と内部 Web サーバー
configFfmpegAndWebServerHelpText=ストリームの前処理、ブラウザ配信、または UIPTV のローカル Web ツールを介したアクセスが必要な場合は、このセクションを使用します。\n\n• ストリームの形式変換が必要な場合、または通常のパスでの再生が不安定な場合は、FFmpeg トランスコーディングを有効にします。\n\n• Lite プレーヤーの FFmpeg 互換性を有効にすると、Lite プレーヤーが直接処理できないストリームに対して FFmpeg ベースのフォールバックが追加されます。\n\n• 内部 Web サーバーは、ブラウザー プレーヤー、Web アプリ、DRM フロー、およびリモート同期機能のローカル再生ルートを公開します。\n\n• このマシンではサーバー ポートが空いている必要があります。変更した場合は、ローカルで UIPTV に接続するすべての場所で新しいアドレスを使用します。\n\n• M3U8 プレイリストの公開は、UIPTV の実行中に他のプレーヤーまたはツールが開くことができるローカル プレイリスト エンドポイントを生成します。\n\nFFmpeg 機能が必要ないときは、オフにしておいてください。 CPU 使用率と起動時間が増加する可能性があります。
configTmdbMetadataHelpTitle=TMDBメタデータ
configTmdbMetadataHelpText=UIPTV で映画やシリーズのより豊富なメタデータを取得する場合は、ここに TMDB 読み取りアクセス トークンを追加します。\n\n• TMDB メタデータには、ローカライズされたタイトル、プロット、ジャンル、アートワーク参照、その他の説明的な詳細を含めることができます。\n\n• トークンはオプションです。 UIPTV は、メタデータがなくてもコンテンツを再生できますが、メタデータの範囲はより制限されます。\n\n• TMDB API アカウントの作成手順が必要な場合はガイド リンクを使用し、既存の読み取りアクセス トークンをコピーするにはアカウント リンクを使用します。\n\n• メタデータの結果が間違っている場合は、トークンが有効であること、および選択した UI 言語が期待するメタデータ言語と一致することを確認してください。\n\nトークンをプライベート資格情報のように扱い、誤って共有されたと思われる場合は置き換えてください。

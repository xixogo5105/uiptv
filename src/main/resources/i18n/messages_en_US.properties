configResolveChainAndDeepRedirects=Resolve redirect chains
configResolveChainAndDeepRedirectsHelpTitle=Resolve redirect chains
configResolveChainAndDeepRedirectsHelp=This option makes the app resolve HLS playlist chains and follow deeper redirect chains before playback.\n\nUse it when a stream lands on a master playlist, relative HLS variants, or a redirecting gateway that the player does not handle well on its own.\n\nLeave it off if your streams already play correctly without extra probing, or if you want the lowest startup latency. Enabling it can add a small delay before playback starts.
configWideViewHelpTitle=Wide View
configWideViewHelp=Wide View makes the embedded player layout use more of the available width so the video area feels less cramped.\n\nUse it on larger screens or when you prefer a more spacious embedded player layout.\n\nLeave it off on small windows or narrow displays where the standard layout is easier to fit. This setting can make the embedded player feel wider, but it is not meant to change playback quality.
configEnableFfmpegHelpTitle=FFmpeg Transcoding
configEnableFfmpegHelp=FFmpeg transcoding lets the app re-encode streams through FFmpeg before playback.\n\nUse it when a stream is unstable, needs format conversion, or does not play correctly in the embedded player.\n\nLeave it off if streams already play smoothly and you want the lowest CPU usage, because transcoding can be expensive.
configEnableLitePlayerFfmpegHelpTitle=FFmpeg Compatibility for Lite Player
configEnableLitePlayerFfmpegHelp=FFmpeg compatibility for the Lite player uses FFmpeg as a fallback path for streams that the direct Lite player backend cannot handle well.\n\nUse it for problematic streams or when the Lite player fails to start playback reliably.\n\nLeave it off for streams that already work directly, since the fallback can add CPU cost and a little extra playback delay.

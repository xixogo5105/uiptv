configVideoPlayersHelpTitle=Pemutar Video
configVideoPlayersHelp=Konfigurasikan hingga tiga pemutar video eksternal dan pilih cara UIPTV membuka streaming.\n\n• Jalur pemutar primer, sekunder, dan tersier harus mengarah ke executable sebenarnya untuk setiap pemutar desktop.\n\n• Pemutar default yang dipilih adalah opsi pertama yang digunakan UIPTV untuk pemutaran normal. Jika pemutar tersebut tidak tersedia, UIPTV dapat kembali ke opsi lain yang dikonfigurasi.\n\n• Pemutar Tertanam menyimpan pemutaran di dalam UIPTV. Gunakan mode VLC untuk dukungan codec yang lebih luas, atau mode Ringan jika Anda menginginkan opsi bawaan yang lebih ringan.\n\n• Web Browser Player berguna untuk streaming atau layanan yang dilindungi DRM dan hanya berfungsi dengan baik di browser.\n\n• Tampilan Lebar memperbesar area pemutar tersemat, dan Resolve rantai pengalihan membantu saat penyedia menggunakan daftar putar master HLS, tautan pendek, atau pengalihan multi-langkah.\n\nSetelah mengubah jalur pemain, verifikasi bahwa setiap jalur meluncurkan aplikasi yang benar di mesin ini.
configFiltersHelpTitle=Kunci Orang Tua
configFiltersHelpText=Gunakan bagian ini untuk menyembunyikan kategori dan saluran berdasarkan kata kunci dan untuk melindungi aturan tersebut dengan kata sandi.\n\n• Kata kunci kategori yang diblokir menyembunyikan nama kategori yang cocok.\n\n• Kata kunci saluran yang diblokir menyembunyikan nama saluran yang cocok.\n\n• Tetapkan kata sandi kunci orang tua jika Anda tidak ingin pengguna lain membaca, mengubah, atau menghentikan sementara filter ini.\n\n• Saat kunci aktif, UIPTV juga dapat meminta kata sandi sebelum membuka konten yang ditandai oleh portal Stalker sebagai disensor.\n\nGunakan kata kunci yang luas dengan hati-hati. Kata-kata yang pendek atau umum dapat menyembunyikan lebih banyak konten daripada yang diharapkan.
configThemeHelpTitle=Tema dan Penampilan
configThemeHelp=Gunakan bagian ini untuk mengontrol tampilan visual UIPTV dan menyesuaikan antarmuka dengan layar yang Anda gunakan.\n\n• Tema Gelap mengalihkan aplikasi antara palet terang dan gelap.\n\n• Gambar mini video dapat meningkatkan penelusuran, namun menonaktifkannya dapat mengurangi kekacauan visual dan membantu memperlambat sistem.\n\n• Bahasa mengubah bahasa UI untuk menu, label, dan dialog.\n\n• UI Zoom mengubah skala antarmuka. Tingkatkan pada tampilan resolusi tinggi atau saat Anda menginginkan kontrol dan teks yang lebih besar.\n\n• Penggantian CSS terang dan gelap memungkinkan Anda mengganti bagian tema bawaan. Unduh templatnya terlebih dahulu jika Anda menginginkan titik awal yang aman, dan setel ulang penggantian untuk kembali ke tema default.
configCacheFilteringHelpTitle=Cache dan Data Sesi
configCacheFilteringHelpText=Bagian ini menggabungkan data pemutaran sementara dengan opsi untuk menjeda pemfilteran pengawasan orang tua untuk konfigurasi saat ini.\n\n• Jeda pembatasan kunci orang tua menonaktifkan sementara aturan pemblokiran tanpa menghapusnya.\n\n• Kedaluwarsa cache mengontrol berapa lama data cache terkait pemutaran disimpan sebelum dianggap basi.\n\n• Clear Playback Cache menghapus data streaming yang di-cache dan dapat membantu ketika pemutaran terus menggunakan respons media yang ketinggalan jaman atau rusak.\n\n• Hapus Riwayat Menonton Sekarang menghapus daftar tontonan yang sedang berlangsung.\n\n• Muat Ulang Cache Data Akun menyegarkan data akun yang di-cache ketika data sisi portal telah berubah dan cache lokal saat ini kedaluwarsa.
configDatabaseSyncHelpTitle=Sinkronisasi Basis Data
configDatabaseSyncHelpText=Impor dan ekspor memungkinkan Anda memindahkan data UIPTV antara cadangan atau instalasi UIPTV yang berbeda.\n\n• Impor membaca snapshot database ke dalam instalasi saat ini.\n\n• Ekspor menulis data saat ini ke snapshot yang dapat disimpan secara lokal atau dikirim ke instance UIPTV lain.\n\n• Alur sinkronisasi dapat mencakup akun, bookmark, dan data konfigurasi opsional, bergantung pada pilihan yang Anda buat dalam dialog sinkronisasi.\n\n• Sinkronisasi jarak jauh mengharuskan mesin lain dapat dijangkau dan disetujui sebelum data ditransfer.\n\n• Sinkronisasi database merupakan penggabungan satu arah. Catatan sumber baru atau yang diubah akan disalin, namun penghapusan dari sumber tidak diterapkan secara otomatis.
configFfmpegAndWebServerHelpTitle=FFmpeg dan Server Web Internal
configFfmpegAndWebServerHelpText=Gunakan bagian ini ketika streaming memerlukan prapemrosesan, pengiriman browser, atau akses melalui alat web lokal UIPTV.\n\n• Aktifkan Transcoding FFmpeg ketika streaming memerlukan konversi format atau diputar secara tidak dapat diandalkan di jalur normal.\n\n• Aktifkan Kompatibilitas FFmpeg untuk Lite Player menambahkan fallback berbasis FFmpeg untuk streaming yang tidak dapat ditangani langsung oleh pemutar Lite.\n\n• Server web internal menerbitkan rute pemutaran lokal untuk pemutar browser, aplikasi web, aliran DRM, dan fitur sinkronisasi jarak jauh.\n\n• Port server harus bebas pada mesin ini. Jika Anda mengubahnya, gunakan alamat baru di mana pun yang terhubung ke UIPTV secara lokal.\n\n• Publikasikan Daftar Putar M3U8 menghasilkan titik akhir daftar putar lokal yang dapat dibuka oleh pemain atau alat lain saat UIPTV sedang berjalan.\n\nMatikan fitur FFmpeg saat Anda tidak membutuhkannya. Mereka dapat meningkatkan penggunaan CPU dan waktu startup.
configTmdbMetadataHelpTitle=Metadata TMDB
configTmdbMetadataHelpText=Tambahkan token akses baca TMDB di sini jika Anda ingin UIPTV mengambil metadata yang lebih kaya untuk film dan serial.\n\n• Metadata TMDB dapat mencakup judul, plot, genre, referensi karya seni, dan detail deskriptif lainnya yang dilokalkan.\n\n• Token bersifat opsional. UIPTV masih dapat memutar konten tanpanya, namun cakupan metadata akan lebih terbatas.\n\n• Gunakan tautan panduan jika Anda memerlukan petunjuk untuk membuat akun API TMDB, dan gunakan tautan akun untuk menyalin token akses baca yang ada.\n\n• Jika hasil metadata salah, verifikasi bahwa token valid dan bahasa UI yang dipilih cocok dengan bahasa metadata yang Anda harapkan.\n\nPerlakukan token seperti kredensial pribadi dan gantikan jika Anda yakin token tersebut dibagikan secara tidak sengaja.

configResolveChainAndDeepRedirects=Resolusi rantai pengalihan
configResolveChainAndDeepRedirectsHelpTitle=Resolusi rantai pengalihan
configResolveChainAndDeepRedirectsHelp=Opsi ini membuat aplikasi menyelesaikan rantai playlist HLS dan mengikuti rantai pengalihan yang lebih dalam sebelum pemutaran dimulai.\n\nGunakan saat sebuah stream berakhir pada playlist master, varian HLS relatif, atau gateway pengalihan yang tidak ditangani dengan baik oleh pemutar secara langsung.\n\nBiarkan nonaktif jika stream Anda sudah diputar dengan benar tanpa pemeriksaan tambahan, atau jika Anda ingin latensi mulai yang serendah mungkin. Mengaktifkannya dapat menambah sedikit jeda sebelum pemutaran dimulai.
configWideViewHelpTitle=Tampilan lebar
configWideViewHelp=Tampilan lebar membuat tata letak pemutar tersemat menggunakan lebih banyak lebar yang tersedia sehingga area video terasa tidak terlalu sempit.\n\nGunakan pada layar yang lebih besar atau jika Anda lebih suka tata letak pemutar tersemat yang lebih lapang.\n\nBiarkan nonaktif pada jendela kecil atau layar sempit tempat tata letak standar lebih pas. Pengaturan ini dapat membuat pemutar terasa lebih lebar, tetapi tidak dimaksudkan untuk mengubah kualitas pemutaran.
configEnableFfmpegHelpTitle=Transcoding FFmpeg
configEnableFfmpegHelp=Transcoding FFmpeg memungkinkan aplikasi mengodekan ulang stream melalui FFmpeg sebelum pemutaran.\n\nGunakan saat stream tidak stabil, memerlukan konversi format, atau tidak diputar dengan benar di pemutar tersemat.\n\nBiarkan nonaktif jika stream sudah berjalan lancar dan Anda ingin penggunaan CPU serendah mungkin, karena transcoding bisa mahal.
configEnableLitePlayerFfmpegHelpTitle=Kompatibilitas FFmpeg untuk Pemutar Lite
configEnableLitePlayerFfmpegHelp=Kompatibilitas FFmpeg untuk pemutar Lite menggunakan FFmpeg sebagai jalur cadangan untuk stream yang tidak dapat ditangani dengan baik oleh backend langsung pemutar Lite.\n\nGunakan untuk stream bermasalah atau saat pemutar Lite gagal memulai pemutaran dengan andal.\n\nBiarkan nonaktif untuk stream yang sudah berjalan langsung dengan baik, karena jalur cadangan dapat menambah beban CPU dan sedikit keterlambatan tambahan sebelum pemutaran.

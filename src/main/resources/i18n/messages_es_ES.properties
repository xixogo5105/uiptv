configVideoPlayersHelpTitle=Reproductores de vídeo
configVideoPlayersHelp=Configure hasta tres reproductores de video externos y elija cómo abre UIPTV las transmisiones.\n\n• Las rutas de los reproductores primario, secundario y terciario deben apuntar al ejecutable real de cada reproductor de escritorio.\n\n• El reproductor predeterminado seleccionado es la primera opción que utiliza UIPTV para la reproducción normal. Si ese reproductor no está disponible, UIPTV puede recurrir a otra opción configurada.\n\n• Embedded Player mantiene la reproducción dentro de UIPTV. Utilice el modo VLC para una compatibilidad más amplia con códecs o el modo Lite cuando desee una opción integrada más ligera.\n\n• Web Browser Player es útil para transmisiones o servicios protegidos con DRM que sólo funcionan de manera confiable en un navegador.\n\n• Wide View amplía el área del reproductor integrado y Resolver cadenas de redireccionamiento ayuda cuando un proveedor utiliza listas de reproducción maestras HLS, enlaces cortos o redireccionamientos de varios pasos.\n\nDespués de cambiar las rutas del reproductor, verifique que cada ruta inicie la aplicación correcta en esta máquina.
configFiltersHelpTitle=Bloqueo parental
configFiltersHelpText=Utilice esta sección para ocultar categorías y canales por palabra clave y proteger esas reglas con una contraseña.\n\n• Las palabras clave de categorías bloqueadas ocultan los nombres de categorías coincidentes.\n\n• Las palabras clave de canales bloqueados ocultan los nombres de canales coincidentes.\n\n• Establezca una contraseña de bloqueo parental si no desea que otros usuarios lean, cambien o suspendan temporalmente estos filtros.\n\n• Cuando el bloqueo está activo, UIPTV también puede solicitar la contraseña antes de abrir contenido que el portal Stalker marca como censurado.\n\nUtilice palabras clave amplias con cuidado. Las palabras cortas o genéricas pueden ocultar mucho más contenido del esperado.
configThemeHelpTitle=Tema y apariencia
configThemeHelp=Utilice esta sección para controlar la apariencia visual de UIPTV y adaptar la interfaz a la pantalla que esté utilizando.\n\n• Tema oscuro cambia la aplicación entre paletas claras y oscuras.\n\n• Las miniaturas de vídeo pueden mejorar la navegación, pero desactivarlas puede reducir el desorden visual y ayudar a los sistemas más lentos.\n\n• Idioma cambia el idioma de la interfaz de usuario para menús, etiquetas y cuadros de diálogo.\n\n• UI Zoom cambia la escala de la interfaz. Auméntelo en pantallas de alta resolución o cuando desee controles y texto más grandes.\n\n• Las anulaciones de CSS claro y oscuro le permiten reemplazar partes del tema integrado. Descargue la plantilla primero si desea un punto de partida seguro y restablezca las anulaciones para volver al tema predeterminado.
configCacheFilteringHelpTitle=Datos de sesión y caché
configCacheFilteringHelpText=Esta sección combina datos de reproducción temporales con la opción de pausar el filtrado de bloqueo parental para la configuración actual.\n\n• Pausar las restricciones de bloqueo parental desactiva temporalmente las reglas de bloqueo sin eliminarlas.\n\n• La caducidad de la caché controla durante cuánto tiempo se conservan los datos almacenados en caché relacionados con la reproducción antes de que se consideren obsoletos.\n\n• Borrar caché de reproducción elimina los datos de transmisión almacenados en caché y puede ayudar cuando la reproducción sigue utilizando respuestas multimedia obsoletas o rotas.\n\n• Borrar historial de visualización en curso elimina la lista de visualización en curso guardada.\n\n• Recargar caché de datos de cuenta actualiza los datos de la cuenta almacenados en caché cuando los datos del lado del portal han cambiado y el caché local actual está desactualizado.
configDatabaseSyncHelpTitle=Sincronización de bases de datos
configDatabaseSyncHelpText=Importar y exportar le permite mover sus datos de UIPTV entre copias de seguridad o diferentes instalaciones de UIPTV.\n\n• Importar lee una instantánea de la base de datos en la instalación actual.\n\n• Exportar escribe los datos actuales en una instantánea que puede almacenarse localmente o enviarse a otra instancia de UIPTV.\n\n• El flujo de sincronización puede incluir cuentas, marcadores y datos de configuración opcionales, según las elecciones que realice en el cuadro de diálogo de sincronización.\n\n• La sincronización remota requiere que la otra máquina esté accesible y aprobada antes de transferir los datos.\n\n• La sincronización de la base de datos es una combinación unidireccional. Los registros de origen nuevos o modificados se copian, pero las eliminaciones del origen no se aplican automáticamente.
configFfmpegAndWebServerHelpTitle=FFmpeg y servidor web interno
configFfmpegAndWebServerHelpText=Utilice esta sección cuando una transmisión necesite preprocesamiento, entrega mediante navegador o acceso a través de las herramientas web locales de UIPTV.\n\n• Habilite la transcodificación FFmpeg cuando una transmisión necesite conversión de formato o se reproduzca de manera poco confiable en la ruta normal.\n\n• Habilitar compatibilidad con FFmpeg para Lite Player agrega un respaldo basado en FFmpeg para transmisiones que el reproductor Lite no puede manejar directamente.\n\n• El servidor web interno publica rutas de reproducción locales para el reproductor del navegador, la aplicación web, los flujos DRM y las funciones de sincronización remota.\n\n• El puerto del servidor debe estar libre en esta máquina. Si la cambia, use la nueva dirección en todos los lugares que se conecten a UIPTV localmente.\n\n• Publicar lista de reproducción M3U8 genera un punto final de lista de reproducción local que otros reproductores o herramientas pueden abrir mientras se ejecuta UIPTV.\n\nMantenga las funciones de FFmpeg desactivadas cuando no las necesite. Pueden aumentar el uso de la CPU y el tiempo de inicio.
configTmdbMetadataHelpTitle=Metadatos TMDB
configTmdbMetadataHelpText=Agregue aquí un token de acceso de lectura TMDB si desea que UIPTV obtenga metadatos más completos para películas y series.\n\n• Los metadatos de TMDB pueden incluir títulos, tramas, géneros, referencias de obras de arte y otros detalles descriptivos localizados.\n\n• El token es opcional. UIPTV aún puede reproducir contenido sin él, pero la cobertura de metadatos será más limitada.\n\n• Utilice el enlace de la guía si necesita instrucciones para crear una cuenta API de TMDB y utilice el enlace de la cuenta para copiar un token de acceso de lectura existente.\n\n• Si los resultados de los metadatos parecen incorrectos, verifique que el token sea válido y que el idioma de la interfaz de usuario seleccionado coincida con el idioma de los metadatos que espera.\n\nTrate el token como una credencial privada y reemplácelo si cree que se ha compartido accidentalmente.

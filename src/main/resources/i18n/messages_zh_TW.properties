configResolveChainAndDeepRedirects=解析重新導向鏈
configResolveChainAndDeepRedirectsHelpTitle=解析重新導向鏈
configResolveChainAndDeepRedirectsHelp=此選項會讓應用程式在播放前解析 HLS 播放清單鏈，並繼續追蹤更深層的重新導向鏈。\n\n當串流最後落到主播放清單、相對 HLS 變體，或播放器本身無法妥善處理的重新導向閘道時，可以使用它。\n\n如果你的串流在不額外探測的情況下已經能正常播放，或你想要最低的啟動延遲，請保持關閉。啟用後可能會在播放開始前增加一點延遲。
configWideViewHelpTitle=寬視角
configWideViewHelp=寬視角會讓內嵌播放器版面使用更多可用寬度，讓影片區域看起來不那麼擁擠。\n\n適合在較大的螢幕上使用，或當你偏好更寬敞的內嵌播放器版面時使用。\n\n在小視窗或較窄的顯示器上建議關閉，因為標準版面通常更合適。這個設定會讓播放器看起來更寬，但不是用來改變播放品質的。
configEnableFfmpegHelpTitle=FFmpeg 轉碼
configEnableFfmpegHelp=FFmpeg 轉碼允許應用程式在播放前透過 FFmpeg 重新編碼串流。\n\n當串流不穩定、需要格式轉換，或無法在內嵌播放器中正常播放時，可以使用它。\n\n如果串流已經能順暢播放，而且你希望 CPU 使用量越低越好，請保持關閉，因為轉碼可能會消耗較多資源。
configEnableLitePlayerFfmpegHelpTitle=Lite 播放器的 FFmpeg 相容模式
configEnableLitePlayerFfmpegHelp=Lite 播放器的 FFmpeg 相容模式會把 FFmpeg 當作備援路徑，用來處理 Lite 播放器直接後端不太擅長的串流。\n\n適合用於有問題的串流，或 Lite 播放器無法穩定開始播放時。\n\n對於已經可以直接正常播放的串流，建議關閉，因為備援路徑可能會增加 CPU 負擔，並帶來一點額外的播放延遲。

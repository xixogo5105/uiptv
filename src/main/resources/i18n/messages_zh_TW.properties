configVideoPlayersHelpTitle=影片播放器
configVideoPlayersHelp=配置最多三個外部視訊播放器並選擇 UIPTV 開啟串流的方式。\n\n• 主要、次要和第三播放器路徑應指向每個桌面播放器的實際執行檔。\n\n• 所選用的預設播放器是UIPTV 正常播放時所使用的第一個選項。如果該播放器不可用，UIPTV 可以回退到另一個配置的選項。\n\n• 嵌入式播放器在UIPTV 內保持播放。使用 VLC 模式獲得更廣泛的編解碼器支持，或者當您需要更輕的內建選項時使用 Lite 模式。\n\n• Web 瀏覽器播放器對於受 DRM 保護的串流或僅在瀏覽器中可靠工作的服務非常有用。\n\n• Wide View 擴大了嵌入式播放器區域，當提供者使用 HLS 主播放清單、短連結或多步驟重定向時，Resolve 重定向鏈會有所幫助。\n\n更改播放器路徑後，驗證每個路徑是否在此電腦上啟動正確的應用程式。
configFiltersHelpTitle=家長鎖
configFiltersHelpText=使用此部分可以按關鍵字隱藏類別和頻道，並使用密碼保護這些規則。\n\n• 被封鎖的類別關鍵字會隱藏符合的類別名稱。\n\n• 被封鎖的頻道關鍵字會隱藏符合的頻道名稱。\n\n• 如果您不希望其他使用者讀取、變更或暫時暫停這些篩選器，請設定家長鎖定密碼。\n\n• 當鎖定處於活動狀態時，UIPTV 也可以在開啟 Stalker 入口網站標記為已審查的內容之前要求輸入密碼。\n\n謹慎使用寬泛的關鍵字。簡短或通用的單字可能隱藏比預期更多的內容。
configThemeHelpTitle=主題與外觀
configThemeHelp=使用此部分可以控制 UIPTV 的視覺外觀並使介面適應您正在使用的螢幕。\n\n• 深色主題在淺色和深色調色板之間切換應用程式。\n\n• 影片縮圖可以改善瀏覽，但停用它們可能會減少視覺混亂並有助於減慢系統速度。\n\n• 語言變更選單、標籤和對話方塊的UI 語言。\n\n• UI 縮放更改介面的比例。在高解析度顯示器上或當您需要更大的控制和文字時增加它。\n\n• 淺色和深色CSS 覆蓋可讓您取代部分內建主題。如果您想要一個安全的起點，請先下載模板，然後重設覆蓋以傳回預設主題。
configCacheFilteringHelpTitle=快取和會話數據
configCacheFilteringHelpText=此部分將臨時播放資料與暫停目前配置的家長鎖定過濾的選項結合。\n\n• 暫停家長鎖定限制會暫時停用封鎖規則，而不會刪除它們。\n\n• 快取過期控制與播放相關的快取資料在被視為過時之前保留的時間。\n\n• 清除播放快取可刪除快取的串流數據，並可在播放持續使用過時或損壞的媒體回應時提供協助。\n\n• 清除立即觀看歷史記錄會刪除已儲存的正在進行的觀看清單。\n\n• 重新載入帳戶資料快取會在入口網站端資料發生變更且目前本機快取已過期時刷新快取的帳戶資料。
configDatabaseSyncHelpTitle=資料庫同步
configDatabaseSyncHelpText=透過匯入和匯出，您可以在備份或不同的 UIPTV 安裝之間移動 UIPTV 資料。\n\n• 匯入將資料庫快照讀取到目前安裝中。\n\n• 匯出將目前資料寫入快照，該快照可以儲存在本機或傳送到另一個UIPTV 實例。\n\n• 同步流程可以包括帳戶、書籤和可選配置數據，具體取決於您在同步對話方塊中所做的選擇。\n\n• 遠端同步要求在傳輸資料之前可以存取另一台電腦並獲得批准。\n\n• 資料庫同步是一種單向合併。新的或更改的來源記錄將被複製，但不會自動套用來源中的刪除。
configFfmpegAndWebServerHelpTitle=FFmpeg 與內部 Web 伺服器
configFfmpegAndWebServerHelpText=當串流需要預處理、瀏覽器傳送或透過 UIPTV 的本機 Web 工具存取時，請使用此部分。\n\n• 當串流需要格式轉換或在正常路徑中播放不可靠時啟用FFmpeg 轉碼。\n\n• 為Lite 播放器啟用FFmpeg 相容性為Lite 播放器無法直接處理的串流新增基於FFmpeg 的後備。\n\n• 內部Web 伺服器發布瀏覽器播放器、Web 應用程式、DRM 串流和遠端同步功能的本機播放路由。\n\n• 此電腦上的伺服器連接埠必須空閒。如果您更改它，請在本地連接到 UIPTV 的任何地方使用新位址。\n\n• 發布M3U8 播放清單產生本機播放清單端點，其他播放器或工具可在UIPTV 運作時開啟該端點。\n\n當您不需要 FFmpeg 功能時，請將其關閉。它們會增加 CPU 使用率和啟動時間。
configTmdbMetadataHelpTitle=TMDB元數據
configTmdbMetadataHelpText=如果您希望 UIPTV 獲取更豐富的電影和電視劇元數據，請在此處新增 TMDB 讀取存取權杖。\n\n• TMDB 元資料可以包括在地化的標題、情節、流派、藝術作品參考和其他描述性細節。\n\n• 令牌是可選的。沒有它，UIPTV 仍然可以播放內容，但元資料覆蓋範圍將更加有限。\n\n• 如果您需要建立TMDB API 帳戶的說明，請使用指南鏈接，並使用帳戶連結複製現有的讀取存取權杖。\n\n• 如果元資料結果看起來不正確，請驗證令牌是否有效以及所選的UI 語言是否與您期望的元資料語言相符。\n\n將令牌視為私人憑證，如果您認為它已被意外共享，請將其替換。

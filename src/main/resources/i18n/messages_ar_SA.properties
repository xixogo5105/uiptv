configVideoPlayersHelpTitle=مشغلات الفيديو
configVideoPlayersHelp=قم بتكوين ما يصل إلى ثلاثة مشغلات فيديو خارجية واختر كيفية فتح UIPTV للتدفقات.\n\n• يجب أن تشير مسارات المشغل الأساسي والثانوي والثالث إلى الملف القابل للتنفيذ الفعلي لكل مشغل سطح مكتب.\n\n• المشغل الافتراضي المحدد هو الخيار الأول الذي يستخدمه UIPTV للتشغيل العادي. إذا لم يكن هذا المشغل متاحًا، فيمكن لـ UIPTV الرجوع إلى خيار آخر تم تكوينه.\n\n• مشغل مضمن يحافظ على التشغيل داخل UIPTV. استخدم وضع VLC للحصول على دعم أوسع لبرنامج الترميز، أو الوضع البسيط عندما تريد خيارًا مدمجًا أخف.\n\n• يعد Web Browser Player مفيدًا للتدفقات أو الخدمات المحمية بموجب إدارة الحقوق الرقمية (DRM) والتي تعمل بشكل موثوق فقط في المتصفح.\n\n• يعمل العرض الواسع على توسيع منطقة المشغل المضمنة، ويساعد حل سلاسل إعادة التوجيه عندما يستخدم الموفر قوائم التشغيل الرئيسية لـ HLS، أو الروابط القصيرة، أو عمليات إعادة التوجيه متعددة الخطوات.\n\nبعد تغيير مسارات المشغل، تأكد من أن كل مسار يقوم بتشغيل التطبيق الصحيح على هذا الجهاز.
configFiltersHelpTitle=قفل الوالدين
configFiltersHelpText=استخدم هذا القسم لإخفاء الفئات والقنوات حسب الكلمات الرئيسية ولحماية تلك القواعد بكلمة مرور.\n\n• الكلمات الرئيسية للفئة المحظورة تخفي أسماء الفئات المطابقة.\n\n• الكلمات الرئيسية للقناة المحظورة تخفي أسماء القنوات المطابقة.\n\n• قم بتعيين كلمة مرور قفل الوالدين إذا كنت لا تريد أن يقوم المستخدمون الآخرون بقراءة هذه المرشحات أو تغييرها أو إيقافها مؤقتًا.\n\n• عندما يكون القفل نشطًا، يمكن أن يطلب UIPTV أيضًا كلمة المرور قبل فتح المحتوى الذي تحدده بوابة Stalker على أنه خاضع للرقابة.\n\nاستخدم الكلمات الرئيسية الواسعة بعناية. يمكن للكلمات القصيرة أو العامة أن تخفي محتوى أكثر بكثير من المتوقع.
configThemeHelpTitle=الموضوع والمظهر
configThemeHelp=استخدم هذا القسم للتحكم في المظهر المرئي لـ UIPTV وتكييف الواجهة مع الشاشة التي تستخدمها.\n\n• يقوم Dark Theme بتبديل التطبيق بين اللوحات الفاتحة والداكنة.\n\n• يمكن أن تعمل الصور المصغرة للفيديو على تحسين التصفح، ولكن تعطيلها قد يقلل من الفوضى المرئية ويساعد على إبطاء الأنظمة.\n\n• تقوم اللغة بتغيير لغة واجهة المستخدم للقوائم والتسميات ومربعات الحوار.\n\n• يقوم UI Zoom بتغيير حجم الواجهة. يمكنك زيادتها على شاشات العرض عالية الدقة أو عندما تريد عناصر تحكم ونصًا أكبر.\n\n• تتيح لك تجاوزات CSS الفاتحة والداكنة استبدال أجزاء من السمة المضمنة. قم بتنزيل القالب أولاً إذا كنت تريد نقطة بداية آمنة، ثم قم بإعادة تعيين التجاوزات للعودة إلى السمة الافتراضية.
configCacheFilteringHelpTitle=ذاكرة التخزين المؤقت وبيانات الجلسة
configCacheFilteringHelpText=يجمع هذا القسم بيانات التشغيل المؤقتة مع خيار إيقاف تصفية القفل الأبوي مؤقتًا للتكوين الحالي.\n\n• يؤدي الإيقاف المؤقت لقيود القفل الأبوي إلى تعطيل قواعد الحظر مؤقتًا دون حذفها.\n\n• تتحكم انتهاء صلاحية ذاكرة التخزين المؤقت في مدة الاحتفاظ بالبيانات المخزنة مؤقتًا ذات الصلة بالتشغيل قبل أن يتم التعامل معها على أنها قديمة.\n\n• يؤدي مسح ذاكرة التخزين المؤقت للتشغيل إلى إزالة بيانات الدفق المخزنة مؤقتًا ويمكن أن يساعد عندما يستمر التشغيل في استخدام استجابات الوسائط القديمة أو المعطلة.\n\n• يؤدي مسح سجل المشاهدة الآن إلى إزالة قائمة العرض المحفوظة قيد التقدم.\n\n• إعادة تحميل ذاكرة التخزين المؤقت لبيانات الحساب تعمل على تحديث بيانات الحساب المخزنة مؤقتًا عندما تتغير البيانات الموجودة على جانب المدخل وتكون ذاكرة التخزين المؤقت المحلية الحالية قديمة.
configDatabaseSyncHelpTitle=مزامنة قاعدة البيانات
configDatabaseSyncHelpText=يتيح لك الاستيراد والتصدير نقل بيانات UIPTV الخاصة بك بين النسخ الاحتياطية أو عمليات تثبيت UIPTV المختلفة.\n\n• يقوم الاستيراد بقراءة لقطة قاعدة البيانات في التثبيت الحالي.\n\n• يقوم التصدير بكتابة البيانات الحالية إلى لقطة يمكن تخزينها محليًا أو إرسالها إلى مثيل UIPTV آخر.\n\n• يمكن أن يتضمن تدفق المزامنة الحسابات والإشارات المرجعية وبيانات التكوين الاختيارية، اعتمادًا على الاختيارات التي تحددها في مربع حوار المزامنة.\n\n• تتطلب المزامنة عن بعد إمكانية الوصول إلى الجهاز الآخر والموافقة عليه قبل نقل البيانات.\n\n• مزامنة قاعدة البيانات عبارة عن عملية دمج أحادية الاتجاه. يتم نسخ سجلات المصدر الجديدة أو المتغيرة، ولكن لا يتم تطبيق عمليات الحذف من المصدر تلقائيًا.
configFfmpegAndWebServerHelpTitle=FFmpeg وخادم الويب الداخلي
configFfmpegAndWebServerHelpText=استخدم هذا القسم عندما يحتاج البث إلى معالجة مسبقة أو تسليم المتصفح أو الوصول من خلال أدوات الويب المحلية الخاصة بـ UIPTV.\n\n• تمكين تحويل ترميز FFmpeg عندما يحتاج الدفق إلى تحويل التنسيق أو يتم تشغيله بشكل غير موثوق في المسار العادي.\n\n• يؤدي تمكين توافق FFmpeg لـ Lite Player إلى إضافة بديل يستند إلى FFmpeg للتدفقات التي لا يستطيع مشغل Lite التعامل معها مباشرة.\n\n• ينشر خادم الويب الداخلي مسارات التشغيل المحلية لمشغل المتصفح، وتطبيق الويب، وتدفقات إدارة الحقوق الرقمية، وميزات المزامنة عن بُعد.\n\n• يجب أن يكون منفذ الخادم مجانيًا على هذا الجهاز. إذا قمت بتغييره، استخدم العنوان الجديد في كل مكان يتصل بـ UIPTV محليًا.\n\n• يقوم نشر قائمة التشغيل M3U8 بإنشاء نقطة نهاية لقائمة التشغيل المحلية التي يمكن للاعبين أو الأدوات الأخرى فتحها أثناء تشغيل UIPTV.\n\nاحتفظ بميزات FFmpeg معطلة عندما لا تحتاج إليها. يمكنهم زيادة استخدام وحدة المعالجة المركزية ووقت بدء التشغيل.
configTmdbMetadataHelpTitle=بيانات تعريف TMDB
configTmdbMetadataHelpText=أضف رمز الوصول للقراءة TMDB هنا إذا كنت تريد أن يجلب UIPTV بيانات تعريف أكثر ثراءً للأفلام والمسلسلات.\n\n• يمكن أن تتضمن بيانات تعريف TMDB عناوين محلية ومؤامرات وأنواع ومراجع أعمال فنية وتفاصيل وصفية أخرى.\n\n• الرمز اختياري. لا يزال بإمكان UIPTV تشغيل المحتوى بدونه، لكن تغطية البيانات الوصفية ستكون محدودة أكثر.\n\n• استخدم رابط الدليل إذا كنت بحاجة إلى تعليمات لإنشاء حساب TMDB API، واستخدم رابط الحساب لنسخ رمز الوصول للقراءة الموجود.\n\n• إذا بدت نتائج بيانات التعريف خاطئة، فتأكد من صلاحية الرمز المميز وأن لغة واجهة المستخدم المحددة تتطابق مع لغة بيانات التعريف التي تتوقعها.\n\nتعامل مع الرمز المميز باعتباره بيانات اعتماد خاصة واستبدله إذا كنت تعتقد أنه تمت مشاركته عن طريق الخطأ.

configResolveChainAndDeepRedirects=解析重定向链
configResolveChainAndDeepRedirectsHelpTitle=解析重定向链
configResolveChainAndDeepRedirectsHelp=此选项会让应用在播放前解析 HLS 播放列表链，并继续跟随更深层的重定向链。\n\n当某个流最终落到主播放列表、相对 HLS 变体，或播放器自身无法很好处理的重定向网关时，可以使用它。\n\n如果你的流在不额外探测的情况下已经能正常播放，或者你希望获得最低的启动延迟，请保持关闭。启用后可能会在播放开始前增加一点点延迟。
configWideViewHelpTitle=宽视角
configWideViewHelp=宽视角会让嵌入式播放器布局使用更多可用宽度，使视频区域看起来不那么拥挤。\n\n适合在较大的屏幕上使用，或当你希望嵌入式播放器布局更宽松时使用。\n\n在小窗口或较窄的显示器上建议关闭，因为标准布局通常更合适。这个设置会让播放器看起来更宽，但并不是用来改变播放质量的。
configEnableFfmpegHelpTitle=FFmpeg 转码
configEnableFfmpegHelp=FFmpeg 转码允许应用在播放前通过 FFmpeg 对流重新编码。\n\n当流不稳定、需要格式转换，或者在嵌入式播放器中无法正常播放时，可以使用它。\n\n如果流已经能顺畅播放，并且你希望 CPU 占用尽可能低，请保持关闭，因为转码会消耗较多资源。
configEnableLitePlayerFfmpegHelpTitle=Lite 播放器的 FFmpeg 兼容模式
configEnableLitePlayerFfmpegHelp=Lite 播放器的 FFmpeg 兼容模式会把 FFmpeg 作为后备路径，用于处理 Lite 播放器直连后端不太擅长的流。\n\n适合用于有问题的流，或 Lite 播放器无法稳定开始播放时。\n\n对于已经可以直接正常播放的流，建议关闭，因为后备路径可能会增加 CPU 开销，并带来一点额外的启动延迟。

configResolveChainAndDeepRedirects=Resolver cadeias de redirecionamento
configResolveChainAndDeepRedirectsHelpTitle=Resolver cadeias de redirecionamento
configResolveChainAndDeepRedirectsHelp=Esta opção faz o app resolver cadeias de playlists HLS e seguir redirecionamentos mais profundos antes da reprodução.\n\nUse quando um stream cair em uma playlist mestre, em variantes HLS relativas ou em um gateway de redirecionamento que o player não lida bem sozinho.\n\nDeixe desativado se seus streams já funcionam corretamente sem sondagem extra ou se você quer a menor latência possível ao iniciar. Ativar isso pode adicionar um pequeno atraso antes do início da reprodução.
configWideViewHelpTitle=Visualização ampla
configWideViewHelp=A visualização ampla faz o layout do player incorporado usar mais da largura disponível, deixando a área de vídeo menos apertada.\n\nUse em telas maiores ou quando você preferir um layout mais espaçoso para o player incorporado.\n\nDeixe desativado em janelas pequenas ou telas estreitas, onde o layout padrão se encaixa melhor. Essa configuração pode fazer o player parecer mais largo, mas não foi feita para alterar a qualidade da reprodução.
configEnableFfmpegHelpTitle=Transcodificação FFmpeg
configEnableFfmpegHelp=A transcodificação FFmpeg permite que o app recodifique streams com FFmpeg antes da reprodução.\n\nUse quando um stream estiver instável, precisar de conversão de formato ou não tocar corretamente no player incorporado.\n\nDeixe desativado se os streams já rodam bem e você quer o menor uso possível de CPU, porque a transcodificação pode ser custosa.
configEnableLitePlayerFfmpegHelpTitle=Compatibilidade FFmpeg para o player Lite
configEnableLitePlayerFfmpegHelp=A compatibilidade FFmpeg para o player Lite usa o FFmpeg como caminho de fallback para streams que o backend direto do player Lite não consegue lidar bem.\n\nUse para streams problemáticos ou quando o player Lite não iniciar a reprodução com confiabilidade.\n\nDeixe desativado para streams que já funcionam diretamente, pois o fallback pode adicionar custo de CPU e um pequeno atraso extra antes da reprodução.

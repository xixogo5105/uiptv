configVideoPlayersHelpTitle=Video Players
configVideoPlayersHelp=Configure up to three external video players and choose how UIPTV opens streams.\n\n• Primary, secondary, and tertiary player paths should point to the actual executable for each desktop player.\n\n• The selected default player is the first option UIPTV uses for normal playback. If that player is unavailable, UIPTV can fall back to another configured option.\n\n• Embedded Player keeps playback inside UIPTV. Use VLC mode for broader codec support, or Lite mode when you want a lighter built-in option.\n\n• Web Browser Player is useful for DRM-protected streams or services that only work reliably in a browser.\n\n• Wide View enlarges the embedded-player area, and Resolve redirect chains helps when a provider uses HLS master playlists, short links, or multi-step redirects.\n\nAfter changing player paths, verify that each path launches the correct application on this machine.
configFiltersHelpTitle=Parental Lock
configFiltersHelpText=Use this section to hide categories and channels by keyword and to protect those rules with a password.\n\n• Blocked category keywords hide matching category names.\n\n• Blocked channel keywords hide matching channel names.\n\n• Set a parental lock password if you do not want other users to read, change, or temporarily pause these filters.\n\n• When the lock is active, UIPTV can also require the password before opening content that the Stalker portal marks as censored.\n\nUse broad keywords carefully. Short or generic words can hide much more content than expected.
configThemeHelpTitle=Theme and Appearance
configThemeHelp=Use this section to control the visual appearance of UIPTV and adapt the interface to the screen you are using.\n\n• Dark Theme switches the application between light and dark palettes.\n\n• Video thumbnails can improve browsing, but disabling them may reduce visual clutter and help slower systems.\n\n• Language changes the UI language for menus, labels, and dialogs.\n\n• UI Zoom changes the scale of the interface. Increase it on high-resolution displays or when you want larger controls and text.\n\n• Light and dark CSS overrides let you replace parts of the built-in theme. Download the template first if you want a safe starting point, and reset the overrides to return to the default theme.
configCacheFilteringHelpTitle=Cache and Session Data
configCacheFilteringHelpText=This section combines temporary playback data with the option to pause parental-lock filtering for the current configuration.\n\n• Pause parental lock restrictions temporarily disables the blocking rules without deleting them.\n\n• Cache expiry controls how long playback-related cached data is kept before it is treated as stale.\n\n• Clear Playback Cache removes cached stream data and can help when playback keeps using outdated or broken media responses.\n\n• Clear Watching Now History removes the saved in-progress viewing list.\n\n• Reload Account Data Cache refreshes cached account data when portal-side data has changed and the current local cache is out of date.
configDatabaseSyncHelpTitle=Database Sync
configDatabaseSyncHelpText=Import and export let you move your UIPTV data between backups or different UIPTV installations.\n\n• Import reads a database snapshot into the current installation.\n\n• Export writes the current data to a snapshot that can be stored locally or sent to another UIPTV instance.\n\n• The sync flow can include accounts, bookmarks, and optional configuration data, depending on the choices you make in the sync dialog.\n\n• Remote sync requires the other machine to be reachable and approved before data is transferred.\n\n• Database sync is a one-way merge. New or changed source records are copied in, but deletions from the source are not applied automatically.
configFfmpegAndWebServerHelpTitle=FFmpeg and Internal Web Server
configFfmpegAndWebServerHelpText=Use this section when a stream needs preprocessing, browser delivery, or access through UIPTV's local web tools.\n\n• Enable FFmpeg Transcoding when a stream needs format conversion or plays unreliably in the normal path.\n\n• Enable FFmpeg Compatibility for Lite Player adds an FFmpeg-based fallback for streams the Lite player cannot handle directly.\n\n• The internal web server publishes local playback routes for the browser player, web app, DRM flows, and remote sync features.\n\n• The server port must be free on this machine. If you change it, use the new address everywhere that connects to UIPTV locally.\n\n• Publish M3U8 Playlist generates a local playlist endpoint that other players or tools can open while UIPTV is running.\n\nKeep FFmpeg features off when you do not need them. They can increase CPU usage and startup time.
configTmdbMetadataHelpTitle=TMDB Metadata
configTmdbMetadataHelpText=Add a TMDB read access token here if you want UIPTV to fetch richer metadata for movies and series.\n\n• TMDB metadata can include localized titles, plots, genres, artwork references, and other descriptive details.\n\n• The token is optional. UIPTV can still play content without it, but metadata coverage will be more limited.\n\n• Use the guide link if you need instructions for creating a TMDB API account, and use the account link to copy an existing read access token.\n\n• If metadata results look wrong, verify that the token is valid and that the selected UI language matches the metadata language you expect.\n\nTreat the token like a private credential and replace it if you believe it has been shared accidentally.

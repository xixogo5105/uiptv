configResolveChainAndDeepRedirectsHelpTitle=리디렉션 체인 해석
configResolveChainAndDeepRedirectsHelp=이 옵션을 사용하면 재생 전에 앱이 HLS 재생목록 체인을 해석하고 더 깊은 리디렉션 체인을 따라갑니다.\n\n스트림이 마스터 재생목록, 상대 HLS 변형, 또는 플레이어가 자체적으로 잘 처리하지 못하는 리디렉션 게이트웨이에 도달할 때 사용하세요.\n\n추가 확인 없이도 스트림이 이미 잘 재생되거나 시작 지연을 최소화하고 싶다면 끄세요. 켜면 재생 시작 전에 약간의 지연이 생길 수 있습니다.
configWideViewHelpTitle=와이드 뷰
configWideViewHelp=와이드 뷰를 사용하면 임베디드 플레이어 레이아웃이 사용 가능한 가로 공간을 더 많이 활용하여 영상 영역이 덜 답답하게 보입니다.\n\n더 큰 화면에서 사용하거나 더 넓은 임베디드 플레이어 레이아웃을 선호할 때 사용하세요.\n\n작은 창이나 좁은 화면에서는 기본 레이아웃이 더 잘 맞으므로 끄는 것이 좋습니다. 이 설정은 플레이어를 더 넓게 보이게 할 수 있지만 재생 품질을 바꾸기 위한 것은 아닙니다.
configEnableFfmpegHelpTitle=FFmpeg 트랜스코딩
configEnableFfmpegHelp=FFmpeg 트랜스코딩을 사용하면 앱이 재생 전에 FFmpeg로 스트림을 다시 인코딩할 수 있습니다.\n\n스트림이 불안정하거나 포맷 변환이 필요하거나 임베디드 플레이어에서 제대로 재생되지 않을 때 사용하세요.\n\n스트림이 이미 잘 재생되고 CPU 사용량을 최소화하고 싶다면 끄세요. 트랜스코딩은 비용이 큰 작업일 수 있습니다.
configEnableLitePlayerFfmpegHelpTitle=Lite 플레이어용 FFmpeg 호환성
configEnableLitePlayerFfmpegHelp=Lite 플레이어용 FFmpeg 호환성은 Lite 플레이어의 직접 백엔드가 잘 처리하지 못하는 스트림에 대해 FFmpeg를 대체 경로로 사용합니다.\n\n문제가 있는 스트림이거나 Lite 플레이어가 안정적으로 재생을 시작하지 못할 때 사용하세요.\n\n이미 직접 잘 작동하는 스트림에는 끄는 것이 좋습니다. 대체 경로는 CPU 부담과 약간의 추가 재생 지연을 늘릴 수 있습니다.

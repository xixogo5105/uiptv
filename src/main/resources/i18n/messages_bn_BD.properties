configVideoPlayersHelpTitle=ভিডিও প্লেয়ার
configVideoPlayersHelp=তিনটি বাহ্যিক ভিডিও প্লেয়ার পর্যন্ত কনফিগার করুন এবং UIPTV কীভাবে স্ট্রিমগুলি খুলবে তা চয়ন করুন৷\n\n• প্রাথমিক, মাধ্যমিক, এবং তৃতীয় প্লেয়ার পাথগুলি প্রতিটি ডেস্কটপ প্লেয়ারের জন্য প্রকৃত এক্সিকিউটেবলের দিকে নির্দেশ করা উচিত।\n\n• নির্বাচিত ডিফল্ট প্লেয়ার হল প্রথম বিকল্প যা UIPTV সাধারণ প্লেব্যাকের জন্য ব্যবহার করে। সেই প্লেয়ারটি অনুপলব্ধ হলে, UIPTV অন্য কনফিগার করা বিকল্পে ফিরে যেতে পারে।\n\n• এমবেডেড প্লেয়ার UIPTV-এর ভিতরে প্লেব্যাক রাখে। বৃহত্তর কোডেক সমর্থনের জন্য VLC মোড ব্যবহার করুন, অথবা যখন আপনি একটি হালকা অন্তর্নির্মিত বিকল্প চান তখন লাইট মোড ব্যবহার করুন৷\n\n• ওয়েব ব্রাউজার প্লেয়ার DRM-সুরক্ষিত স্ট্রীম বা পরিষেবাগুলির জন্য দরকারী যেগুলি শুধুমাত্র একটি ব্রাউজারে নির্ভরযোগ্যভাবে কাজ করে৷\n\n• ওয়াইড ভিউ এমবেডেড-প্লেয়ার এলাকাকে বড় করে, এবং রিসোলভ রিডাইরেক্ট চেইন সাহায্য করে যখন কোনো প্রদানকারী HLS মাস্টার প্লেলিস্ট, ছোট লিঙ্ক, বা বহু-পদক্ষেপ পুনঃনির্দেশ ব্যবহার করে।\n\nপ্লেয়ার পাথ পরিবর্তন করার পরে, যাচাই করুন যে প্রতিটি পাথ এই মেশিনে সঠিক অ্যাপ্লিকেশন চালু করে।
configFiltersHelpTitle=প্যারেন্টাল লক
configFiltersHelpText=কীওয়ার্ড দ্বারা বিভাগ এবং চ্যানেল লুকিয়ে রাখতে এবং পাসওয়ার্ড দিয়ে সেই নিয়মগুলি রক্ষা করতে এই বিভাগটি ব্যবহার করুন।\n\n• ব্লক করা ক্যাটাগরি কীওয়ার্ড মিলে যাওয়া ক্যাটাগরির নামগুলো লুকিয়ে রাখে।\n\n• ব্লক করা চ্যানেল কীওয়ার্ড মিলিত চ্যানেলের নাম লুকায়।\n\n• আপনি যদি অন্য ব্যবহারকারীরা এই ফিল্টারগুলি পড়তে, পরিবর্তন করতে বা সাময়িকভাবে বিরতি দিতে না চান তবে একটি অভিভাবকীয় লক পাসওয়ার্ড সেট করুন৷\n\n• যখন লকটি সক্রিয় থাকে, তখন UIPTV-এর জন্য কন্টেন্ট খোলার আগে পাসওয়ার্ডের প্রয়োজন হতে পারে যা Stalker পোর্টাল সেন্সর করা হিসাবে চিহ্নিত করে।\n\nবিস্তৃত কীওয়ার্ড সাবধানে ব্যবহার করুন. সংক্ষিপ্ত বা সাধারণ শব্দ প্রত্যাশার চেয়ে অনেক বেশি বিষয়বস্তু লুকাতে পারে।
configThemeHelpTitle=থিম এবং চেহারা
configThemeHelp=UIPTV এর চাক্ষুষ চেহারা নিয়ন্ত্রণ করতে এবং আপনি যে স্ক্রিনে ব্যবহার করছেন তার সাথে ইন্টারফেসটিকে মানিয়ে নিতে এই বিভাগটি ব্যবহার করুন।\n\n• ডার্ক থিম অ্যাপ্লিকেশনটিকে হালকা এবং অন্ধকার প্যালেটের মধ্যে পরিবর্তন করে।\n\n• ভিডিও থাম্বনেলগুলি ব্রাউজিং উন্নত করতে পারে, কিন্তু সেগুলিকে অক্ষম করা হলে তা ভিজ্যুয়াল বিশৃঙ্খলতা কমাতে পারে এবং ধীরগতির সিস্টেমগুলিকে সাহায্য করতে পারে৷\n\n• ভাষা মেনু, লেবেল এবং ডায়ালগের জন্য UI ভাষা পরিবর্তন করে।\n\n• UI জুম ইন্টারফেসের স্কেল পরিবর্তন করে। উচ্চ-রেজোলিউশন ডিসপ্লেতে বা যখন আপনি বড় নিয়ন্ত্রণ এবং পাঠ্য চান তখন এটি বাড়ান।\n\n• হালকা এবং গাঢ় CSS ওভাররাইড আপনাকে অন্তর্নির্মিত থিমের অংশগুলি প্রতিস্থাপন করতে দেয়। আপনি যদি একটি নিরাপদ সূচনা পয়েন্ট চান তবে প্রথমে টেমপ্লেটটি ডাউনলোড করুন এবং ডিফল্ট থিমে ফিরে যেতে ওভাররাইডগুলি পুনরায় সেট করুন৷
configCacheFilteringHelpTitle=ক্যাশে এবং সেশন ডেটা
configCacheFilteringHelpText=এই বিভাগটি বর্তমান কনফিগারেশনের জন্য প্যারেন্টাল-লক ফিল্টারিং বিরাম দেওয়ার বিকল্পের সাথে অস্থায়ী প্লেব্যাক ডেটা একত্রিত করে।\n\n• প্যারেন্টাল লক বিধিনিষেধগুলিকে বিরতি অস্থায়ীভাবে ব্লক করার নিয়মগুলিকে মুছে না দিয়ে অক্ষম করে৷\n\n• ক্যাশের মেয়াদ শেষ হয়ে যায় তা নিয়ন্ত্রণ করে প্লেব্যাক-সম্পর্কিত ক্যাশে করা ডেটা কতক্ষণ রাখা হবে তা পুরানো হিসাবে বিবেচিত হওয়ার আগে।\n\n• ক্লিয়ার প্লেব্যাক ক্যাশে ক্যাশে করা স্ট্রিম ডেটা সরিয়ে দেয় এবং যখন প্লেব্যাক সেকেলে বা ভাঙা মিডিয়া প্রতিক্রিয়া ব্যবহার করতে থাকে তখন সাহায্য করতে পারে৷\n\n• এখন দেখার ইতিহাস সাফ করুন সংরক্ষিত ইন-প্রোগ্রেস দেখার তালিকা সরিয়ে দেয়।\n\n• পুনঃলোড অ্যাকাউন্ট ডেটা ক্যাশে ক্যাশে করা অ্যাকাউন্টের ডেটা রিফ্রেশ করে যখন পোর্টাল-সাইড ডেটা পরিবর্তিত হয় এবং বর্তমান স্থানীয় ক্যাশে পুরানো হয়৷
configDatabaseSyncHelpTitle=ডাটাবেস সিঙ্ক
configDatabaseSyncHelpText=আমদানি এবং রপ্তানি আপনাকে আপনার UIPTV ডেটা ব্যাকআপ বা বিভিন্ন UIPTV ইনস্টলেশনের মধ্যে স্থানান্তর করতে দেয়।\n\n• আমদানি বর্তমান ইনস্টলেশনে একটি ডাটাবেস স্ন্যাপশট পড়ে।\n\n• রপ্তানি একটি স্ন্যাপশটে বর্তমান ডেটা লেখে যা স্থানীয়ভাবে সংরক্ষণ করা যেতে পারে বা অন্য UIPTV উদাহরণে পাঠানো যেতে পারে।\n\n• সিঙ্ক ফ্লোতে অ্যাকাউন্ট, বুকমার্ক এবং ঐচ্ছিক কনফিগারেশন ডেটা অন্তর্ভুক্ত থাকতে পারে, সিঙ্ক ডায়ালগে আপনি যে পছন্দগুলি করেন তার উপর নির্ভর করে৷\n\n• রিমোট সিঙ্কের জন্য ডেটা স্থানান্তর করার আগে অন্য মেশিনের কাছে পৌঁছানো এবং অনুমোদিত হতে হবে।\n\n• ডাটাবেস সিঙ্ক একটি একমুখী মার্জ। নতুন বা পরিবর্তিত উৎস রেকর্ড কপি করা হয়, কিন্তু উৎস থেকে মুছে ফেলা স্বয়ংক্রিয়ভাবে প্রয়োগ করা হয় না।
configFfmpegAndWebServerHelpTitle=FFmpeg এবং অভ্যন্তরীণ ওয়েব সার্ভার
configFfmpegAndWebServerHelpText=এই বিভাগটি ব্যবহার করুন যখন কোনো স্ট্রিমের জন্য প্রিপ্রসেসিং, ব্রাউজার ডেলিভারি বা UIPTV-এর স্থানীয় ওয়েব টুলের মাধ্যমে অ্যাক্সেসের প্রয়োজন হয়।\n\n• যখন একটি স্ট্রীমের ফর্ম্যাট রূপান্তর প্রয়োজন হয় বা স্বাভাবিক পথে অবিশ্বাস্যভাবে প্লে হয় তখন FFmpeg ট্রান্সকোডিং সক্ষম করুন৷\n\n• লাইট প্লেয়ারের জন্য FFmpeg সামঞ্জস্য সক্ষম করুন স্ট্রীমগুলির জন্য একটি FFmpeg-ভিত্তিক ফলব্যাক যোগ করে যা লাইট প্লেয়ার সরাসরি পরিচালনা করতে পারে না৷\n\n• অভ্যন্তরীণ ওয়েব সার্ভার ব্রাউজার প্লেয়ার, ওয়েব অ্যাপ, ডিআরএম প্রবাহ এবং দূরবর্তী সিঙ্ক বৈশিষ্ট্যগুলির জন্য স্থানীয় প্লেব্যাক রুট প্রকাশ করে।\n\n• এই মেশিনে সার্ভার পোর্ট বিনামূল্যে হতে হবে। আপনি যদি এটি পরিবর্তন করেন, স্থানীয়ভাবে UIPTV-এর সাথে সংযোগকারী সব জায়গায় নতুন ঠিকানা ব্যবহার করুন।\n\n• M3U8 প্লেলিস্ট প্রকাশ করুন একটি স্থানীয় প্লেলিস্ট এন্ডপয়েন্ট তৈরি করে যা UIPTV চলাকালীন অন্যান্য প্লেয়ার বা টুল খুলতে পারে।\n\nআপনার প্রয়োজন না হলে FFmpeg বৈশিষ্ট্যগুলি বন্ধ রাখুন। তারা CPU ব্যবহার এবং শুরুর সময় বাড়াতে পারে।
configTmdbMetadataHelpTitle=TMDB মেটাডেটা
configTmdbMetadataHelpText=যদি আপনি UIPTV সিনেমা এবং সিরিজের জন্য আরও সমৃদ্ধ মেটাডেটা আনতে চান তাহলে এখানে একটি TMDB রিড অ্যাক্সেস টোকেন যোগ করুন।\n\n• TMDB মেটাডেটা স্থানীয় শিরোনাম, প্লট, জেনার, আর্টওয়ার্ক রেফারেন্স এবং অন্যান্য বর্ণনামূলক বিবরণ অন্তর্ভুক্ত করতে পারে।\n\n• টোকেন ঐচ্ছিক। UIPTV এখনও এটি ছাড়া সামগ্রী চালাতে পারে, তবে মেটাডেটা কভারেজ আরও সীমিত হবে।\n\n• যদি আপনার একটি TMDB API অ্যাকাউন্ট তৈরি করার জন্য নির্দেশাবলীর প্রয়োজন হয় তবে গাইড লিঙ্কটি ব্যবহার করুন এবং একটি বিদ্যমান পঠিত অ্যাক্সেস টোকেন অনুলিপি করতে অ্যাকাউন্ট লিঙ্কটি ব্যবহার করুন৷\n\n• যদি মেটাডেটা ফলাফলগুলি ভুল মনে হয়, তাহলে যাচাই করুন যে টোকেনটি বৈধ এবং নির্বাচিত UI ভাষা আপনার প্রত্যাশিত মেটাডেটা ভাষার সাথে মেলে৷\n\nটোকেনটিকে একটি ব্যক্তিগত শংসাপত্রের মতো বিবেচনা করুন এবং যদি আপনি বিশ্বাস করেন যে এটি ভুলবশত শেয়ার করা হয়েছে তবে এটি প্রতিস্থাপন করুন।

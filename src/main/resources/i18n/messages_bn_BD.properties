configResolveChainAndDeepRedirectsHelpTitle=রিডাইরেক্ট চেইন সমাধান করুন
configResolveChainAndDeepRedirectsHelp=এই অপশনটি প্লেব্যাক শুরুর আগে অ্যাপকে HLS প্লেলিস্ট চেইন সমাধান করতে এবং আরও গভীর রিডাইরেক্ট চেইন অনুসরণ করতে সাহায্য করে।\n\nযখন কোনো স্ট্রিম মাস্টার প্লেলিস্ট, আপেক্ষিক HLS ভ্যারিয়েন্ট, বা এমন রিডাইরেক্টিং গেটওয়েতে পৌঁছায় যা প্লেয়ার নিজে ভালোভাবে সামলাতে পারে না, তখন এটি ব্যবহার করুন।\n\nআপনার স্ট্রিম অতিরিক্ত অনুসন্ধান ছাড়াই ঠিকমতো চললে, বা আপনি যদি সবচেয়ে কম স্টার্টআপ বিলম্ব চান, তবে এটি বন্ধ রাখুন। এটি চালু করলে প্লেব্যাক শুরুর আগে সামান্য দেরি হতে পারে।
configWideViewHelpTitle=ওয়াইড ভিউ
configWideViewHelp=ওয়াইড ভিউ এমবেডেড প্লেয়ারের লেআউটকে আরও বেশি প্রস্থ ব্যবহার করতে দেয়, ফলে ভিডিও এলাকা কম চেপে থাকা মনে হয়।\n\nবড় স্ক্রিনে বা আপনি যদি আরও প্রশস্ত এমবেডেড প্লেয়ার লেআউট পছন্দ করেন, তখন এটি ব্যবহার করুন।\n\nছোট উইন্ডো বা সরু ডিসপ্লেতে এটি বন্ধ রাখুন, যেখানে ডিফল্ট লেআউট সহজে মানিয়ে যায়। এই সেটিং প্লেয়ারকে আরও চওড়া দেখাতে পারে, কিন্তু এটি প্লেব্যাকের মান বদলানোর জন্য নয়।
configEnableFfmpegHelpTitle=FFmpeg ট্রান্সকোডিং
configEnableFfmpegHelp=FFmpeg ট্রান্সকোডিং অ্যাপকে প্লেব্যাকের আগে FFmpeg দিয়ে স্ট্রিম পুনরায় এনকোড করতে দেয়।\n\nযখন কোনো স্ট্রিম অস্থির হয়, ফরম্যাট রূপান্তর দরকার হয়, বা এমবেডেড প্লেয়ারে ঠিকমতো চলে না, তখন এটি ব্যবহার করুন।\n\nস্ট্রিম যদি আগেই মসৃণভাবে চলে এবং আপনি কম CPU ব্যবহার চান, তবে এটি বন্ধ রাখুন, কারণ ট্রান্সকোডিং ব্যয়বহুল হতে পারে।
configEnableLitePlayerFfmpegHelpTitle=Lite প্লেয়ারের জন্য FFmpeg সামঞ্জস্য
configEnableLitePlayerFfmpegHelp=Lite প্লেয়ারের জন্য FFmpeg সামঞ্জস্য এমন স্ট্রিমের ক্ষেত্রে FFmpeg-কে ফলব্যাক পথ হিসেবে ব্যবহার করে, যেগুলো Lite প্লেয়ারের সরাসরি ব্যাকএন্ড ভালোভাবে সামলাতে পারে না।\n\nসমস্যাযুক্ত স্ট্রিমে বা যখন Lite প্লেয়ার নির্ভরযোগ্যভাবে প্লেব্যাক শুরু করতে ব্যর্থ হয়, তখন এটি ব্যবহার করুন।\n\nযে স্ট্রিমগুলো সরাসরি ঠিকমতো চলে, সেগুলোর জন্য এটি বন্ধ রাখুন, কারণ ফলব্যাক পথ CPU খরচ এবং সামান্য অতিরিক্ত বিলম্ব যোগ করতে পারে।

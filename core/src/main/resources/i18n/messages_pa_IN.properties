configVideoPlayersHelpTitle=ਵੀਡੀਓ ਪਲੇਅਰ
configFiltersHelpTitle=ਮਾਪਿਆਂ ਦਾ ਲਾਕ
configFiltersHelpText=ਕੀਵਰਡ ਦੁਆਰਾ ਸ਼੍ਰੇਣੀਆਂ ਅਤੇ ਚੈਨਲਾਂ ਨੂੰ ਲੁਕਾਉਣ ਲਈ ਅਤੇ ਉਹਨਾਂ ਨਿਯਮਾਂ ਨੂੰ ਪਾਸਵਰਡ ਨਾਲ ਸੁਰੱਖਿਅਤ ਕਰਨ ਲਈ ਇਸ ਸੈਕਸ਼ਨ ਦੀ ਵਰਤੋਂ ਕਰੋ।\n\n• ਬਲੌਕ ਕੀਤੀ ਸ਼੍ਰੇਣੀ ਦੇ ਕੀਵਰਡ ਮੇਲ ਖਾਂਦੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਨੂੰ ਲੁਕਾਉਂਦੇ ਹਨ।\n\n• ਬਲੌਕ ਕੀਤੇ ਚੈਨਲ ਕੀਵਰਡ ਮੇਲ ਖਾਂਦੇ ਚੈਨਲ ਦੇ ਨਾਮ ਲੁਕਾਉਂਦੇ ਹਨ।\n\n• ਜੇਕਰ ਤੁਸੀਂ ਨਹੀਂ ਚਾਹੁੰਦੇ ਹੋ ਕਿ ਹੋਰ ਉਪਯੋਗਕਰਤਾ ਇਹਨਾਂ ਫਿਲਟਰਾਂ ਨੂੰ ਪੜ੍ਹਣ, ਬਦਲਣ ਜਾਂ ਅਸਥਾਈ ਤੌਰ 'ਤੇ ਰੋਕ ਦੇਣ ਤਾਂ ਇੱਕ ਮਾਤਾ-ਪਿਤਾ ਦਾ ਲਾਕ ਪਾਸਵਰਡ ਸੈੱਟ ਕਰੋ।\n\n• ਜਦੋਂ ਲਾਕ ਕਿਰਿਆਸ਼ੀਲ ਹੁੰਦਾ ਹੈ, ਤਾਂ UIPTV ਸਮੱਗਰੀ ਨੂੰ ਖੋਲ੍ਹਣ ਤੋਂ ਪਹਿਲਾਂ ਪਾਸਵਰਡ ਦੀ ਲੋੜ ਵੀ ਕਰ ਸਕਦਾ ਹੈ ਜਿਸਨੂੰ ਸਟਾਲਕਰ ਪੋਰਟਲ ਸੈਂਸਰ ਕੀਤਾ ਗਿਆ ਹੈ।\n\nਵਿਆਪਕ ਕੀਵਰਡਸ ਨੂੰ ਧਿਆਨ ਨਾਲ ਵਰਤੋ। ਛੋਟੇ ਜਾਂ ਆਮ ਸ਼ਬਦ ਉਮੀਦ ਨਾਲੋਂ ਬਹੁਤ ਜ਼ਿਆਦਾ ਸਮੱਗਰੀ ਨੂੰ ਲੁਕਾ ਸਕਦੇ ਹਨ।
configThemeHelpTitle=ਥੀਮ ਅਤੇ ਦਿੱਖ
configCacheFilteringHelpTitle=ਕੈਸ਼ ਅਤੇ ਸੈਸ਼ਨ ਡਾਟਾ
configCacheFilteringHelpText=ਇਹ ਭਾਗ ਮੌਜੂਦਾ ਸੰਰਚਨਾ ਲਈ ਪੇਰੈਂਟਲ-ਲਾਕ ਫਿਲਟਰਿੰਗ ਨੂੰ ਰੋਕਣ ਦੇ ਵਿਕਲਪ ਦੇ ਨਾਲ ਅਸਥਾਈ ਪਲੇਬੈਕ ਡੇਟਾ ਨੂੰ ਜੋੜਦਾ ਹੈ।\n\n• ਪੇਰੈਂਟਲ ਲਾਕ ਪਾਬੰਦੀਆਂ ਨੂੰ ਰੋਕੋ, ਉਹਨਾਂ ਨੂੰ ਮਿਟਾਏ ਬਿਨਾਂ ਬਲੌਕ ਕਰਨ ਵਾਲੇ ਨਿਯਮਾਂ ਨੂੰ ਅਸਥਾਈ ਤੌਰ 'ਤੇ ਅਸਮਰੱਥ ਬਣਾਉਂਦਾ ਹੈ।\n\n• ਕੈਸ਼ ਦੀ ਮਿਆਦ ਇਹ ਨਿਯੰਤਰਿਤ ਕਰਦੀ ਹੈ ਕਿ ਪਲੇਬੈਕ-ਸਬੰਧਤ ਕੈਸ਼ ਕੀਤੇ ਡੇਟਾ ਨੂੰ ਪੁਰਾਣਾ ਮੰਨਿਆ ਜਾਣ ਤੋਂ ਪਹਿਲਾਂ ਕਿੰਨਾ ਸਮਾਂ ਰੱਖਿਆ ਜਾਂਦਾ ਹੈ।\n\n• ਕਲੀਅਰ ਪਲੇਬੈਕ ਕੈਸ਼ ਕੈਸ਼ ਕੀਤੇ ਸਟ੍ਰੀਮ ਡੇਟਾ ਨੂੰ ਹਟਾ ਦਿੰਦਾ ਹੈ ਅਤੇ ਜਦੋਂ ਪਲੇਬੈਕ ਪੁਰਾਣੇ ਜਾਂ ਟੁੱਟੇ ਹੋਏ ਮੀਡੀਆ ਜਵਾਬਾਂ ਦੀ ਵਰਤੋਂ ਕਰਨਾ ਜਾਰੀ ਰੱਖਦਾ ਹੈ ਤਾਂ ਮਦਦ ਕਰ ਸਕਦਾ ਹੈ।\n\n• ਹੁਣੇ ਦੇਖਣ ਦਾ ਇਤਿਹਾਸ ਸਾਫ਼ ਕਰੋ, ਸੰਭਾਲੀ ਹੋਈ ਪ੍ਰਗਤੀ ਵਿੱਚ ਦੇਖਣ ਵਾਲੀ ਸੂਚੀ ਨੂੰ ਹਟਾ ਦਿੰਦਾ ਹੈ।\n\n• ਜਦੋਂ ਪੋਰਟਲ-ਸਾਈਡ ਡੇਟਾ ਬਦਲ ਗਿਆ ਹੈ ਅਤੇ ਮੌਜੂਦਾ ਸਥਾਨਕ ਕੈਸ਼ ਪੁਰਾਣਾ ਹੈ ਤਾਂ ਖਾਤਾ ਡੇਟਾ ਕੈਸ਼ ਕੈਸ਼ ਕੀਤੇ ਖਾਤੇ ਦੇ ਡੇਟਾ ਨੂੰ ਮੁੜ ਲੋਡ ਕਰਦਾ ਹੈ।
configDatabaseSyncHelpTitle=ਬੈਕਅੱਪ ਅਤੇ ਰੀਸਟੋਰ
configDatabaseSyncHelpText=ਬੈਕਅੱਪ ਬਣਾਓ ਮੈਟਾਡਾਟਾ ਅਤੇ ਡਾਟਾਬੇਸ ਫਾਈਲ ਵਾਲਾ ਪੂਰਾ UIPTV ਬੈਕਅੱਪ ਆਰਕਾਈਵ ਲਿਖਦਾ ਹੈ। ਆਰਕਾਈਵ ਡੈਸਕਟਾਪ ਜਾਂ Android ਤੇ ਰੀਸਟੋਰ ਕੀਤਾ ਜਾ ਸਕਦਾ ਹੈ।\n\n• ਬੈਕਅੱਪ ਰੀਸਟੋਰ ਕਰੋ ਇਸ ਇੰਸਟਾਲੇਸ਼ਨ ਦੇ ਸਥਾਨਕ ਡਾਟਾਬੇਸ ਨੂੰ ਚੁਣੇ ਬੈਕਅੱਪ ਆਰਕਾਈਵ ਨਾਲ ਬਦਲਦਾ ਹੈ।\n\n• ਡੈਸਕਟਾਪ ਪੁਰਾਣੀ raw UIPTV .db ਫਾਈਲ ਵੀ ਰੀਸਟੋਰ ਲਈ ਸਵੀਕਾਰ ਕਰਦਾ ਹੈ, ਪਰ ਨਵੇਂ ਬੈਕਅੱਪ .zip ਆਰਕਾਈਵ ਵਜੋਂ ਸੰਭਾਲੇ ਜਾਂਦੇ ਹਨ।\n\n• ਰਿਮੋਟ ਮੋਡ ਹਾਲੇ ਵੀ ਮਸ਼ੀਨਾਂ ਵਿਚਕਾਰ ਇਕ-ਪਾਸਾ ਸਿੰਕ ਕਰਦਾ ਹੈ ਅਤੇ ਖਾਤੇ, ਬੁੱਕਮਾਰਕ ਅਤੇ ਵਿਕਲਪੀ ਕਨਫਿਗਰੇਸ਼ਨ ਡਾਟਾ ਸ਼ਾਮਲ ਕਰ ਸਕਦਾ ਹੈ।\n\n• ਰਿਮੋਟ ਸਿੰਕ ਲਈ ਡਾਟਾ ਭੇਜਣ ਤੋਂ ਪਹਿਲਾਂ ਦੂਜੀ ਮਸ਼ੀਨ ਪਹੁੰਚਯੋਗ ਅਤੇ ਮਨਜ਼ੂਰ ਹੋਣੀ ਚਾਹੀਦੀ ਹੈ।
configTmdbMetadataHelpTitle=TMDB ਮੈਟਾਡੇਟਾ
configTmdbMetadataHelpText=ਇੱਥੇ ਇੱਕ TMDB ਰੀਡ ਐਕਸੈਸ ਟੋਕਨ ਸ਼ਾਮਲ ਕਰੋ ਜੇਕਰ ਤੁਸੀਂ ਚਾਹੁੰਦੇ ਹੋ ਕਿ UIPTV ਫਿਲਮਾਂ ਅਤੇ ਸੀਰੀਜ਼ ਲਈ ਅਮੀਰ ਮੈਟਾਡੇਟਾ ਪ੍ਰਾਪਤ ਕਰੇ।\n\n• TMDB ਮੈਟਾਡੇਟਾ ਵਿੱਚ ਸਥਾਨਿਕ ਸਿਰਲੇਖ, ਪਲਾਟ, ਸ਼ੈਲੀਆਂ, ਆਰਟਵਰਕ ਹਵਾਲੇ, ਅਤੇ ਹੋਰ ਵਰਣਨਯੋਗ ਵੇਰਵੇ ਸ਼ਾਮਲ ਹੋ ਸਕਦੇ ਹਨ।\n\n• ਟੋਕਨ ਵਿਕਲਪਿਕ ਹੈ। UIPTV ਅਜੇ ਵੀ ਇਸ ਤੋਂ ਬਿਨਾਂ ਸਮੱਗਰੀ ਚਲਾ ਸਕਦਾ ਹੈ, ਪਰ ਮੈਟਾਡੇਟਾ ਕਵਰੇਜ ਵਧੇਰੇ ਸੀਮਤ ਹੋਵੇਗੀ।\n\n• ਜੇਕਰ ਤੁਹਾਨੂੰ ਇੱਕ TMDB API ਖਾਤਾ ਬਣਾਉਣ ਲਈ ਨਿਰਦੇਸ਼ਾਂ ਦੀ ਲੋੜ ਹੈ ਤਾਂ ਗਾਈਡ ਲਿੰਕ ਦੀ ਵਰਤੋਂ ਕਰੋ, ਅਤੇ ਮੌਜੂਦਾ ਰੀਡ ਐਕਸੈਸ ਟੋਕਨ ਨੂੰ ਕਾਪੀ ਕਰਨ ਲਈ ਖਾਤਾ ਲਿੰਕ ਦੀ ਵਰਤੋਂ ਕਰੋ।\n\n• ਜੇਕਰ ਮੈਟਾਡੇਟਾ ਨਤੀਜੇ ਗਲਤ ਲੱਗਦੇ ਹਨ, ਤਾਂ ਪੁਸ਼ਟੀ ਕਰੋ ਕਿ ਟੋਕਨ ਵੈਧ ਹੈ ਅਤੇ ਚੁਣੀ ਗਈ UI ਭਾਸ਼ਾ ਉਸ ਮੈਟਾਡੇਟਾ ਭਾਸ਼ਾ ਨਾਲ ਮੇਲ ਖਾਂਦੀ ਹੈ ਜਿਸਦੀ ਤੁਸੀਂ ਉਮੀਦ ਕਰਦੇ ਹੋ।\n\nਟੋਕਨ ਨੂੰ ਇੱਕ ਨਿੱਜੀ ਪ੍ਰਮਾਣ ਪੱਤਰ ਵਾਂਗ ਵਰਤੋ ਅਤੇ ਜੇਕਰ ਤੁਹਾਨੂੰ ਲੱਗਦਾ ਹੈ ਕਿ ਇਹ ਗਲਤੀ ਨਾਲ ਸਾਂਝਾ ਕੀਤਾ ਗਿਆ ਹੈ ਤਾਂ ਇਸਨੂੰ ਬਦਲ ਦਿਓ।
categoryRemoveSelectedFromCache=ਚੁਣੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਕੈਸ਼ ਤੋਂ ਹਟਾਓ
categoryRemoveCachedTitle=ਕੈਸ਼ ਕੀਤੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਹਟਾਓ
categoryRemoveCachedConfirmMessage=ਤੁਸੀਂ {0} ਕੈਸ਼ ਕੀਤੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਹਟਾਉਣ ਵਾਲੇ ਹੋ। ਇਨ੍ਹਾਂ ਸ਼੍ਰੇਣੀਆਂ ਵਿੱਚ ਕੈਸ਼ ਕੀਤੇ {1} ਵੀ ਹਟਾਏ ਜਾਣਗੇ। ਬੁੱਕਮਾਰਕ ਅਤੇ ਹੁਣ ਵੇਖ ਰਹੇ ਹੋ ਐਂਟਰੀਆਂ ਰਹਿਣਗੀਆਂ। ਸ਼੍ਰੇਣੀਆਂ ਵਾਪਸ ਲਿਆਉਣ ਲਈ ਇਸ ਖਾਤੇ ਦਾ ਕੈਸ਼ ਰਿਫ੍ਰੈਸ਼ ਕਰੋ। ਹਟਾਉਣ ਲਈ OK ਦਬਾਓ।
categoryRemoveCachedNoSelection=ਹਟਾਉਣ ਲਈ ਇੱਕ ਜਾਂ ਵੱਧ ਕੈਸ਼ ਕੀਤੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਚੁਣੋ।
categoryRemoveCachedSuccess={0} ਕੈਸ਼ ਕੀਤੀਆਂ ਸ਼੍ਰੇਣੀਆਂ ਅਤੇ {1} ਕੈਸ਼ ਕੀਤੀਆਂ ਆਈਟਮਾਂ ਹਟਾਈਆਂ ਗਈਆਂ।

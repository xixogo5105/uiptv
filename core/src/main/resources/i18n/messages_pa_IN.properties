configResolveChainAndDeepRedirects=ਰੀਡਾਇਰੈਕਟ ਲੜੀਆਂ ਹੱਲ ਕਰੋ
configResolveChainAndDeepRedirectsHelpTitle=ਰੀਡਾਇਰੈਕਟ ਲੜੀਆਂ ਹੱਲ ਕਰੋ
configResolveChainAndDeepRedirectsHelp=ਇਹ ਵਿਕਲਪ ਐਪ ਨੂੰ ਪਲੇਬੈਕ ਤੋਂ ਪਹਿਲਾਂ HLS ਪਲੇਲਿਸਟ ਲੜੀਆਂ ਹੱਲ ਕਰਨ ਅਤੇ ਹੋਰ ਡੂੰਘੀਆਂ ਰੀਡਾਇਰੈਕਟ ਲੜੀਆਂ ਦਾ ਪਿੱਛਾ ਕਰਨ ਦਿੰਦਾ ਹੈ।\n\nਇਸਨੂੰ ਉਹਨਾਂ ਵੇਲਿਆਂ ਤੇ ਵਰਤੋ ਜਦੋਂ ਕੋਈ ਸਟ੍ਰੀਮ ਮਾਸਟਰ ਪਲੇਲਿਸਟ, ਰਿਲੇਟਿਵ HLS ਵੈਰੀਐਂਟ ਜਾਂ ਐਸੇ ਰੀਡਾਇਰੈਕਟਿੰਗ ਗੇਟਵੇ 'ਤੇ ਪਹੁੰਚਦੀ ਹੋਵੇ ਜਿਸਨੂੰ ਪਲੇਅਰ ਆਪਣੇ ਆਪ ਚੰਗੀ ਤਰ੍ਹਾਂ ਨਹੀਂ ਸੰਭਾਲਦਾ।\n\nਜੇ ਤੁਹਾਡੀਆਂ ਸਟ੍ਰੀਮਾਂ ਬਿਨਾਂ ਵਾਧੂ ਜਾਂਚ ਦੇ ਪਹਿਲਾਂ ਹੀ ਠੀਕ ਚੱਲ ਰਹੀਆਂ ਹਨ ਜਾਂ ਤੁਸੀਂ ਸਭ ਤੋਂ ਘੱਟ ਸ਼ੁਰੂਆਤੀ ਦੇਰੀ ਚਾਹੁੰਦੇ ਹੋ, ਤਾਂ ਇਸਨੂੰ ਬੰਦ ਰੱਖੋ। ਇਸਨੂੰ ਚਾਲੂ ਕਰਨ ਨਾਲ ਪਲੇਬੈਕ ਸ਼ੁਰੂ ਹੋਣ ਤੋਂ ਪਹਿਲਾਂ ਹਲਕੀ ਦੇਰੀ ਆ ਸਕਦੀ ਹੈ।
configWideViewHelpTitle=ਵਾਇਡ ਵਿਊ
configWideViewHelp=ਵਾਇਡ ਵਿਊ ਐਂਬੈਡਡ ਪਲੇਅਰ ਲੇਆਉਟ ਨੂੰ ਉਪਲਬਧ ਚੌੜਾਈ ਦਾ ਵੱਧ ਹਿੱਸਾ ਵਰਤਣ ਦਿੰਦੀ ਹੈ, ਤਾਂ ਜੋ ਵੀਡੀਓ ਖੇਤਰ ਘੱਟ ਤੰਗ ਮਹਿਸੂਸ ਹੋਵੇ।\n\nਇਸਨੂੰ ਵੱਡੀਆਂ ਸਕ੍ਰੀਨਾਂ 'ਤੇ ਜਾਂ ਜਦੋਂ ਤੁਸੀਂ ਹੋਰ ਖੁੱਲ੍ਹਾ ਐਂਬੈਡਡ ਪਲੇਅਰ ਲੇਆਉਟ ਚਾਹੁੰਦੇ ਹੋ, ਤਦ ਵਰਤੋ।\n\nਛੋਟੀਆਂ ਵਿੰਡੋਆਂ ਜਾਂ ਤੰਗ ਡਿਸਪਲੇਅ 'ਤੇ ਇਸਨੂੰ ਬੰਦ ਰੱਖੋ, ਜਿੱਥੇ ਮਿਆਰੀ ਲੇਆਉਟ ਵਧੀਆ ਫਿੱਟ ਹੁੰਦਾ ਹੈ। ਇਹ ਸੈਟਿੰਗ ਪਲੇਅਰ ਨੂੰ ਹੋਰ ਚੌੜਾ ਦਿਖਾ ਸਕਦੀ ਹੈ, ਪਰ ਇਸਦਾ ਮਕਸਦ ਪਲੇਬੈਕ ਗੁਣਵੱਤਾ ਬਦਲਣਾ ਨਹੀਂ ਹੈ।

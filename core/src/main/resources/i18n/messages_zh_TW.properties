configVideoPlayersHelpTitle=影片播放器
configFiltersHelpTitle=家長鎖
configFiltersHelpText=使用此部分可以按關鍵字隱藏類別和頻道，並使用密碼保護這些規則。\n\n• 被封鎖的類別關鍵字會隱藏符合的類別名稱。\n\n• 被封鎖的頻道關鍵字會隱藏符合的頻道名稱。\n\n• 如果您不希望其他使用者讀取、變更或暫時暫停這些篩選器，請設定家長鎖定密碼。\n\n• 當鎖定處於活動狀態時，UIPTV 也可以在開啟 Stalker 入口網站標記為已審查的內容之前要求輸入密碼。\n\n謹慎使用寬泛的關鍵字。簡短或通用的單字可能隱藏比預期更多的內容。
configThemeHelpTitle=主題與外觀
configCacheFilteringHelpTitle=快取和會話數據
configCacheFilteringHelpText=此部分將臨時播放資料與暫停目前配置的家長鎖定過濾的選項結合。\n\n• 暫停家長鎖定限制會暫時停用封鎖規則，而不會刪除它們。\n\n• 快取過期控制與播放相關的快取資料在被視為過時之前保留的時間。\n\n• 清除播放快取可刪除快取的串流數據，並可在播放持續使用過時或損壞的媒體回應時提供協助。\n\n• 清除立即觀看歷史記錄會刪除已儲存的正在進行的觀看清單。\n\n• 重新載入帳戶資料快取會在入口網站端資料發生變更且目前本機快取已過期時刷新快取的帳戶資料。
configDatabaseSyncHelpTitle=備份與還原
configDatabaseSyncHelpText=建立備份會寫入包含中繼資料和資料庫檔案的完整 UIPTV 備份封存。該封存可在桌面版或 Android 上還原。\n\n• 還原備份會以所選備份封存取代此安裝的本機資料庫。\n\n• 桌面版也接受較舊的原始 UIPTV .db 檔案進行還原，但新備份會儲存為 .zip 封存。\n\n• 遠端模式仍會在電腦之間執行單向同步，並可包含帳戶、書籤和選用設定資料。\n\n• 遠端同步要求另一台電腦在傳輸資料前可存取並獲得批准。
configTmdbMetadataHelpTitle=TMDB元數據
configTmdbMetadataHelpText=如果您希望 UIPTV 獲取更豐富的電影和電視劇元數據，請在此處新增 TMDB 讀取存取權杖。\n\n• TMDB 元資料可以包括在地化的標題、情節、流派、藝術作品參考和其他描述性細節。\n\n• 令牌是可選的。沒有它，UIPTV 仍然可以播放內容，但元資料覆蓋範圍將更加有限。\n\n• 如果您需要建立TMDB API 帳戶的說明，請使用指南鏈接，並使用帳戶連結複製現有的讀取存取權杖。\n\n• 如果元資料結果看起來不正確，請驗證令牌是否有效以及所選的UI 語言是否與您期望的元資料語言相符。\n\n將令牌視為私人憑證，如果您認為它已被意外共享，請將其替換。

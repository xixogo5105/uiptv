configResolveChainAndDeepRedirectsHelpTitle=Phân giải chuỗi chuyển hướng
configResolveChainAndDeepRedirectsHelp=Tùy chọn này khiến ứng dụng phân giải chuỗi danh sách phát HLS và theo các chuỗi chuyển hướng sâu hơn trước khi phát.\n\nHãy dùng khi luồng đi tới một danh sách phát chính, các biến thể HLS tương đối hoặc một cổng chuyển hướng mà trình phát không tự xử lý tốt.\n\nHãy để tắt nếu các luồng của bạn đã phát đúng mà không cần dò thêm, hoặc nếu bạn muốn độ trễ khởi động thấp nhất. Bật tùy chọn này có thể làm chậm nhẹ trước khi bắt đầu phát.
configWideViewHelpTitle=Chế độ xem rộng
configWideViewHelp=Chế độ xem rộng làm cho bố cục trình phát nhúng dùng nhiều chiều ngang khả dụng hơn, để vùng video bớt chật hơn.\n\nHãy dùng trên màn hình lớn hơn hoặc khi bạn muốn bố cục trình phát nhúng rộng rãi hơn.\n\nHãy để tắt trên cửa sổ nhỏ hoặc màn hình hẹp, nơi bố cục chuẩn phù hợp hơn. Thiết lập này có thể làm trình phát trông rộng hơn, nhưng không nhằm thay đổi chất lượng phát.

configFiltersHelpText=Sử dụng phần này để ẩn các danh mục và kênh theo từ khóa cũng như để bảo vệ các quy tắc đó bằng mật khẩu.\n\n• Từ khóa danh mục bị chặn ẩn tên danh mục phù hợp.\n\n• Từ khóa kênh bị chặn ẩn tên kênh phù hợp.\n\n• Đặt mật khẩu khóa cha mẹ nếu bạn không muốn người dùng khác đọc, thay đổi hoặc tạm dừng các bộ lọc này.\n\n• Khi khóa được kích hoạt, UIPTV cũng có thể yêu cầu mật khẩu trước khi mở nội dung mà cổng Stalker đánh dấu là đã kiểm duyệt.\n\nSử dụng từ khóa rộng một cách cẩn thận. Những từ ngắn hoặc chung chung có thể ẩn chứa nhiều nội dung hơn mong đợi.
configThemeHelpTitle=Chủ đề và diện mạo
configCacheFilteringHelpTitle=Dữ liệu bộ đệm và phiên
configCacheFilteringHelpText=Phần này kết hợp dữ liệu phát lại tạm thời với tùy chọn tạm dừng lọc khóa phụ huynh cho cấu hình hiện tại.\n\n• Tạm dừng hạn chế khóa của phụ huynh tạm thời vô hiệu hóa các quy tắc chặn mà không xóa chúng.\n\n• Hết hạn bộ nhớ đệm kiểm soát thời gian lưu giữ dữ liệu đã lưu trong bộ nhớ đệm liên quan đến phát lại trước khi dữ liệu đó được coi là cũ.\n\n• Xóa bộ nhớ đệm phát lại sẽ xóa dữ liệu luồng đã lưu trong bộ nhớ đệm và có thể trợ giúp khi quá trình phát lại tiếp tục sử dụng phản hồi phương tiện đã lỗi thời hoặc bị hỏng.\n\n• Xóa lịch sử đang xem sẽ xóa danh sách đang xem đã lưu.\n\n• Tải lại dữ liệu tài khoản Bộ nhớ đệm làm mới dữ liệu tài khoản được lưu trong bộ nhớ đệm khi dữ liệu phía cổng thông tin đã thay đổi và bộ nhớ đệm cục bộ hiện tại đã lỗi thời.
configDatabaseSyncHelpTitle=Sao lưu và khôi phục
configDatabaseSyncHelpText=Tạo sao lưu ghi một tệp sao lưu UIPTV đầy đủ có siêu dữ liệu và tệp cơ sở dữ liệu. Tệp này có thể khôi phục trên desktop hoặc Android.\n\n• Khôi phục sao lưu thay thế cơ sở dữ liệu cục bộ của bản cài đặt này bằng tệp sao lưu đã chọn.\n\n• Desktop cũng chấp nhận tệp UIPTV .db thô cũ để khôi phục, nhưng sao lưu mới được lưu dưới dạng tệp .zip.\n\n• Chế độ từ xa vẫn thực hiện đồng bộ một chiều giữa các máy và có thể bao gồm tài khoản, dấu trang và dữ liệu cấu hình tùy chọn.\n\n• Đồng bộ từ xa yêu cầu máy kia có thể truy cập và được phê duyệt trước khi truyền dữ liệu.
configTmdbMetadataHelpTitle=Siêu dữ liệu TMDB
configTmdbMetadataHelpText=Thêm mã thông báo truy cập đọc TMDB tại đây nếu bạn muốn UIPTV tìm nạp siêu dữ liệu phong phú hơn cho phim và loạt phim.\n\n• Siêu dữ liệu TMDB có thể bao gồm tiêu đề, cốt truyện, thể loại, tài liệu tham khảo tác phẩm nghệ thuật và các chi tiết mô tả khác đã được bản địa hóa.\n\n• Mã thông báo là tùy chọn. UIPTV vẫn có thể phát nội dung mà không có nó nhưng phạm vi phủ sóng siêu dữ liệu sẽ bị hạn chế hơn.\n\n• Sử dụng liên kết hướng dẫn nếu bạn cần hướng dẫn tạo tài khoản API TMDB và sử dụng liên kết tài khoản để sao chép mã thông báo truy cập đọc hiện có.\n\n• Nếu kết quả siêu dữ liệu có vẻ sai, hãy xác minh rằng mã thông báo hợp lệ và ngôn ngữ giao diện người dùng đã chọn khớp với ngôn ngữ siêu dữ liệu mà bạn mong đợi.\n\nHãy coi mã thông báo như thông tin xác thực riêng tư và thay thế nó nếu bạn cho rằng nó đã vô tình bị chia sẻ.

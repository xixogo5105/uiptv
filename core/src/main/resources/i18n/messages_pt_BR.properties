configVideoPlayersHelpTitle=Reprodutores de vídeo
configFiltersHelpTitle=Bloqueio parental
configFiltersHelpText=Use esta seção para ocultar categorias e canais por palavra-chave e proteger essas regras com uma senha.\n\n• Palavras-chave de categorias bloqueadas ocultam nomes de categorias correspondentes.\n\n• Palavras-chave de canais bloqueados ocultam nomes de canais correspondentes.\n\n• Defina uma senha de bloqueio parental se não quiser que outros usuários leiam, alterem ou pausem temporariamente esses filtros.\n\n• Quando o bloqueio está ativo, o UIPTV também pode exigir a senha antes de abrir o conteúdo que o portal Stalker marca como censurado.\n\nUse palavras-chave amplas com cuidado. Palavras curtas ou genéricas podem ocultar muito mais conteúdo do que o esperado.
configThemeHelpTitle=Tema e aparência
configCacheFilteringHelpTitle=Dados de cache e sessão
configCacheFilteringHelpText=Esta seção combina dados de reprodução temporários com a opção de pausar a filtragem de bloqueio parental para a configuração atual.\n\n• Pausar restrições de bloqueio parental desativa temporariamente as regras de bloqueio sem excluí-las.\n\n• A expiração do cache controla por quanto tempo os dados armazenados em cache relacionados à reprodução são mantidos antes de serem tratados como obsoletos.\n\n• Limpar cache de reprodução remove dados de fluxo armazenados em cache e pode ajudar quando a reprodução continua usando respostas de mídia desatualizadas ou quebradas.\n\n• Limpar histórico de exibição agora remove a lista de exibições em andamento salva.\n\n• Recarregar cache de dados da conta atualiza os dados da conta armazenados em cache quando os dados do portal são alterados e o cache local atual está desatualizado.
configDatabaseSyncHelpTitle=Backup e restauração
configDatabaseSyncHelpText=Criar backup grava um arquivo completo do UIPTV com metadados e o arquivo de banco de dados. O arquivo pode ser restaurado no desktop ou no Android.\n\n• Restaurar backup substitui o banco de dados local desta instalação pelo arquivo de backup selecionado.\n\n• O desktop também aceita um arquivo UIPTV .db antigo para restauração, mas novos backups são salvos como arquivos .zip.\n\n• O modo remoto ainda executa uma sincronização unidirecional entre máquinas e pode incluir contas, favoritos e dados de configuração opcionais.\n\n• A sincronização remota exige que a outra máquina esteja acessível e aprovada antes da transferência dos dados.
configTmdbMetadataHelpTitle=Metadados TMDB
configTmdbMetadataHelpText=Adicione um token de acesso de leitura TMDB aqui se desejar que o UIPTV busque metadados mais ricos para filmes e séries.\n\n• Os metadados do TMDB podem incluir títulos localizados, enredos, gêneros, referências de obras de arte e outros detalhes descritivos.\n\n• O token é opcional. O UIPTV ainda pode reproduzir conteúdo sem ele, mas a cobertura de metadados será mais limitada.\n\n• Use o link do guia se precisar de instruções para criar uma conta API do TMDB e use o link da conta para copiar um token de acesso de leitura existente.\n\n• Se os resultados dos metadados parecerem errados, verifique se o token é válido e se o idioma da UI selecionado corresponde ao idioma dos metadados esperado.\n\nTrate o token como uma credencial privada e substitua-o se acreditar que ele foi compartilhado acidentalmente.

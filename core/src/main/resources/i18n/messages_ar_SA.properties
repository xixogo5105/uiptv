configResolveChainAndDeepRedirects=حل سلاسل إعادة التوجيه
configResolveChainAndDeepRedirectsHelpTitle=حل سلاسل إعادة التوجيه
configResolveChainAndDeepRedirectsHelp=يجعل هذا الخيار التطبيق يحل سلاسل قوائم تشغيل HLS ويتبع سلاسل إعادة التوجيه الأعمق قبل بدء التشغيل.\n\nاستخدمه عندما يصل البث إلى قائمة تشغيل رئيسية أو متغيرات HLS نسبية أو بوابة إعادة توجيه لا يتعامل معها المشغل جيدًا بمفرده.\n\nاتركه معطلاً إذا كانت القنوات تعمل بالفعل بشكل صحيح دون فحص إضافي، أو إذا كنت تريد أقل زمن انتظار ممكن عند بدء التشغيل. قد يؤدي تفعيله إلى تأخير بسيط قبل بدء التشغيل.
configWideViewHelpTitle=العرض الواسع
configWideViewHelp=يجعل العرض الواسع تخطيط المشغل المضمن يستخدم مساحة أكبر من العرض المتاح حتى تبدو منطقة الفيديو أقل ازدحامًا.\n\nاستخدمه على الشاشات الأكبر أو عندما تفضّل تخطيطًا أكثر اتساعًا للمشغل المضمن.\n\nاتركه معطلاً في النوافذ الصغيرة أو الشاشات الضيقة حيث يكون التخطيط القياسي أسهل في الملاءمة. قد يجعل هذا الإعداد المشغل المضمن يبدو أعرض، لكنه لا يهدف إلى تغيير جودة التشغيل.

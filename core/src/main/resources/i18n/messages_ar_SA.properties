configCacheFilteringHelpTitle=ذاكرة التخزين المؤقت وبيانات الجلسة
configCacheFilteringHelpText=يجمع هذا القسم بيانات التشغيل المؤقتة مع خيار إيقاف تصفية القفل الأبوي مؤقتًا للتكوين الحالي.\n\n• يؤدي الإيقاف المؤقت لقيود القفل الأبوي إلى تعطيل قواعد الحظر مؤقتًا دون حذفها.\n\n• تتحكم انتهاء صلاحية ذاكرة التخزين المؤقت في مدة الاحتفاظ بالبيانات المخزنة مؤقتًا ذات الصلة بالتشغيل قبل أن يتم التعامل معها على أنها قديمة.\n\n• يؤدي مسح ذاكرة التخزين المؤقت للتشغيل إلى إزالة بيانات الدفق المخزنة مؤقتًا ويمكن أن يساعد عندما يستمر التشغيل في استخدام استجابات الوسائط القديمة أو المعطلة.\n\n• يؤدي مسح سجل المشاهدة الآن إلى إزالة قائمة العرض المحفوظة قيد التقدم.\n\n• إعادة تحميل ذاكرة التخزين المؤقت لبيانات الحساب تعمل على تحديث بيانات الحساب المخزنة مؤقتًا عندما تتغير البيانات الموجودة على جانب المدخل وتكون ذاكرة التخزين المؤقت المحلية الحالية قديمة.
configDatabaseSyncHelpTitle=النسخ الاحتياطي والاستعادة
configDatabaseSyncHelpText=ينشئ خيار إنشاء نسخة احتياطية أرشيف UIPTV كاملاً يحتوي على البيانات الوصفية وملف قاعدة البيانات. يمكن استعادة الأرشيف على سطح المكتب أو أندرويد.\n\n• استعادة النسخة الاحتياطية تستبدل قاعدة البيانات المحلية لهذا التثبيت بالأرشيف المحدد.\n\n• يقبل سطح المكتب أيضاً ملف UIPTV .db قديماً للاستعادة، لكن النسخ الجديدة تحفظ كأرشيفات .zip.\n\n• لا يزال الوضع البعيد يجري مزامنة أحادية الاتجاه بين الأجهزة ويمكن أن يتضمن الحسابات والإشارات المرجعية وبيانات التكوين الاختيارية.\n\n• تتطلب المزامنة البعيدة أن يكون الجهاز الآخر قابلاً للوصول وموافقاً عليه قبل نقل البيانات.
configTmdbMetadataHelpTitle=بيانات تعريف TMDB
configTmdbMetadataHelpText=أضف رمز الوصول للقراءة TMDB هنا إذا كنت تريد أن يجلب UIPTV بيانات تعريف أكثر ثراءً للأفلام والمسلسلات.\n\n• يمكن أن تتضمن بيانات تعريف TMDB عناوين محلية ومؤامرات وأنواع ومراجع أعمال فنية وتفاصيل وصفية أخرى.\n\n• الرمز اختياري. لا يزال بإمكان UIPTV تشغيل المحتوى بدونه، لكن تغطية البيانات الوصفية ستكون محدودة أكثر.\n\n• استخدم رابط الدليل إذا كنت بحاجة إلى تعليمات لإنشاء حساب TMDB API، واستخدم رابط الحساب لنسخ رمز الوصول للقراءة الموجود.\n\n• إذا بدت نتائج بيانات التعريف خاطئة، فتأكد من صلاحية الرمز المميز وأن لغة واجهة المستخدم المحددة تتطابق مع لغة بيانات التعريف التي تتوقعها.\n\nتعامل مع الرمز المميز باعتباره بيانات اعتماد خاصة واستبدله إذا كنت تعتقد أنه تمت مشاركته عن طريق الخطأ.

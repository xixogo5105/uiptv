configVideoPlayersHelpTitle=مشغلات الفيديو
configFiltersHelpTitle=قفل الوالدين
configFiltersHelpText=استخدم هذا القسم لإخفاء الفئات والقنوات حسب الكلمات الرئيسية ولحماية تلك القواعد بكلمة مرور.\n\n• الكلمات الرئيسية للفئة المحظورة تخفي أسماء الفئات المطابقة.\n\n• الكلمات الرئيسية للقناة المحظورة تخفي أسماء القنوات المطابقة.\n\n• قم بتعيين كلمة مرور قفل الوالدين إذا كنت لا تريد أن يقوم المستخدمون الآخرون بقراءة هذه المرشحات أو تغييرها أو إيقافها مؤقتًا.\n\n• عندما يكون القفل نشطًا، يمكن أن يطلب UIPTV أيضًا كلمة المرور قبل فتح المحتوى الذي تحدده بوابة Stalker على أنه خاضع للرقابة.\n\nاستخدم الكلمات الرئيسية الواسعة بعناية. يمكن للكلمات القصيرة أو العامة أن تخفي محتوى أكثر بكثير من المتوقع.

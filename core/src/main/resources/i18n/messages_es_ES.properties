configResolveChainAndDeepRedirects=Resolver cadenas de redirección
configResolveChainAndDeepRedirectsHelpTitle=Resolver cadenas de redirección
configResolveChainAndDeepRedirectsHelp=Esta opción hace que la aplicación resuelva cadenas de listas HLS y siga redirecciones más profundas antes de iniciar la reproducción.\n\nÚsela cuando un flujo termine en una lista maestra, en variantes HLS relativas o en una pasarela con redirecciones que el reproductor no maneja bien por sí solo.\n\nDéjela desactivada si sus flujos ya se reproducen correctamente sin comprobaciones adicionales o si quiere la menor latencia posible al iniciar. Activarla puede añadir un pequeño retraso antes de empezar la reproducción.
configWideViewHelpTitle=Vista amplia
configWideViewHelp=La vista amplia hace que el diseño del reproductor integrado use más del ancho disponible para que el área de vídeo se sienta menos apretada.\n\nÚsela en pantallas grandes o si prefiere un diseño más espacioso para el reproductor integrado.\n\nDéjela desactivada en ventanas pequeñas o pantallas estrechas donde el diseño estándar encaja mejor. Esta opción puede hacer que el reproductor se vea más ancho, pero no está pensada para cambiar la calidad de reproducción.
configDatabaseSyncTitle=Copia de seguridad y restauración

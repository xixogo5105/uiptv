configVideoPlayersHelpTitle=Reproductores de vídeo
configFiltersHelpTitle=Bloqueo parental
configFiltersHelpText=Utilice esta sección para ocultar categorías y canales por palabra clave y proteger esas reglas con una contraseña.\n\n• Las palabras clave de categorías bloqueadas ocultan los nombres de categorías coincidentes.\n\n• Las palabras clave de canales bloqueados ocultan los nombres de canales coincidentes.\n\n• Establezca una contraseña de bloqueo parental si no desea que otros usuarios lean, cambien o suspendan temporalmente estos filtros.\n\n• Cuando el bloqueo está activo, UIPTV también puede solicitar la contraseña antes de abrir contenido que el portal Stalker marca como censurado.\n\nUtilice palabras clave amplias con cuidado. Las palabras cortas o genéricas pueden ocultar mucho más contenido del esperado.
configThemeHelpTitle=Tema y apariencia
configCacheFilteringHelpTitle=Datos de sesión y caché
configCacheFilteringHelpText=Esta sección combina datos de reproducción temporales con la opción de pausar el filtrado de bloqueo parental para la configuración actual.\n\n• Pausar las restricciones de bloqueo parental desactiva temporalmente las reglas de bloqueo sin eliminarlas.\n\n• La caducidad de la caché controla durante cuánto tiempo se conservan los datos almacenados en caché relacionados con la reproducción antes de que se consideren obsoletos.\n\n• Borrar caché de reproducción elimina los datos de transmisión almacenados en caché y puede ayudar cuando la reproducción sigue utilizando respuestas multimedia obsoletas o rotas.\n\n• Borrar historial de visualización en curso elimina la lista de visualización en curso guardada.\n\n• Recargar caché de datos de cuenta actualiza los datos de la cuenta almacenados en caché cuando los datos del lado del portal han cambiado y el caché local actual está desactualizado.
configDatabaseSyncHelpTitle=Copia de seguridad y restauración
configDatabaseSyncHelpText=Crear copia de seguridad escribe un archivo completo de UIPTV con metadatos y el archivo de base de datos. El archivo se puede restaurar en escritorio o Android.\n\n• Restaurar copia de seguridad reemplaza la base de datos local de esta instalación con el archivo seleccionado.\n\n• El escritorio también acepta un archivo UIPTV .db antiguo para restaurar, pero las copias nuevas se guardan como archivos .zip.\n\n• El modo remoto sigue realizando una sincronización unidireccional entre equipos y puede incluir cuentas, marcadores y datos de configuración opcionales.\n\n• La sincronización remota requiere que el otro equipo esté accesible y aprobado antes de transferir datos.
configTmdbMetadataHelpTitle=Metadatos TMDB
configTmdbMetadataHelpText=Agregue aquí un token de acceso de lectura TMDB si desea que UIPTV obtenga metadatos más completos para películas y series.\n\n• Los metadatos de TMDB pueden incluir títulos, tramas, géneros, referencias de obras de arte y otros detalles descriptivos localizados.\n\n• El token es opcional. UIPTV aún puede reproducir contenido sin él, pero la cobertura de metadatos será más limitada.\n\n• Utilice el enlace de la guía si necesita instrucciones para crear una cuenta API de TMDB y utilice el enlace de la cuenta para copiar un token de acceso de lectura existente.\n\n• Si los resultados de los metadatos parecen incorrectos, verifique que el token sea válido y que el idioma de la interfaz de usuario seleccionado coincida con el idioma de los metadatos que espera.\n\nTrate el token como una credencial privada y reemplácelo si cree que se ha compartido accidentalmente.

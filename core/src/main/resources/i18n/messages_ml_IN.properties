configResolveChainAndDeepRedirectsHelp=ഈ ഓപ്ഷൻ പ്ലേബാക്ക് തുടങ്ങുന്നതിന് മുമ്പ് HLS പ്ലേലിസ്റ്റ് ശൃംഖലകൾ പരിഹരിക്കാനും കൂടുതൽ ആഴത്തിലുള്ള റീഡിറക്ട് ശൃംഖലകൾ പിന്തുടരാനും ആപ്പിനെ അനുവദിക്കുന്നു.\n\nഒരു സ്ട്രീം മാസ്റ്റർ പ്ലേലിസ്റ്റിലേക്കോ അനുബന്ധ HLS വേരിയന്റുകളിലേക്കോ അല്ലെങ്കിൽ പ്ലെയർ സ്വതന്ത്രമായി നന്നായി കൈകാര്യം ചെയ്യാത്ത ഒരു റീഡിറക്ടിംഗ് ഗേറ്റ്‌വേയിലേക്കോ പോകുന്നുവെങ്കിൽ ഇത് ഉപയോഗിക്കുക.\n\nഅധിക പരിശോധനകളില്ലാതെയും നിങ്ങളുടെ സ്ട്രീങ്ങൾ ശരിയായി പ്രവർത്തിക്കുന്നുവെങ്കിൽ, അല്ലെങ്കിൽ ഏറ്റവും കുറഞ്ഞ സ്റ്റാർട്ടപ്പ് വൈകൽ്യം വേണമെങ്കിൽ ഇത് ഓഫ് നിലയിൽ വിടുക. ഇത് പ്രവർത്തനക്ഷമമാക്കുമ്പോൾ പ്ലേബാക്ക് തുടങ്ങുന്നതിന് മുമ്പ് ചെറിയൊരു വൈകൽ്യം ഉണ്ടാകാം.
configWideViewHelpTitle=വൈഡ് വ്യൂ
configWideViewHelp=വൈഡ് വ്യൂ ഉപയോഗിക്കുമ്പോൾ എംബെഡഡ് പ്ലെയർ ലേഔട്ട് ലഭ്യമായ വീതിയിൽ കൂടുതൽ ഭാഗം ഉപയോഗിക്കുന്നു, അതിനാൽ വീഡിയോ ഭാഗം കുറച്ച് തിരക്കുള്ളതായി തോന്നും.\n\nവലിയ സ്ക്രീനുകളിലോ കൂടുതൽ വിശാലമായ എംബെഡഡ് പ്ലെയർ ലേഔട്ട് നിങ്ങൾക്ക് ഇഷ്ടമായിരിക്കുകയാണെങ്കിൽ ഇത് ഉപയോഗിക്കുക.\n\nചെറിയ വിൻഡോകളിലോ ഇടുങ്ങിയ ഡിസ്പ്ലേകളിലോ സ്റ്റാൻഡേഡ് ലേഔട്ട് കൂടുതൽ പൊരുത്തപ്പെടുന്നതിനാൽ ഇത് ഓഫ് നിലയിൽ വിടുക. ഈ ക്രമീകരണം പ്ലെയർ കൂടുതൽ വീതിയുള്ളതായി തോന്നിപ്പിക്കാം, പക്ഷേ പ്ലേബാക്ക് ഗുണമേന്മ മാറ്റുന്നതിനല്ല ഇത്.

filterLockUnlockCensoredChannelReason=ഈ ചാനൽ Stalker പോർട്ടൽ സെൻസർ ചെയ്തതായി അടയാളപ്പെടുത്തിയിരിക്കുന്നു. പ്രവേശിക്കാൻ പാരന്റൽ ലോക്ക് പാസ്‌വേഡ് നൽകുക.
filterLockUnlockManageFiltersReason=പാരന്റൽ ലോക്ക് നിയന്ത്രണങ്ങൾ പൂട്ടിയിരിക്കുന്നു. ഈ നിയന്ത്രണങ്ങൾ കാണാനോ തിരുത്താനോ താൽക്കാലികമായി നിർത്താനോ പാരന്റൽ ലോക്ക് പാസ്‌വേഡ് നൽകുക.

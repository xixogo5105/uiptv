configVideoPlayersHelpTitle=വീഡിയോ പ്ലേയറുകൾ
configFiltersHelpTitle=രക്ഷാകർതൃ ലോക്ക്
configFiltersHelpText=കീവേഡ് മുഖേന വിഭാഗങ്ങളും ചാനലുകളും മറയ്‌ക്കാനും പാസ്‌വേഡ് ഉപയോഗിച്ച് ആ നിയമങ്ങൾ പരിരക്ഷിക്കാനും ഈ വിഭാഗം ഉപയോഗിക്കുക.\n\n• ബ്ലോക്ക് ചെയ്‌ത വിഭാഗ കീവേഡുകൾ പൊരുത്തപ്പെടുന്ന വിഭാഗത്തിൻ്റെ പേരുകൾ മറയ്‌ക്കുന്നു.\n\n• ബ്ലോക്ക് ചെയ്‌ത ചാനൽ കീവേഡുകൾ പൊരുത്തപ്പെടുന്ന ചാനൽ പേരുകൾ മറയ്ക്കുന്നു.\n\n• മറ്റ് ഉപയോക്താക്കൾ ഈ ഫിൽട്ടറുകൾ വായിക്കാനോ മാറ്റാനോ താൽക്കാലികമായി നിർത്താനോ ആഗ്രഹിക്കുന്നില്ലെങ്കിൽ ഒരു രക്ഷാകർതൃ ലോക്ക് പാസ്‌വേഡ് സജ്ജീകരിക്കുക.\n\n• ലോക്ക് സജീവമാകുമ്പോൾ, സ്റ്റാക്കർ പോർട്ടൽ സെൻസർ ചെയ്‌തതായി അടയാളപ്പെടുത്തുന്ന ഉള്ളടക്കം തുറക്കുന്നതിന് മുമ്പ് UIPTV-യ്ക്ക് പാസ്‌വേഡ് ആവശ്യമായി വരും.\n\nവിശാലമായ കീവേഡുകൾ ശ്രദ്ധാപൂർവ്വം ഉപയോഗിക്കുക. ഹ്രസ്വമോ പൊതുവായതോ ആയ വാക്കുകൾക്ക് പ്രതീക്ഷിച്ചതിലും കൂടുതൽ ഉള്ളടക്കം മറയ്ക്കാൻ കഴിയും.
configThemeHelpTitle=പ്രമേയവും രൂപഭാവവും
configCacheFilteringHelpTitle=കാഷെയും സെഷൻ ഡാറ്റയും
configCacheFilteringHelpText=നിലവിലെ കോൺഫിഗറേഷനായി പാരൻ്റൽ ലോക്ക് ഫിൽട്ടറിംഗ് താൽക്കാലികമായി നിർത്താനുള്ള ഓപ്ഷനുമായി ഈ വിഭാഗം താൽക്കാലിക പ്ലേബാക്ക് ഡാറ്റ സംയോജിപ്പിക്കുന്നു.\n\n• പാരൻ്റൽ ലോക്ക് നിയന്ത്രണങ്ങൾ താൽക്കാലികമായി നിർത്തുന്നത് തടയൽ നിയമങ്ങളെ ഇല്ലാതാക്കാതെ തന്നെ താൽക്കാലികമായി പ്രവർത്തനരഹിതമാക്കുന്നു.\n\n• കാഷെ കാലഹരണപ്പെടൽ, പ്ലേബാക്ക് സംബന്ധിയായ കാഷെ ചെയ്‌ത ഡാറ്റ പഴയതായി കണക്കാക്കുന്നതിന് മുമ്പ് എത്ര നേരം സൂക്ഷിക്കുന്നു എന്നത് നിയന്ത്രിക്കുന്നു.\n\n• പ്ലേബാക്ക് കാഷെ മായ്‌ക്കുക, കാഷെ ചെയ്‌ത സ്‌ട്രീം ഡാറ്റ നീക്കംചെയ്യുകയും പ്ലേബാക്ക് കാലഹരണപ്പെട്ടതോ തകർന്നതോ ആയ മീഡിയ പ്രതികരണങ്ങൾ ഉപയോഗിക്കുമ്പോൾ സഹായിക്കുകയും ചെയ്യും.\n\n• ഇപ്പോൾ കാണൽ മായ്‌ക്കുക ചരിത്രം സംരക്ഷിച്ച പുരോഗതിയിലുള്ള കാണൽ ലിസ്‌റ്റ് നീക്കംചെയ്യുന്നു.\n\n• പോർട്ടൽ സൈഡ് ഡാറ്റ മാറുകയും നിലവിലെ ലോക്കൽ കാഷെ കാലഹരണപ്പെടുകയും ചെയ്യുമ്പോൾ അക്കൗണ്ട് ഡാറ്റ കാഷെ വീണ്ടും ലോഡുചെയ്യുന്നത് കാഷെ ചെയ്ത അക്കൗണ്ട് ഡാറ്റ പുതുക്കുന്നു.
configDatabaseSyncHelpTitle=ബാക്കപ്പും പുനഃസ്ഥാപനവും
configDatabaseSyncHelpText=ബാക്കപ്പ് സൃഷ്ടിക്കുക മെറ്റാഡാറ്റയും ഡാറ്റാബേസ് ഫയലും അടങ്ങിയ പൂർണ്ണ UIPTV ബാക്കപ്പ് ആർക്കൈവ് എഴുതുന്നു. ആർക്കൈവ് ഡെസ്ക്ടോപ്പിലോ Android-ലോ പുനഃസ്ഥാപിക്കാം.\n\n• ബാക്കപ്പ് പുനഃസ്ഥാപിക്കുക ഈ ഇൻസ്റ്റലേഷന്റെ പ്രാദേശിക ഡാറ്റാബേസ് തിരഞ്ഞെടുത്ത ബാക്കപ്പ് ആർക്കൈവോടെ മാറ്റിസ്ഥാപിക്കുന്നു.\n\n• പുനഃസ്ഥാപനത്തിനായി പഴയ raw UIPTV .db ഫയലും ഡെസ്ക്ടോപ്പ് സ്വീകരിക്കും, പക്ഷേ പുതിയ ബാക്കപ്പുകൾ .zip ആർക്കൈവുകളായി സംരക്ഷിക്കും.\n\n• റിമോട്ട് മോഡ് മെഷീനുകൾക്കിടയിൽ ഒരുതരഫ് സിങ്ക് തുടരുകയും അക്കൗണ്ടുകൾ, ബുക്ക്മാർക്കുകൾ, ഐച്ഛിക കോൺഫിഗറേഷൻ ഡാറ്റ എന്നിവ ഉൾപ്പെടുത്തുകയും ചെയ്യും.\n\n• റിമോട്ട് സിങ്കിന് ഡാറ്റ കൈമാറുന്നതിന് മുമ്പ് മറ്റേ മെഷീൻ ലഭ്യവും അംഗീകരിച്ചതുമായിരിക്കണം.
configTmdbMetadataHelpTitle=TMDB മെറ്റാഡാറ്റ
configTmdbMetadataHelpText=സിനിമകൾക്കും സീരീസുകൾക്കുമായി യുഐപിടിവിക്ക് മികച്ച മെറ്റാഡാറ്റ ലഭിക്കണമെങ്കിൽ ഇവിടെ ഒരു TMDB റീഡ് ആക്‌സസ് ടോക്കൺ ചേർക്കുക.\n\n• TMDB മെറ്റാഡാറ്റയിൽ പ്രാദേശികവൽക്കരിച്ച ശീർഷകങ്ങൾ, പ്ലോട്ടുകൾ, വിഭാഗങ്ങൾ, കലാസൃഷ്‌ടി റഫറൻസുകൾ, മറ്റ് വിവരണാത്മക വിശദാംശങ്ങൾ എന്നിവ ഉൾപ്പെടാം.\n\n• ടോക്കൺ ഓപ്ഷണൽ ആണ്. UIPTV അത് കൂടാതെ ഉള്ളടക്കം പ്ലേ ചെയ്യാൻ കഴിയും, എന്നാൽ മെറ്റാഡാറ്റ കവറേജ് കൂടുതൽ പരിമിതമായിരിക്കും.\n\n• ഒരു TMDB API അക്കൗണ്ട് സൃഷ്‌ടിക്കുന്നതിന് നിങ്ങൾക്ക് നിർദ്ദേശങ്ങൾ ആവശ്യമുണ്ടെങ്കിൽ ഗൈഡ് ലിങ്ക് ഉപയോഗിക്കുക, നിലവിലുള്ള ഒരു റീഡ് ആക്‌സസ് ടോക്കൺ പകർത്താൻ അക്കൗണ്ട് ലിങ്ക് ഉപയോഗിക്കുക.\n\n• മെറ്റാഡാറ്റ ഫലങ്ങൾ തെറ്റായി തോന്നുന്നുവെങ്കിൽ, ടോക്കൺ സാധുതയുള്ളതാണെന്നും തിരഞ്ഞെടുത്ത UI ഭാഷ നിങ്ങൾ പ്രതീക്ഷിക്കുന്ന മെറ്റാഡാറ്റ ഭാഷയുമായി പൊരുത്തപ്പെടുന്നുണ്ടെന്നും പരിശോധിക്കുക.\n\nടോക്കൺ ഒരു സ്വകാര്യ ക്രെഡൻഷ്യൽ പോലെ പരിഗണിക്കുക, അത് ആകസ്മികമായി പങ്കിട്ടതാണെന്ന് നിങ്ങൾ വിശ്വസിക്കുന്നുവെങ്കിൽ അത് മാറ്റിസ്ഥാപിക്കുക.

configResolveChainAndDeepRedirects=Risolvi catene di reindirizzamento
configResolveChainAndDeepRedirectsHelpTitle=Risolvi catene di reindirizzamento
configResolveChainAndDeepRedirectsHelp=Questa opzione fa sì che l'app risolva le catene di playlist HLS e segua reindirizzamenti più profondi prima della riproduzione.\n\nUsala quando uno stream arriva a una playlist master, a varianti HLS relative o a un gateway di reindirizzamento che il player non gestisce bene da solo.\n\nLasciala disattivata se i tuoi stream funzionano già correttamente senza controlli aggiuntivi o se vuoi la minore latenza possibile all'avvio. Attivarla può aggiungere un piccolo ritardo prima dell'inizio della riproduzione.
configWideViewHelpTitle=Vista ampia
configWideViewHelp=La vista ampia fa usare al layout del player integrato una parte maggiore della larghezza disponibile, così l'area video risulta meno compressa.\n\nUsala su schermi più grandi o se preferisci un layout del player integrato più spazioso.\n\nLasciala disattivata su finestre piccole o schermi stretti, dove il layout standard si adatta meglio. Questa impostazione può far sembrare il player più largo, ma non è pensata per cambiare la qualità della riproduzione.
configDatabaseSyncTitle=Backup e ripristino
configDatabaseSyncDescription=Crea o ripristina backup UIPTV completi utilizzabili su desktop e Android.

configVideoPlayersHelpTitle=Lettori video
configFiltersHelpTitle=Blocco parentale
configFiltersHelpText=Utilizza questa sezione per nascondere categorie e canali per parola chiave e per proteggere tali regole con una password.\n\n• Le parole chiave delle categorie bloccate nascondono i nomi delle categorie corrispondenti.\n\n• Le parole chiave dei canali bloccati nascondono i nomi dei canali corrispondenti.\n\n• Impostare una password per il blocco genitori se non si desidera che altri utenti leggano, modifichino o sospendano temporaneamente questi filtri.\n\n• Quando il blocco è attivo, UIPTV può anche richiedere la password prima di aprire il contenuto che il portale Stalker contrassegna come censurato.\n\nUtilizza attentamente le parole chiave generiche. Parole brevi o generiche possono nascondere molti più contenuti del previsto.
configThemeHelpTitle=Tema e aspetto
configCacheFilteringHelpTitle=Cache e dati di sessione
configCacheFilteringHelpText=Questa sezione combina i dati di riproduzione temporanei con l'opzione per mettere in pausa il filtro del blocco parentale per la configurazione corrente.\n\n• Sospendi le restrizioni del blocco parentale disabilita temporaneamente le regole di blocco senza eliminarle.\n\n• La scadenza della cache controlla per quanto tempo i dati memorizzati nella cache relativi alla riproduzione vengono conservati prima che vengano considerati obsoleti.\n\n• Cancella cache di riproduzione rimuove i dati del flusso memorizzati nella cache e può essere d'aiuto quando la riproduzione continua a utilizzare risposte multimediali obsolete o non funzionanti.\n\n• Cancella cronologia visione in corso rimuove l'elenco di visualizzazione in corso salvato.\n\n• Ricarica cache dati account aggiorna i dati dell'account memorizzati nella cache quando i dati lato portale sono cambiati e la cache locale corrente non è aggiornata.
configDatabaseSyncHelpTitle=Backup e ripristino
configDatabaseSyncHelpText=Crea backup scrive un archivio UIPTV completo con metadati e file di database. L’archivio può essere ripristinato su desktop o Android.\n\n• Ripristina backup sostituisce il database locale di questa installazione con l’archivio di backup selezionato.\n\n• Il desktop accetta anche un vecchio file UIPTV .db grezzo per il ripristino, ma i nuovi backup vengono salvati come archivi .zip.\n\n• La modalità remota continua a eseguire una sincronizzazione unidirezionale tra macchine e può includere account, segnalibri e dati di configurazione opzionali.\n\n• La sincronizzazione remota richiede che l’altra macchina sia raggiungibile e approvata prima del trasferimento dei dati.
configTmdbMetadataHelpTitle=Metadati TMDB
configTmdbMetadataHelpText=Aggiungi qui un token di accesso in lettura TMDB se desideri che UIPTV recuperi metadati più ricchi per film e serie.\n\n• I metadati TMDB possono includere titoli localizzati, trame, generi, riferimenti ad opere d'arte e altri dettagli descrittivi.\n\n• Il token è facoltativo. UIPTV può comunque riprodurre contenuti senza di essa, ma la copertura dei metadati sarà più limitata.\n\n• Utilizzare il collegamento alla guida se sono necessarie istruzioni per la creazione di un account API TMDB e utilizzare il collegamento all'account per copiare un token di accesso in lettura esistente.\n\n• Se i risultati dei metadati sembrano errati, verificare che il token sia valido e che la lingua dell'interfaccia utente selezionata corrisponda alla lingua dei metadati prevista.\n\nTratta il token come una credenziale privata e sostituiscilo se ritieni che sia stato condiviso accidentalmente.

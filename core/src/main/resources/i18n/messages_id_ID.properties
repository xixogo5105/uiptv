configResolveChainAndDeepRedirectsHelp=Opsi ini membuat aplikasi menyelesaikan rantai playlist HLS dan mengikuti rantai pengalihan yang lebih dalam sebelum pemutaran dimulai.\n\nGunakan saat sebuah stream berakhir pada playlist master, varian HLS relatif, atau gateway pengalihan yang tidak ditangani dengan baik oleh pemutar secara langsung.\n\nBiarkan nonaktif jika stream Anda sudah diputar dengan benar tanpa pemeriksaan tambahan, atau jika Anda ingin latensi mulai yang serendah mungkin. Mengaktifkannya dapat menambah sedikit jeda sebelum pemutaran dimulai.
configWideViewHelpTitle=Tampilan lebar
configWideViewHelp=Tampilan lebar membuat tata letak pemutar tersemat menggunakan lebih banyak lebar yang tersedia sehingga area video terasa tidak terlalu sempit.\n\nGunakan pada layar yang lebih besar atau jika Anda lebih suka tata letak pemutar tersemat yang lebih lapang.\n\nBiarkan nonaktif pada jendela kecil atau layar sempit tempat tata letak standar lebih pas. Pengaturan ini dapat membuat pemutar terasa lebih lebar, tetapi tidak dimaksudkan untuk mengubah kualitas pemutaran.

configVideoPlayersHelpTitle=เครื่องเล่นวิดีโอ
configFiltersHelpTitle=ล็อคโดยผู้ปกครอง
configFiltersHelpText=ใช้ส่วนนี้เพื่อซ่อนหมวดหมู่และช่องตามคำหลัก และเพื่อป้องกันกฎเหล่านั้นด้วยรหัสผ่าน\n\n• คำหลักหมวดหมู่ที่ถูกบล็อกจะซ่อนชื่อหมวดหมู่ที่ตรงกัน\n\n• คำหลักของช่องที่ถูกบล็อกจะซ่อนชื่อช่องที่ตรงกัน\n\n• ตั้งรหัสผ่านล็อคโดยผู้ปกครองหากคุณไม่ต้องการให้ผู้ใช้รายอื่นอ่าน เปลี่ยนแปลง หรือหยุดตัวกรองเหล่านี้ชั่วคราว\n\n• เมื่อการล็อคทำงานอยู่ UIPTV ยังสามารถขอรหัสผ่านก่อนที่จะเปิดเนื้อหาที่พอร์ทัล Stalker ทำเครื่องหมายว่าเซ็นเซอร์\n\nใช้คำหลักแบบกว้างๆ อย่างระมัดระวัง คำสั้นๆ หรือคำทั่วไปสามารถซ่อนเนื้อหาได้มากกว่าที่คาดไว้
configThemeHelpTitle=ธีมและรูปลักษณ์
configCacheFilteringHelpTitle=ข้อมูลแคชและเซสชัน
configCacheFilteringHelpText=ส่วนนี้จะรวมข้อมูลการเล่นชั่วคราวเข้ากับตัวเลือกในการหยุดการกรองการล็อกโดยผู้ปกครองชั่วคราวสำหรับการกำหนดค่าปัจจุบัน\n\n• หยุดข้อจำกัดการล็อกโดยผู้ปกครองชั่วคราว จะปิดใช้กฎการบล็อกชั่วคราวโดยไม่ต้องลบออก\n\n• การหมดอายุของแคชจะควบคุมระยะเวลาที่ข้อมูลแคชที่เกี่ยวข้องกับการเล่นจะถูกเก็บไว้ก่อนที่จะถือว่าเก่า\n\n• Clear Playback Cache จะลบข้อมูลสตรีมที่เก็บไว้และสามารถช่วยเหลือเมื่อการเล่นยังคงใช้การตอบสนองของสื่อที่ล้าสมัยหรือใช้งานไม่ได้\n\n• ล้างประวัติการดูตอนนี้จะลบรายการดูที่บันทึกไว้ที่กำลังดำเนินการอยู่\n\n• โหลดแคชข้อมูลบัญชีใหม่จะรีเฟรชข้อมูลบัญชีแคชเมื่อข้อมูลฝั่งพอร์ทัลมีการเปลี่ยนแปลงและแคชในเครื่องปัจจุบันล้าสมัย
configDatabaseSyncHelpTitle=สำรองและกู้คืน
configDatabaseSyncHelpText=สร้างข้อมูลสำรองจะเขียนไฟล์สำรอง UIPTV แบบเต็มที่มีเมทาดาทาและไฟล์ฐานข้อมูล ไฟล์นี้สามารถกู้คืนได้บนเดสก์ท็อปหรือ Android\n\n• กู้คืนข้อมูลสำรองจะแทนที่ฐานข้อมูลภายในเครื่องของการติดตั้งนี้ด้วยไฟล์สำรองที่เลือก\n\n• เดสก์ท็อปยังรับไฟล์ UIPTV .db แบบเก่าสำหรับการกู้คืนได้ แต่ข้อมูลสำรองใหม่จะบันทึกเป็นไฟล์ .zip\n\n• โหมดระยะไกลยังคงซิงก์ทางเดียวระหว่างเครื่องและสามารถรวมบัญชี บุ๊กมาร์ก และข้อมูลการตั้งค่าเพิ่มเติมได้\n\n• การซิงก์ระยะไกลต้องให้เครื่องอื่นเข้าถึงได้และได้รับอนุมัติก่อนถ่ายโอนข้อมูล
configTmdbMetadataHelpTitle=ข้อมูลเมตาของ TMDB
configTmdbMetadataHelpText=เพิ่มโทเค็นการเข้าถึงการอ่าน TMDB ที่นี่ หากคุณต้องการให้ UIPTV ดึงข้อมูลเมตาที่สมบูรณ์ยิ่งขึ้นสำหรับภาพยนตร์และซีรีส์\n\n• ข้อมูลเมตาของ TMDB อาจรวมถึงชื่อที่แปลแล้ว โครงเรื่อง ประเภท การอ้างอิงอาร์ตเวิร์ค และรายละเอียดเชิงพรรณนาอื่นๆ\n\n• โทเค็นเป็นทางเลือก UIPTV ยังคงสามารถเล่นเนื้อหาได้หากไม่มีเนื้อหาดังกล่าว แต่ความครอบคลุมของข้อมูลเมตาจะถูกจำกัดมากขึ้น\n\n• ใช้ลิงก์คำแนะนำหากคุณต้องการคำแนะนำในการสร้างบัญชี TMDB API และใช้ลิงก์บัญชีเพื่อคัดลอกโทเค็นการเข้าถึงแบบอ่านที่มีอยู่\n\n• หากผลลัพธ์ของข้อมูลเมตาดูผิด ให้ตรวจสอบว่าโทเค็นถูกต้องและภาษา UI ที่เลือกตรงกับภาษาของข้อมูลเมตาที่คุณคาดหวัง\n\nปฏิบัติต่อโทเค็นเหมือนเป็นข้อมูลประจำตัวส่วนตัว และแทนที่หากคุณเชื่อว่ามีการแชร์โดยไม่ได้ตั้งใจ

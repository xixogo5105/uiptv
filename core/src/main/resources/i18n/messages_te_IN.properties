configFiltersHelpText=కీవర్డ్ ద్వారా వర్గాలు మరియు ఛానెల్‌లను దాచడానికి మరియు పాస్‌వర్డ్‌తో ఆ నియమాలను రక్షించడానికి ఈ విభాగాన్ని ఉపయోగించండి.\n\n• బ్లాక్ చేయబడిన వర్గం కీలకపదాలు సరిపోలే వర్గం పేర్లను దాచిపెడతాయి.\n\n• బ్లాక్ చేయబడిన ఛానెల్ కీవర్డ్‌లు సరిపోలే ఛానెల్ పేర్లను దాచిపెడతాయి.\n\n• ఇతర వినియోగదారులు ఈ ఫిల్టర్‌లను చదవడం, మార్చడం లేదా తాత్కాలికంగా పాజ్ చేయడం వంటివి చేయకూడదనుకుంటే పేరెంటల్ లాక్ పాస్‌వర్డ్‌ను సెట్ చేయండి.\n\n• లాక్ సక్రియంగా ఉన్నప్పుడు, స్టాకర్ పోర్టల్ సెన్సార్ చేయబడినట్లు గుర్తించే కంటెంట్‌ను తెరవడానికి ముందు UIPTVకి పాస్‌వర్డ్ కూడా అవసరం కావచ్చు.\n\nవిస్తృత కీలకపదాలను జాగ్రత్తగా ఉపయోగించండి. చిన్న లేదా సాధారణ పదాలు ఊహించిన దాని కంటే ఎక్కువ కంటెంట్‌ను దాచగలవు.
configThemeHelpTitle=థీమ్ మరియు స్వరూపం
configCacheFilteringHelpTitle=కాష్ మరియు సెషన్ డేటా
configCacheFilteringHelpText=ఈ విభాగం ప్రస్తుత కాన్ఫిగరేషన్ కోసం పేరెంటల్-లాక్ ఫిల్టరింగ్‌ను పాజ్ చేసే ఎంపికతో తాత్కాలిక ప్లేబ్యాక్ డేటాను మిళితం చేస్తుంది.\n\n• పేరెంటల్ లాక్ పరిమితులను పాజ్ చేయడం వలన బ్లాక్ చేసే నియమాలను తొలగించకుండా వాటిని తాత్కాలికంగా నిలిపివేస్తుంది.\n\n• ప్లేబ్యాక్-సంబంధిత కాష్ చేయబడిన డేటా పాతదిగా పరిగణించబడటానికి ముందు ఎంతసేపు ఉంచబడుతుందో కాష్ గడువు నియంత్రిస్తుంది.\n\n• ప్లేబ్యాక్ కాష్ క్లియర్ కాష్ చేయబడిన స్ట్రీమ్ డేటాను తొలగిస్తుంది మరియు ప్లేబ్యాక్ కాలం చెల్లిన లేదా విరిగిన మీడియా ప్రతిస్పందనలను ఉపయోగిస్తూనే ఉన్నప్పుడు సహాయపడుతుంది.\n\n• ఇప్పుడు చూడటం క్లియర్ చేయి చరిత్ర సేవ్ చేయబడిన ప్రోగ్రెస్ వీక్షణ జాబితాను తొలగిస్తుంది.\n\n• పోర్టల్ వైపు డేటా మారినప్పుడు మరియు ప్రస్తుత స్థానిక కాష్ గడువు ముగిసినప్పుడు ఖాతా డేటా కాష్ కాష్ చేసిన ఖాతా డేటాను రీలోడ్ చేస్తుంది.
configDatabaseSyncHelpTitle=బ్యాకప్ మరియు పునరుద్ధరణ
configDatabaseSyncHelpText=బ్యాకప్ సృష్టించు మెటాడేటా మరియు డేటాబేస్ ఫైల్‌తో పూర్తి UIPTV బ్యాకప్ ఆర్కైవ్‌ను వ్రాస్తుంది. ఆర్కైవ్‌ను డెస్క్‌టాప్ లేదా Androidలో పునరుద్ధరించవచ్చు.\n\n• బ్యాకప్ పునరుద్ధరించు ఈ ఇన్‌స్టాలేషన్ స్థానిక డేటాబేస్‌ను ఎంచుకున్న బ్యాకప్ ఆర్కైవ్‌తో భర్తీ చేస్తుంది.\n\n• డెస్క్‌టాప్ పాత raw UIPTV .db ఫైల్‌ను కూడా పునరుద్ధరణకు అంగీకరిస్తుంది, కానీ కొత్త బ్యాకప్‌లు .zip ఆర్కైవ్‌లుగా సేవ్ అవుతాయి.\n\n• రిమోట్ మోడ్ యంత్రాల మధ్య ఒకదిశ సింక్‌ను కొనసాగిస్తుంది మరియు ఖాతాలు, బుక్‌మార్క్‌లు, ఐచ్ఛిక కాన్ఫిగరేషన్ డేటాను చేర్చవచ్చు.\n\n• రిమోట్ సింక్‌కు డేటా బదిలీకి ముందు మరొక యంత్రం అందుబాటులో ఉండి ఆమోదించబడాలి.
configTmdbMetadataHelpTitle=TMDB మెటాడేటా
configTmdbMetadataHelpText=మీరు UIPTV చలనచిత్రాలు మరియు సిరీస్‌ల కోసం రిచ్ మెటాడేటాను పొందాలనుకుంటే ఇక్కడ TMDB రీడ్ యాక్సెస్ టోకెన్‌ను జోడించండి.\n\n• TMDB మెటాడేటా స్థానికీకరించిన శీర్షికలు, ప్లాట్లు, కళా ప్రక్రియలు, కళాకృతి సూచనలు మరియు ఇతర వివరణాత్మక వివరాలను కలిగి ఉంటుంది.\n\n• టోకెన్ ఐచ్ఛికం. UIPTV ఇప్పటికీ అది లేకుండా కంటెంట్‌ను ప్లే చేయగలదు, అయితే మెటాడేటా కవరేజీ మరింత పరిమితంగా ఉంటుంది.\n\n• మీకు TMDB API ఖాతాను సృష్టించడానికి సూచనలు అవసరమైతే గైడ్ లింక్‌ని ఉపయోగించండి మరియు ఇప్పటికే ఉన్న రీడ్ యాక్సెస్ టోకెన్‌ను కాపీ చేయడానికి ఖాతా లింక్‌ని ఉపయోగించండి.\n\n• మెటాడేటా ఫలితాలు తప్పుగా అనిపిస్తే, టోకెన్ చెల్లుబాటవుతుందని మరియు ఎంచుకున్న UI భాష మీరు ఆశించే మెటాడేటా భాషతో సరిపోలుతుందని ధృవీకరించండి.\n\nటోకెన్‌ను ప్రైవేట్ క్రెడెన్షియల్ లాగా పరిగణించండి మరియు అది అనుకోకుండా షేర్ చేయబడిందని మీరు విశ్వసిస్తే దాన్ని భర్తీ చేయండి.

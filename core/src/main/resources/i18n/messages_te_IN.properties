configResolveChainAndDeepRedirectsHelp=ఈ ఎంపిక ప్లేబ్యాక్ ప్రారంభమయ్యే ముందు HLS ప్లేలిస్ట్ శృంఖలలను పరిష్కరించి, మరింత లోతైన రీడైరెక్ట్ శృంఖలలను అనుసరించేందుకు యాప్‌ను అనుమతిస్తుంది.\n\nస్ట్రీమ్ master playlist, relative HLS variant, లేదా player తనంతట తాను సరిగా నిర్వహించలేని redirect gateway వద్దకు వెళ్లినప్పుడు దీనిని ఉపయోగించండి.\n\nమీ స్ట్రీమ్‌లు అదనపు పరిశీలన లేకుండానే ఇప్పటికే సరిగా ప్లే అవుతున్నట్లయితే లేదా మీరు అత్యల్ప ప్రారంభ ఆలస్యం కోరుకుంటే దీనిని ఆఫ్‌లో ఉంచండి. దీన్ని ఆన్ చేస్తే ప్లేబ్యాక్ మొదలయ్యే ముందు కొద్దిపాటి ఆలస్యం రావచ్చు.
configWideViewHelpTitle=వైడ్ వ్యూ
configWideViewHelp=వైడ్ వ్యూ embedded player లేఅవుట్‌కు అందుబాటులో ఉన్న వెడల్పును మరింతగా ఉపయోగించేందుకు సహాయపడుతుంది, అందువల్ల వీడియో ప్రాంతం తక్కువ ఇరుకుగా అనిపిస్తుంది.\n\nపెద్ద స్క్రీన్‌లలో లేదా మీరు మరింత విశాలమైన embedded player లేఅవుట్‌ను ఇష్టపడితే దీనిని ఉపయోగించండి.\n\nచిన్న విండోలు లేదా ఇరుకైన డిస్‌ప్లేల్లో దీనిని ఆఫ్‌లో ఉంచండి; అక్కడ సాధారణ లేఅవుట్ మెరుగ్గా సరిపోతుంది. ఈ సెట్టింగ్ player మరింత వెడల్పుగా అనిపించవచ్చు, కానీ ఇది ప్లేబ్యాక్ నాణ్యతను మార్చేందుకు ఉద్దేశించినది కాదు.

configResolveChainAndDeepRedirects=Розв’язувати ланцюги перенаправлень
configResolveChainAndDeepRedirectsHelpTitle=Розв’язувати ланцюги перенаправлень
configResolveChainAndDeepRedirectsHelp=Цей параметр змушує застосунок розв’язувати ланцюги плейлистів HLS і проходити глибші ланцюги перенаправлень перед початком відтворення.\n\nВикористовуйте його, коли потік потрапляє на master playlist, відносні HLS-варіанти або шлюз перенаправлення, з яким програвач сам по собі працює погано.\n\nЗалишайте його вимкненим, якщо ваші потоки вже відтворюються правильно без додаткової перевірки або якщо вам потрібна найменша затримка запуску. Увімкнення може додати невелику затримку перед початком відтворення.
configWideViewHelpTitle=Широкий вигляд
configWideViewHelp=Широкий вигляд дозволяє вбудованому програвачу використовувати більше доступної ширини, щоб область відео здавалася менш тісною.\n\nВикористовуйте його на більших екранах або якщо ви віддаєте перевагу просторішому компонуванню вбудованого програвача.\n\nЗалишайте його вимкненим у маленьких вікнах або на вузьких екранах, де стандартне компонування підходить краще. Це налаштування може зробити програвач візуально ширшим, але воно не призначене для зміни якості відтворення.

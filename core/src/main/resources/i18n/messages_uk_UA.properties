configVideoPlayersHelpTitle=Відеоплеєри
configFiltersHelpTitle=Батьківський контроль
configFiltersHelpText=Використовуйте цей розділ, щоб приховати категорії та канали за ключовими словами та захистити ці правила паролем.\n\n• Заблоковані ключові слова категорії приховують відповідні назви категорій.\n\n• Ключові слова заблокованих каналів приховують відповідні назви каналів.\n\n• Встановіть пароль батьківського контролю, якщо ви не хочете, щоб інші користувачі читали, змінювали або тимчасово призупиняли ці фільтри.\n\n• Коли блокування активне, UIPTV також може вимагати пароль перед відкриттям вмісту, який портал Stalker позначає як цензурований.\n\nОбережно використовуйте широкі ключові слова. Короткі або загальні слова можуть приховати набагато більше вмісту, ніж очікувалося.
configThemeHelpTitle=Тема і зовнішній вигляд
configCacheFilteringHelpTitle=Кеш і дані сеансу
configCacheFilteringHelpText=Цей розділ поєднує тимчасові дані про відтворення з опцією призупинення фільтрації батьківського контролю для поточної конфігурації.\n\n• Призупинити обмеження батьківського контролю тимчасово вимикає правила блокування, не видаляючи їх.\n\n• Термін дії кеш-пам’яті визначає, як довго зберігаються кешовані дані, пов’язані з відтворенням, перш ніж вони будуть вважатися застарілими.\n\n• Очистити кеш відтворення видаляє кешовані дані потоку та може допомогти, коли відтворення продовжує використовувати застарілі або несправні медіавідповіді.\n\n• Очистити історію перегляду видаляє збережений список поточного перегляду.\n\n• Перезавантажити кеш даних облікового запису оновлює кешовані дані облікового запису, якщо дані на стороні порталу змінилися, а поточний локальний кеш застарів.
configDatabaseSyncHelpTitle=Резервне копіювання та відновлення
configDatabaseSyncHelpText=Створити резервну копію записує повний архів UIPTV з метаданими та файлом бази даних. Архів можна відновити на настільній версії або Android.\n\n• Відновити резервну копію замінює локальну базу даних цієї інсталяції вибраним архівом.\n\n• Настільна версія також приймає старий необроблений файл UIPTV .db для відновлення, але нові копії зберігаються як архіви .zip.\n\n• Віддалений режим і надалі виконує односторонню синхронізацію між машинами та може включати облікові записи, закладки й додаткові дані конфігурації.\n\n• Для віддаленої синхронізації інша машина має бути доступною та схваленою до передавання даних.
configTmdbMetadataHelpTitle=Метадані TMDB
configTmdbMetadataHelpText=Додайте сюди маркер доступу для читання TMDB, якщо ви хочете, щоб UIPTV отримував багатші метадані для фільмів і серіалів.\n\n• Метадані TMDB можуть містити локалізовані назви, сюжети, жанри, посилання на твори мистецтва та інші описові деталі.\n\n• Маркер необов’язковий. UIPTV може відтворювати вміст і без нього, але покриття метаданих буде більш обмеженим.\n\n• Скористайтеся посиланням посібника, якщо вам потрібні інструкції щодо створення облікового запису API TMDB, і використовуйте посилання облікового запису, щоб скопіювати існуючий маркер доступу для читання.\n\n• Якщо результати метаданих виглядають неправильно, переконайтеся, що маркер дійсний і що вибрана мова інтерфейсу користувача відповідає очікуваній мові метаданих.\n\nРозглядайте маркер як приватні облікові дані та замініть його, якщо вважаєте, що ним випадково поділилися.
categoryRemoveSelectedFromCache=Видалити вибрані категорії з кешу
categoryRemoveCachedTitle=Видалення категорій з кешу
categoryRemoveCachedConfirmMessage=Ви збираєтеся видалити {0} категорій з кешу. Кешовані {1} у цих категоріях також буде видалено. Закладки та записи Зараз дивлюся залишаться. Оновіть кеш цього облікового запису, щоб повернути категорії. Натисніть OK, щоб видалити їх.
categoryRemoveCachedNoSelection=Виберіть одну або кілька кешованих категорій для видалення.
categoryRemoveCachedSuccess=Видалено {0} кешованих категорій і {1} кешованих елементів.
categoryRemoveCachedLiveItems=канали
categoryRemoveCachedVodItems=елементи VOD
categoryRemoveCachedSeriesItems=елементи серіалів та епізоди

autoEmbeddedPlayerUnavailable=Embedded player is unavailable because VLC could not be started. Use an external media player or install VLC correctly, then try again.
configWebServer=Internal Web Server
configWebServerHelpTitle=Internal Web Server
configWebServerHelpText=Use this section to run UIPTV's local web tools.\n\n- The internal web server publishes the web app, browser playback, DRM browser fallback, playlist publishing, and remote sync routes.\n\n- The server port must be free on this machine. If you change it, use the new address anywhere that connects to UIPTV locally.\n\n- Publish M3U8 Playlist creates a local playlist endpoint that other players or tools can open while UIPTV is running.
configVideoPlayersHelp=Configure up to three external video players and choose how UIPTV opens streams.\n\n- Primary, secondary, and tertiary player paths should point to the actual executable for each desktop player.\n\n- The selected default player is the first option UIPTV uses for normal playback. If that player is unavailable, UIPTV can fall back to another configured option.\n\n- Embedded Player keeps playback inside UIPTV when VLC is available. If VLC cannot be started, use an external player or install VLC correctly.\n\n- Web Browser Player is useful for DRM-protected streams or services that only work reliably in a browser.\n\n- Wide View enlarges the embedded-player area, and Resolve redirect chains helps when a provider uses HLS master playlists, short links, or multi-step redirects.
configThemeHelp=Use this section to control UIPTV's built-in appearance.\n\n- Dark Theme switches the application between built-in light and dark palettes.\n\n- Video thumbnails can improve browsing, but disabling them may reduce visual clutter and help slower systems.\n\n- Language changes the UI language for menus, labels, and dialogs.\n\n- UI Zoom changes the scale of the interface. Increase it on high-resolution displays or when you want larger controls and text.
configBrowserCompatibilityWarning=Browser playback may not support every stream format. Continue?

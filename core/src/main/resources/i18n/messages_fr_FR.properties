configVideoPlayersHelpTitle=Lecteurs vidéo
configFiltersHelpTitle=Verrouillage parental
configFiltersHelpText=Utilisez cette section pour masquer les catégories et les chaînes par mot-clé et pour protéger ces règles avec un mot de passe.\n\n• Les mots-clés de catégorie bloqués masquent les noms de catégorie correspondants.\n\n• Les mots-clés des chaînes bloquées masquent les noms de chaînes correspondants.\n\n• Définissez un mot de passe de verrouillage parental si vous ne souhaitez pas que d'autres utilisateurs lisent, modifient ou suspendent temporairement ces filtres.\n\n• Lorsque le verrouillage est actif, UIPTV peut également exiger le mot de passe avant d'ouvrir le contenu que le portail Stalker marque comme censuré.\n\nUtilisez des mots-clés larges avec précaution. Les mots courts ou génériques peuvent cacher beaucoup plus de contenu que prévu.
configThemeHelpTitle=Thème et apparence
configCacheFilteringHelpTitle=Données de cache et de session
configCacheFilteringHelpText=Cette section combine les données de lecture temporaires avec la possibilité de suspendre le filtrage du verrouillage parental pour la configuration actuelle.\n\n• Suspendre les restrictions de verrouillage parental désactive temporairement les règles de blocage sans les supprimer.\n\n• L'expiration du cache contrôle la durée pendant laquelle les données mises en cache liées à la lecture sont conservées avant d'être traitées comme obsolètes.\n\n• Effacer le cache de lecture supprime les données de flux mises en cache et peut être utile lorsque la lecture continue d'utiliser des réponses multimédias obsolètes ou cassées.\n\n• Effacer l'historique des vidéos à regarder maintenant supprime la liste de visualisation en cours enregistrée.\n\n• Recharger le cache de données du compte actualise les données du compte mises en cache lorsque les données côté portail ont changé et que le cache local actuel est obsolète.
configDatabaseSyncHelpTitle=Sauvegarde et restauration
configDatabaseSyncHelpText=Créer une sauvegarde écrit une archive UIPTV complète contenant les métadonnées et le fichier de base de données. L’archive peut être restaurée sur ordinateur ou Android.\n\n• Restaurer la sauvegarde remplace la base de données locale de cette installation par l’archive sélectionnée.\n\n• La version de bureau accepte aussi un ancien fichier UIPTV .db pour la restauration, mais les nouvelles sauvegardes sont enregistrées en .zip.\n\n• Le mode distant effectue toujours une synchronisation unidirectionnelle entre machines et peut inclure les comptes, les favoris et les données de configuration facultatives.\n\n• La synchronisation distante exige que l’autre machine soit joignable et approuvée avant le transfert des données.
configTmdbMetadataHelpTitle=Métadonnées TMDB
configTmdbMetadataHelpText=Ajoutez ici un jeton d'accès en lecture TMDB si vous souhaitez qu'UIPTV récupère des métadonnées plus riches pour les films et les séries.\n\n• Les métadonnées de la TMDB peuvent inclure des titres localisés, des intrigues, des genres, des références artistiques et d'autres détails descriptifs.\n\n• Le jeton est facultatif. UIPTV peut toujours lire du contenu sans lui, mais la couverture des métadonnées sera plus limitée.\n\n• Utilisez le lien du guide si vous avez besoin d'instructions pour créer un compte API TMDB et utilisez le lien du compte pour copier un jeton d'accès en lecture existant.\n\n• Si les résultats des métadonnées semblent erronés, vérifiez que le jeton est valide et que la langue de l'interface utilisateur sélectionnée correspond à la langue des métadonnées attendue.\n\nTraitez le jeton comme un identifiant privé et remplacez-le si vous pensez qu'il a été partagé accidentellement.

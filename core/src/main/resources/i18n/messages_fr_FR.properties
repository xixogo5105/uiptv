configResolveChainAndDeepRedirects=Résoudre les chaînes de redirection
configResolveChainAndDeepRedirectsHelpTitle=Résoudre les chaînes de redirection
configResolveChainAndDeepRedirectsHelp=Cette option demande à l’application de résoudre les chaînes de playlists HLS et de suivre des chaînes de redirection plus profondes avant la lecture.\n\nUtilisez-la lorsqu’un flux arrive sur une playlist maître, des variantes HLS relatives ou une passerelle de redirection que le lecteur ne gère pas bien tout seul.\n\nLaissez-la désactivée si vos flux se lisent déjà correctement sans analyse supplémentaire ou si vous voulez la latence de démarrage la plus faible possible. Son activation peut ajouter un léger délai avant le début de la lecture.
configWideViewHelpTitle=Vue large
configWideViewHelp=La vue large permet à la disposition du lecteur intégré d’utiliser davantage de largeur disponible afin que la zone vidéo paraisse moins serrée.\n\nUtilisez-la sur les grands écrans ou si vous préférez une disposition plus spacieuse pour le lecteur intégré.\n\nLaissez-la désactivée dans les petites fenêtres ou sur les écrans étroits où la disposition standard s’adapte mieux. Ce réglage peut donner au lecteur un aspect plus large, mais il n’est pas destiné à modifier la qualité de lecture.

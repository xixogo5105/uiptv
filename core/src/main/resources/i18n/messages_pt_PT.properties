configVideoPlayersHelpTitle=Reprodutores de vídeo
configFiltersHelpTitle=Bloqueio parental
configFiltersHelpText=Utilize esta secção para ocultar as categorias e os canais por palavra-chave e proteger estas regras com uma palavra-passe.\n\n• As palavras-chave de categorias bloqueadas ocultam os nomes de categorias correspondentes.\n\n• As palavras-chave de canais bloqueados ocultam os nomes de canais correspondentes.\n\n• Defina uma palavra-passe de bloqueio parental se não pretender que outros utilizadores leiam, alterem ou pausem temporariamente estes filtros.\n\n• Quando o bloqueio está ativo, o UIPTV também pode exigir a palavra-passe antes de abrir o conteúdo que o portal Stalker marca como censurado.\n\nUtilize palavras-chave amplas com cuidado. Palavras curtas ou genéricas podem ocultar muito mais conteúdo do que o esperado.
configThemeHelpTitle=Tema e aparência
configCacheFilteringHelpTitle=Dados de cache e de sessão
configCacheFilteringHelpText=Esta secção combina os dados de reprodução temporários com a opção de pausar a filtragem de bloqueio parental para a configuração atual.\n\n• Pausar restrições de bloqueio parental desativa temporariamente as regras de bloqueio sem as eliminar.\n\n• A expiração da cache controla durante quanto tempo os dados armazenados em cache relacionados com a reprodução são mantidos antes de serem tratados como obsoletos.\n\n• A limpeza da cache de reprodução remove os dados de fluxo armazenados em cache e pode ajudar quando a reprodução continua a utilizar respostas de média desatualizadas ou quebradas.\n\n• Limpar histórico de visualização remove agora a lista de visualizações em curso guardada.\n\n• Recarregar cache de dados da conta atualiza os dados da conta armazenados em cache quando os dados do portal são alterados e a cache local atual está desatualizada.
configDatabaseSyncHelpTitle=Cópia de segurança e restauro
configDatabaseSyncHelpText=Criar cópia de segurança grava um arquivo completo do UIPTV com metadados e o ficheiro da base de dados. O arquivo pode ser restaurado no desktop ou no Android.\n\n• Restaurar cópia de segurança substitui a base de dados local desta instalação pelo arquivo de cópia de segurança selecionado.\n\n• O desktop também aceita um ficheiro UIPTV .db antigo para restauro, mas as novas cópias são guardadas como arquivos .zip.\n\n• O modo remoto continua a executar uma sincronização unidirecional entre máquinas e pode incluir contas, marcadores e dados de configuração opcionais.\n\n• A sincronização remota exige que a outra máquina esteja acessível e aprovada antes da transferência dos dados.
configTmdbMetadataHelpTitle=Metadados TMDB
configTmdbMetadataHelpText=Adicione aqui um token de acesso de leitura TMDB se desejar que o UIPTV procure metadados mais ricos para filmes e séries.\n\n• Os metadados do TMDB podem incluir títulos localizados, enredos, géneros, referências de obras de arte e outros detalhes descritivos.\n\n• O token é opcional. O UIPTV ainda pode reproduzir conteúdo sem ele, mas a cobertura de metadados será mais limitada.\n\n• Utilize o link do guia se precisar de instruções para criar uma conta API TMDB e utilize o link da conta para copiar um token de acesso de leitura existente.\n\n• Se os resultados dos metadados parecerem errados, verifique se o token é válido e se o idioma da IU selecionado corresponde ao idioma dos metadados esperado.\n\nTrate o token como uma credencial privada e substitua-o se acreditar que foi partilhado acidentalmente.

configResolveChainAndDeepRedirects=Resolver cadeias de redireccionamento
configResolveChainAndDeepRedirectsHelpTitle=Resolver cadeias de redireccionamento
configResolveChainAndDeepRedirectsHelp=Esta opção faz com que a aplicação resolva cadeias de listas HLS e siga redireccionamentos mais profundos antes da reprodução.\n\nUse-a quando um stream termina numa lista mestre, em variantes HLS relativas ou num gateway de redireccionamento que o leitor não trata bem por si só.\n\nDeixe-a desactivada se os seus streams já reproduzem correctamente sem sondagem adicional ou se pretende a menor latência possível no arranque. Activá-la pode acrescentar um pequeno atraso antes do início da reprodução.
configWideViewHelpTitle=Vista ampla
configWideViewHelp=A vista ampla faz com que a disposição do leitor incorporado use mais da largura disponível, para que a área de vídeo pareça menos apertada.\n\nUse-a em ecrãs maiores ou quando preferir uma disposição mais espaçosa para o leitor incorporado.\n\nDeixe-a desactivada em janelas pequenas ou ecrãs estreitos, onde a disposição padrão se ajusta melhor. Esta definição pode fazer o leitor parecer mais largo, mas não se destina a alterar a qualidade da reprodução.

<!DOCTYPE html>
<html lang="en">
<head>
    <title>UIPTV Web - MyFlix View</title>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control">
    <meta content="no-cache" http-equiv="Pragma">
    <meta content="0" http-equiv="Expires">
    <link href="/manifest.json" rel="manifest">
    <meta content="#212529" name="theme-color">
    <link href="/icon.ico" rel="icon" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css" rel="stylesheet">
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" rel="stylesheet">
    <script crossorigin="anonymous"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="/css/shared-player.css?v=20260311d" rel="stylesheet">
    <link href="/css/myflix.css?v=20260224a" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
    <script src="/javascript/playback-utils.js?v=20260312a"></script>
    <script src="/javascript/player-controls.js?v=20260310a"></script>
    <script src="/javascript/shared-player.js?v=20260311c"></script>
    <script src="/javascript/bookmark-watch-utils.js?v=20260310d"></script>
</head>
<body>
<div class="myflix-app" id="app">
    <header class="nf-topbar">
        <div @click="resetApp" class="nf-brand" title="Home">
            <img alt="UIPTV" src="/icon.ico">
            <span>UIPTV</span>
        </div>
        <div class="nf-topbar-middle">
            <div class="nf-topbar-left-spacer"></div>
            <div class="uiptv-shared-player" data-uiptv-shared-player data-variant="compact"></div>
        </div>
        <div class="nf-actions">
            <div class="nf-search nf-search-top">
                <i class="bi bi-search"></i>
                <input id="searchInput" placeholder="Search..." type="text" v-model="searchQuery">
            </div>
            <button :title="'Theme: ' + theme" @click="toggleTheme" class="nf-action-btn">
                <i :class="themeIcon" class="bi"></i>
            </button>
            <button @click="clearWebCacheAndReload" class="nf-action-btn" title="Clear cache and reload">
                <i class="bi bi-arrow-repeat"></i>
            </button>
            <button @click="showBookmarkModal = true" class="nf-action-btn" title="Bookmark this app">
                <i class="bi bi-bookmark-plus"></i>
            </button>
            <a class="nf-action-btn" href="https://github.com/xixogo5105/uiptv" target="_blank" title="Help">
                <i class="bi bi-question-circle"></i>
            </a>
            <a class="nf-action-btn" download href="/bookmarks.m3u8" title="Download Favorites Playlist">
                <i class="bi bi-download"></i>
            </a>
            <a class="nf-action-btn" download href="/iptv.m3u8" title="Download Published Playlist">
                <i class="bi bi-cloud-arrow-down"></i>
            </a>
            <a class="nf-action-btn" href="/index.html" title="Switch to Classic View">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </a>
        </div>
    </header>

    <main :class="{ 'detail-mode': isDetailPageOpen, 'series-detail-mode': isSeriesDetailOpen }" class="nf-main">
        <div anchor="playerAnchor"></div>
        <section class="nf-inline-player" ref="playerInlineRef" v-if="isPlaying">
            <div class="nf-inline-player-frame" ref="playerModalFrame">
                <div class="nf-inline-player-media">
                    <video
                            :key="playerKey"
                            autoplay
                            class="nf-video"
                            controls
                            ref="videoPlayerModal"
                            v-if="!isYoutube"
                    ></video>
                    <iframe
                            :src="youtubeSrc"
                            allow="autoplay; encrypted-media"
                            allowfullscreen
                            class="nf-video"
                            frameborder="0"
                            v-if="isYoutube"
                    ></iframe>
                    <div class="nf-player-loading" v-if="playerLoading && isPlaying">
                        <span aria-hidden="true" class="spinner-border text-light" role="status"></span>
                    </div>
                </div>
            </div>
        </section>
        <section class="nf-library">
            <template v-if="!isDetailPageOpen">
                <div class="nf-row nf-row-pinned">
                    <div class="nf-row-title">
                        <h5 class="nf-section-title"><span>Favorites</span></h5>
                        <div aria-label="Favorite categories" class="nf-bookmark-tabs" role="tablist">
                            <button
                                    :class="{ active: String(selectedBookmarkCategoryId || '') === String(category.id || '') }"
                                    :key="'myflix-bookmark-category-' + (category.id || 'all')"
                                    @click="selectBookmarkCategory(category.id)"
                                    class="nf-bookmark-tab"
                                    v-for="category in bookmarkCategoryTabs">
                                {{ category.name }}
                            </button>
                        </div>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-saved', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-saved">
                            <button :key="'saved-server-' + bookmark.dbId" @click="playBookmark(bookmark)"
                                    class="nf-card nf-card-media" v-for="bookmark in filteredBookmarks">
                                <img :src="bookmark.logo" @error="mediaImageError" @load="mediaImageLoad"
                                     alt="bookmark image" class="nf-media-image" v-if="bookmark.logo">
                                <div :class="{ show: !bookmark.logo }" class="nf-media-fallback">
                                    {{ bookmark.channelName }}
                                </div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">{{ bookmark.channelName }}</div>
                                <div class="nf-card-subtitle nf-media-subtitle"><small>{{ bookmark.accountName
                                    }}</small></div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('bookmarks')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading favorites...
                            </div>
                            <div class="nf-empty-card" v-else-if="filteredBookmarks.length === 0">No favorites found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-saved', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell">
                    <div class="nf-row-title">
                        <h5 class="nf-section-title"><span>Watching Now</span></h5>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-watching-now', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-watching-now">
                            <button
                                    :class="{ active: selectedWatchingNowKey === row.key }"
                                    :key="'watching-now-' + row.key"
                                    @click="openWatchingNowSeriesDetail(row)"
                                    class="nf-card nf-card-media"
                                    v-for="row in filteredWatchingNowRows">
                                <img :src="row.seriesPoster" @error="mediaImageError" @load="mediaImageLoad"
                                     alt="series poster" class="nf-media-image" loading="lazy" v-if="row.seriesPoster">
                                <div :class="{ show: !row.seriesPoster }" class="nf-media-fallback">{{ row.seriesTitle
                                    }}
                                </div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">{{ row.seriesTitle }}</div>
                                <div class="nf-card-subtitle nf-media-subtitle"><small>{{ row.accountName }}</small>
                                </div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('watchingNow')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading Watching Now...
                            </div>
                            <div class="nf-empty-card" v-else-if="filteredWatchingNowRows.length === 0">No currently
                                watched series found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-watching-now', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell">
                    <div class="nf-row-title">
                        <h5 class="nf-section-title"><span>Watching VOD</span></h5>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-watching-vod', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-watching-vod">
                            <button
                                    :class="{ active: selectedWatchingNowVodKey === row.key }"
                                    :key="'watching-vod-' + row.key"
                                    @click="playWatchingNowVodRow(row)"
                                    class="nf-card nf-card-media"
                                    v-for="row in filteredWatchingNowVodRows">
                                <img :src="row.vodLogo" @error="mediaImageError" @load="mediaImageLoad" alt="vod poster"
                                     class="nf-media-image" loading="lazy" v-if="row.vodLogo">
                                <div :class="{ show: !row.vodLogo }" class="nf-media-fallback">{{ row.vodName }}</div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">{{ row.vodName }}</div>
                                <div class="nf-card-subtitle nf-media-subtitle"><small>{{ row.accountName }}</small>
                                </div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('watchingNowVod')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading Watching VOD...
                            </div>
                            <div class="nf-empty-card" v-else-if="filteredWatchingNowVodRows.length === 0">No currently
                                watched VOD found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-watching-vod', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell">
                    <div class="nf-row-title">
                        <div aria-label="Account types" class="nf-bookmark-tabs nf-account-type-tabs" role="tablist">
                            <button :class="{ active: selectedAccountTypeFilter === 'all' }" @click="selectAccountTypeFilter('all')"
                                    class="nf-bookmark-tab">All
                            </button>
                            <button :class="{ active: selectedAccountTypeFilter === 'stalker' }" @click="selectAccountTypeFilter('stalker')"
                                    class="nf-bookmark-tab">Stalker Portal
                            </button>
                            <button :class="{ active: selectedAccountTypeFilter === 'xtreme' }" @click="selectAccountTypeFilter('xtreme')"
                                    class="nf-bookmark-tab">Xtreme
                            </button>
                            <button :class="{ active: selectedAccountTypeFilter === 'm3u' }" @click="selectAccountTypeFilter('m3u')"
                                    class="nf-bookmark-tab">M3u
                            </button>
                            <button :class="{ active: selectedAccountTypeFilter === 'rss' }" @click="selectAccountTypeFilter('rss')"
                                    class="nf-bookmark-tab">RSS
                            </button>
                        </div>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-accounts', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-accounts">
                            <button
                                    :class="{ active: String(selectedAccountId || '') === String(account.dbId || '') }"
                                    :key="'myflix-account-' + account.dbId"
                                    @click="selectAccount(account)"
                                    class="nf-card nf-card-title-only"
                                    v-for="account in filteredAccounts">
                                <div class="nf-card-title nf-account-title">
                                    <svg :viewBox="resolvePinSvg(account).viewBox" aria-hidden="true"
                                         class="nf-pin-icon" v-if="isPinnedAccount(account)">
                                        <path :d="resolvePinSvg(account).stemPath"
                                              :fill="resolvePinSvg(account).stemFill"></path>
                                        <path :d="resolvePinSvg(account).headPath"
                                              :fill="resolvePinSvg(account).headFill"></path>
                                    </svg>
                                    <span>{{ account.accountName }}</span>
                                </div>
                            </button>
                            <div class="nf-empty-card" v-if="filteredAccounts.length === 0">No accounts for this
                                filter.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-accounts', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell" v-if="selectedAccount">
                    <div class="nf-row-title">
                        <div class="nf-title-with-back">
                            <button :aria-disabled="isModeState('itv', 'categories') ? 'true' : 'false'" :class="{ ghost: isModeState('itv', 'categories') }"
                                    @click="!isModeState('itv', 'categories') && goBackMode('itv')" class="nf-title-back"
                                    title="Back">
                                <i class="bi bi-arrow-left-circle"></i>
                            </button>
                            <h5 class="nf-section-title"><span>Live TV</span></h5>
                        </div>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-live', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-live">
                            <button :key="'itv-cat-' + category.dbId"
                                    @click="loadModeChannels('itv', category.dbId)" class="nf-card"
                                    v-for="category in filteredModeCategories('itv')" v-if="isModeState('itv','categories')">
                                <div class="nf-card-icon"><i class="bi bi-folder-fill"></i></div>
                                <div class="nf-card-title">{{ category.title }}</div>
                            </button>
                            <button :key="'itv-ch-' + (channel.dbId || channel.channelId || channel.id)" @click="handleModeSelection('itv', channel)"
                                    class="nf-card nf-card-media"
                                    v-for="channel in visibleModeChannels('itv')" v-if="isModeState('itv','channels')">
                                <img :src="channel.logo" @error="mediaImageError" @load="mediaImageLoad" alt="channel image"
                                     class="nf-media-image" loading="lazy" v-if="channel.logo">
                                <div :class="{ show: !channel.logo }" class="nf-media-fallback">{{ channel.name }}</div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">{{ channel.name }}</div>
                            </button>
                            <button @click="loadMoreModeChannels('itv')"
                                    class="nf-card nf-load-more-card" v-if="isModeState('itv','channels') && hasMoreModeChannels('itv')">
                                <div class="nf-card-icon"><i class="bi bi-chevron-down"></i></div>
                                <div class="nf-card-title">Load More</div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('itv')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading...
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('itv','categories') && filteredModeCategories('itv').length === 0">No categories found.
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('itv','channels') && filteredModeChannels('itv').length === 0">No channels found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-live', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell" v-if="showVodSeriesSections">
                    <div class="nf-row-title">
                        <div class="nf-title-with-back">
                            <button :aria-disabled="isModeState('vod', 'categories') ? 'true' : 'false'" :class="{ ghost: isModeState('vod', 'categories') }"
                                    @click="!isModeState('vod', 'categories') && goBackMode('vod')" class="nf-title-back"
                                    title="Back">
                                <i class="bi bi-arrow-left-circle"></i>
                            </button>
                            <h5 class="nf-section-title"><span>Movies</span></h5>
                        </div>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-vod', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-vod">
                            <button :key="'vod-cat-' + category.dbId"
                                    @click="loadModeChannels('vod', category.dbId)" class="nf-card"
                                    v-for="category in filteredModeCategories('vod')" v-if="isModeState('vod','categories')">
                                <div class="nf-card-icon"><i class="bi bi-folder-fill"></i></div>
                                <div class="nf-card-title">{{ category.title }}</div>
                            </button>
                            <button :key="'vod-ch-' + (channel.dbId || channel.channelId || channel.id)" @click="handleModeSelection('vod', channel)"
                                    class="nf-card nf-card-media"
                                    v-for="channel in visibleModeChannels('vod')" v-if="isModeState('vod','channels')">
                                <img :src="channel.logo" @error="mediaImageError" @load="mediaImageLoad" alt="vod image"
                                     class="nf-media-image" loading="lazy" v-if="channel.logo">
                                <div :class="{ show: !channel.logo }" class="nf-media-fallback">{{ channel.name }}</div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">{{ channel.name }}</div>
                            </button>
                            <button @click="loadMoreModeChannels('vod')"
                                    class="nf-card nf-load-more-card" v-if="isModeState('vod','channels') && hasMoreModeChannels('vod')">
                                <div class="nf-card-icon"><i class="bi bi-chevron-down"></i></div>
                                <div class="nf-card-title">Load More</div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('vod')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading...
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('vod','categories') && filteredModeCategories('vod').length === 0">No categories found.
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('vod','channels') && filteredModeChannels('vod').length === 0">No VOD items found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-vod', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

                <div class="nf-row nf-row-shell" v-if="showVodSeriesSections">
                    <div class="nf-row-title">
                        <div class="nf-title-with-back">
                            <button :aria-disabled="isModeState('series', 'categories') ? 'true' : 'false'" :class="{ ghost: isModeState('series', 'categories') }"
                                    @click="!isModeState('series', 'categories') && goBackMode('series')" class="nf-title-back"
                                    title="Back">
                                <i class="bi bi-arrow-left-circle"></i>
                            </button>
                            <h5 class="nf-section-title"><span>Series</span></h5>
                        </div>
                    </div>
                    <div class="nf-track-wrap">
                        <button class="nf-edge-btn left" onclick="scrollRow('row-series', -1)" type="button"><i
                                class="bi bi-chevron-left"></i></button>
                        <div class="nf-strip" id="row-series">
                            <button :key="'series-cat-' + category.dbId"
                                    @click="loadModeChannels('series', category.dbId)"
                                    class="nf-card" v-for="category in filteredModeCategories('series')"
                                    v-if="isModeState('series','categories')">
                                <div class="nf-card-icon"><i class="bi bi-folder-fill"></i></div>
                                <div class="nf-card-title">{{ category.title }}</div>
                            </button>
                            <button :key="'series-ch-' + (channel.dbId || channel.channelId || channel.id)"
                                    @click="handleModeSelection('series', channel)"
                                    class="nf-card nf-card-media"
                                    v-for="channel in visibleModeChannels('series')" v-if="isModeState('series','channels')">
                                <img :src="channel.logo" @error="mediaImageError" @load="mediaImageLoad" alt="series image"
                                     class="nf-media-image" loading="lazy" v-if="channel.logo">
                                <div :class="{ show: !channel.logo }" class="nf-media-fallback">{{ channel.name }}</div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">
                                    {{ channel.name }}
                                    <span class="badge bg-primary ms-2" v-if="channel.watched">IN PROGRESS</span>
                                </div>
                            </button>
                            <button @click="loadMoreModeChannels('series')"
                                    class="nf-card nf-load-more-card" v-if="isModeState('series','channels') && hasMoreModeChannels('series')">
                                <div class="nf-card-icon"><i class="bi bi-chevron-down"></i></div>
                                <div class="nf-card-title">Load More</div>
                            </button>
                            <button :key="'series-ep-' + (episode.channelId || episode.id)"
                                    @click="handleModeSelection('series', episode)"
                                    class="nf-card nf-card-media"
                                    v-for="episode in visibleModeEpisodes('series')" v-if="isModeState('series','episodes')">
                                <img :src="episode.logo" @error="mediaImageError" @load="mediaImageLoad" alt="episode image"
                                     class="nf-media-image" loading="lazy" v-if="episode.logo">
                                <div :class="{ show: !episode.logo }" class="nf-media-fallback">{{ episode.name }}</div>
                                <div class="nf-media-gradient"></div>
                                <div class="nf-card-title nf-media-title">
                                    {{ episode.name }}
                                    <span class="badge bg-primary ms-2" v-if="episode.watched">WATCHED</span>
                                </div>
                            </button>
                            <button @click="loadMoreModeEpisodes('series')"
                                    class="nf-card nf-load-more-card" v-if="isModeState('series','episodes') && hasMoreModeEpisodes('series')">
                                <div class="nf-card-icon"><i class="bi bi-chevron-down"></i></div>
                                <div class="nf-card-title">Load More</div>
                            </button>
                            <div class="nf-empty-card" v-if="isModeLoading('series')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading...
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('series','categories') && filteredModeCategories('series').length === 0">No categories found.
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('series','channels') && filteredModeChannels('series').length === 0">No series found.
                            </div>
                            <div class="nf-empty-card"
                                 v-else-if="isModeState('series','episodes') && filteredModeEpisodes('series').length === 0">No episodes found.
                            </div>
                        </div>
                        <button class="nf-edge-btn right" onclick="scrollRow('row-series', 1)" type="button"><i
                                class="bi bi-chevron-right"></i></button>
                    </div>
                </div>

            </template>

            <template v-if="isVodDetailOpen">
                <div class="nf-row">
                    <div class="nf-row-title">
                        <div class="nf-title-with-back">
                            <button @click="goBackMode('vod')" class="nf-title-back" title="Back">
                                <i class="bi bi-arrow-left-circle"></i>
                            </button>
                            <h5 class="nf-section-title">
                                <span>{{ getVodDetail() ? (getVodDetail().name || 'Movies') : 'Movies' }}</span></h5>
                        </div>
                    </div>
                    <div class="nf-series-page">
                        <div class="nf-series-hero">
                            <div class="nf-series-poster-wrap">
                                <img :src="getVodDetail().cover" @error="mediaImageError"
                                     @load="mediaImageLoad" alt="vod poster" class="nf-series-poster"
                                     v-if="getVodDetail() && getVodDetail().cover">
                                <div class="nf-series-poster-fallback" v-else>No Poster</div>
                            </div>
                            <div class="nf-series-meta">
                                <p v-if="getVodDetail() && getVodDetail().plot">{{ getVodDetail().plot }}</p>
                                <a
                                        :href="getImdbUrl('vod')"
                                        class="nf-imdb-rating-pill"
                                        rel="noopener noreferrer"
                                        target="_blank"
                                        title="Open on IMDb"
                                        v-if="getImdbUrl('vod')">
                                    <img alt="IMDb"
                                         class="nf-imdb-logo"
                                         src="https://upload.wikimedia.org/wikipedia/commons/6/69/IMDB_Logo_2016.svg">
                                    <span class="nf-imdb-rating-value">{{ getVodDetail() ? (getVodDetail().rating || 'N/A') : 'N/A'
                                        }}</span>
                                </a>
                                <div class="nf-meta-grid">
                                    <div><strong>Genre:</strong>
                                        {{ getVodDetail() ? (getVodDetail().genre || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Release:</strong>
                                        {{ getVodDetail() ? (getVodDetail().releaseDate || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Director:</strong>
                                        {{ getVodDetail() ? (getVodDetail().director || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Cast:</strong>
                                        {{ getVodDetail() ? (getVodDetail().cast || 'N/A') : 'N/A' }}
                                    </div>
                                </div>
                                <button @click="playVodFromDetail" class="nf-vod-play-btn">
                                    <i class="bi bi-play-circle-fill"></i>
                                    Play Video
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template v-if="isSeriesDetailOpen">
                <div class="nf-row">
                    <div class="nf-row-title">
                        <div class="nf-title-with-back">
                            <button @click="goBackMode('series')" class="nf-title-back" title="Back">
                                <i class="bi bi-arrow-left-circle"></i>
                            </button>
                            <h5 class="nf-section-title">
                                <span>{{ getSeriesDetail() ? (getSeriesDetail().name || 'Series') : 'Series' }}</span>
                            </h5>
                        </div>
                    </div>
                    <div class="nf-series-page">
                        <div class="nf-series-hero">
                            <div class="nf-series-poster-wrap">
                                <img :src="getSeriesDetail().cover" @error="mediaImageError"
                                     @load="mediaImageLoad" alt="series poster" class="nf-series-poster"
                                     v-if="getSeriesDetail() && getSeriesDetail().cover">
                                <div class="nf-series-poster-fallback" v-else>No Poster</div>
                            </div>
                            <div class="nf-series-meta">
                                <p v-if="getSeriesDetail() && getSeriesDetail().plot">{{ getSeriesDetail().plot }}</p>
                                <a
                                        :href="getImdbUrl()"
                                        class="nf-imdb-rating-pill"
                                        rel="noopener noreferrer"
                                        target="_blank"
                                        title="Open on IMDb"
                                        v-if="getImdbUrl()">
                                    <img alt="IMDb"
                                         class="nf-imdb-logo"
                                         src="https://upload.wikimedia.org/wikipedia/commons/6/69/IMDB_Logo_2016.svg">
                                    <span class="nf-imdb-rating-value">{{ getSeriesDetail() ? (getSeriesDetail().rating || 'N/A') : 'N/A'
                                        }}</span>
                                </a>
                                <div class="nf-meta-grid">
                                    <div><strong>Genre:</strong>
                                        {{ getSeriesDetail() ? (getSeriesDetail().genre || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Release:</strong>
                                        {{ getSeriesDetail() ? (getSeriesDetail().releaseDate || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Director:</strong>
                                        {{ getSeriesDetail() ? (getSeriesDetail().director || 'N/A') : 'N/A' }}
                                    </div>
                                    <div><strong>Cast:</strong>
                                        {{ getSeriesDetail() ? (getSeriesDetail().cast || 'N/A') : 'N/A' }}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="nf-row-title mt-3 mb-2">
                            <h6 class="nf-episodes-title">Episodes</h6>
                        </div>
                        <div class="nf-empty-card mb-2" v-if="isModeLoading('series')">
                            <span aria-hidden="true" class="spinner-border spinner-border-sm me-2" role="status"></span>
                            Loading artwork and metadata...
                        </div>
                        <div class="nf-season-tabs" v-if="seriesSeasonTabs.length > 0">
                            <button
                                    :class="{ active: selectedSeriesSeason === tab.value }"
                                    :key="'season-tab-' + tab.value"
                                    @click="selectSeriesSeason(tab.value)"
                                    class="nf-season-tab"
                                    v-for="tab in seriesSeasonTabs">
                                {{ tab.label }}
                            </button>
                        </div>
                        <div class="nf-episode-list">
                            <div class="nf-empty-card" v-if="isModeLoading('series')">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm me-2"
                                      role="status"></span>
                                Loading episodes...
                            </div>
                            <button
                                    :data-watched="episode.watched ? '1' : '0'"
                                    :id="getSeriesDetailEpisodeAnchorId(episode)"
                                    :key="'series-detail-ep-' + (episode.channelId || episode.id)"
                                    @click="handleModeSelection('series', episode)"
                                    class="nf-episode-row"
                                    v-for="(episode, idx) in visibleSeriesDetailEpisodes">
                                <div class="nf-episode-index">{{ idx + 1 }}</div>
                                <div class="nf-episode-thumb-wrap">
                                    <img :src="episode.logo" @error="mediaImageError" @load="mediaImageLoad"
                                         alt="episode image" class="nf-episode-thumb" v-if="episode.logo">
                                    <div :class="{ show: !episode.logo }" class="nf-episode-thumb-fallback">
                                        {{ episode.name }}
                                    </div>
                                </div>
                                <div class="nf-episode-main">
                                    <div class="nf-episode-title">
                                        {{ getEpisodeDisplayTitle(episode, idx) }}
                                        <span class="badge bg-primary ms-2" v-if="episode.watched">WATCHED</span>
                                    </div>
                                    <div class="nf-episode-sub">
                                        {{ episode.description || (episode.releaseDate ? ('Release: ' + episode.releaseDate) : (episode.channelId ? ('ID ' + episode.channelId) : 'Tap to play'))
                                        }}
                                    </div>
                                </div>
                                <div class="nf-episode-play">
                                    <i class="bi bi-play-circle-fill"></i>
                                </div>
                            </button>
                            <button @click="loadMoreSeriesDetailEpisodes" class="nf-episode-load-more"
                                    v-if="hasMoreSeriesDetailEpisodes">
                                Load more episodes
                            </button>
                            <div class="nf-empty-card" v-if="filteredSeriesDetailEpisodes.length === 0">No episodes
                                found in this season.
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </section>
    </main>

    <div aria-label="Loading" aria-live="polite" class="nf-loading-overlay" role="status" v-if="isBusy && !isPlaying && !playerLoading">
        <div class="nf-loading-box">
            <div class="spinner-border text-light" role="status"></div>
            <div class="nf-loading-text">{{ busyMessage }}</div>
        </div>
    </div>


    <div class="modal-backdrop fade show" v-if="showBookmarkModal"></div>
    <div class="modal fade show d-block" tabindex="-1" v-if="showBookmarkModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">How to Bookmark App</h5>
                    <button @click="showBookmarkModal = false" class="btn-close btn-close-white" type="button"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Chrome (Desktop):</strong> Press Ctrl+D (Cmd+D on Mac).</p>
                    <p><strong>Chrome (Android):</strong> Menu (three dots) > Add to Home screen.</p>
                    <p><strong>Safari (iOS):</strong> Share > Add to Home Screen.</p>
                    <p><strong>Safari (Mac):</strong> Press Cmd+D.</p>
                </div>
                <div class="modal-footer border-secondary">
                    <button @click="showBookmarkModal = false" class="btn btn-secondary" type="button">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/javascript/myflix.js?v=20260312a"></script>
<script>
    function scrollRow(id, direction) {
        const row = document.getElementById(id);
        if (!row) return;
        const amount = Math.max(240, Math.floor(row.clientWidth * 0.75));
        row.scrollBy({left: amount * direction, behavior: 'smooth'});
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
        });
    }
</script>
</body>
</html>

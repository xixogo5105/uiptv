<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#212529">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/icon.ico">
    <title>UIPTV Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/shared-player.css?v=20260311d">
    <link rel="stylesheet" href="/css/player.css?v=20260311e">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
    <script src="/javascript/playback-utils.js?v=20260310a"></script>
    <script src="/javascript/player-controls.js?v=20260310a"></script>
</head>
<body>
<div id="app">
    <div id="topbar">
        <a class="brand" href="/index.html">
            <img src="/icon.ico" alt="UIPTV">
            <span>UIPTV Player</span>
        </a>
        <div class="uiptv-shared-player" data-uiptv-shared-player data-variant="stacked" aria-live="polite"></div>
        <div class="top-actions">
            <div class="top-actions-main">
                <button id="theme-btn" class="top-action" type="button" title="Theme: system">
                    <i id="theme-icon" class="bi bi-display"></i>
                    <span>Theme</span>
                </button>
                <button id="cache-reload-btn" class="top-action" type="button" title="Clear cache and reload">
                    <i class="bi bi-arrow-repeat"></i>
                    <span>Reload</span>
                </button>
                <a class="top-action" href="/index.html" title="Home">
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                    <span>Home</span>
                </a>
                <a class="top-action" href="/myflix.html" title="MyFlix">
                    <i class="bi bi-film"></i>
                    <span>MyFlix</span>
                </a>
            </div>
        </div>
    </div>
    <div id="content">
        <aside id="playlist-panel" hidden>
            <div id="playlist-header">Playlist</div>
            <div id="playlist-items" role="list"></div>
        </aside>
        <div id="player-stage">
            <video id="video" controls autoplay playsinline></video>
            <div id="status">Preparing playback...</div>
        </div>
    </div>
</div>
    <script src="/javascript/shared-player.js?v=20260311b"></script>
    <script>
        window.UIPTVSharedPlayer && window.UIPTVSharedPlayer.mount(document.querySelector('[data-uiptv-shared-player]'), {variant: 'stacked'});
    </script>
    <script src="/javascript/player.js?v=20260311e"></script>
</body>
</html>

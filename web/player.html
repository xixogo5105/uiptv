<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#212529">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/icon.ico">
    <title>UIPTV Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/player.css?v=20260310b">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@5/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
    <script src="/javascript/playback-utils.js?v=20260310a"></script>
    <script src="/javascript/player-controls.js?v=20260310a"></script>
</head>
<body>
<div id="app">
    <div id="topbar">
        <a class="brand" href="/index.html">
            <img src="/icon.ico" alt="UIPTV">
            <span>UIPTV Player</span>
        </a>
        <div id="media-meta" aria-live="polite">
            <div id="media-title">
                <span id="media-title-text"></span>
                <span id="media-loading-spinner" class="spinner-border spinner-border-sm text-info" role="status" aria-hidden="true" hidden></span>
            </div>
            <div id="media-subtitle"></div>
        </div>
        <div class="top-actions">
            <button id="theme-btn" class="top-action" type="button" title="Theme: system">
                <i id="theme-icon" class="bi bi-display"></i>
                <span>Theme</span>
            </button>
            <div class="top-action-menu">
                <button id="audio-menu-btn" class="top-action" type="button" title="Audio tracks">
                    <i class="bi bi-music-note-list"></i>
                    <span id="audio-label">Audio</span>
                </button>
                <div id="audio-menu" class="top-menu" hidden></div>
            </div>
            <div class="top-action-menu">
                <button id="subtitle-menu-btn" class="top-action" type="button" title="Subtitles">
                    <i class="bi bi-badge-cc"></i>
                    <span id="subtitle-label">Subtitles</span>
                </button>
                <div id="subtitle-menu" class="top-menu" hidden></div>
            </div>
            <div class="top-action-menu">
                <button id="quality-menu-btn" class="top-action" type="button" title="Playback quality">
                    <i class="bi bi-badge-hd"></i>
                    <span id="quality-label">Quality</span>
                </button>
                <div id="quality-menu" class="top-menu" hidden></div>
            </div>
            <div id="resolution-pill" class="top-action top-action-indicator" title="Current stream resolution">
                <i class="bi bi-aspect-ratio"></i>
                <span id="resolution-label">Resolution</span>
            </div>
            <a class="top-action" href="/index.html" title="Home">
                <i class="bi bi-grid-3x3-gap-fill"></i>
                <span>Home</span>
            </a>
            <a class="top-action" href="/myflix.html" title="MyFlix">
                <i class="bi bi-film"></i>
                <span>MyFlix</span>
            </a>
            <button id="repeat-btn" class="top-action" type="button" title="Auto-reload when stream ends">
                <i class="bi bi-repeat"></i>
                <span>Repeat</span>
            </button>
            <button id="pip-btn" class="top-action" type="button" title="Picture in Picture">
                <i class="bi bi-pip"></i>
                <span>PIP</span>
            </button>
            <button id="reload-btn" class="top-action" type="button" title="Hard reload">
                <i class="bi bi-arrow-repeat"></i>
                <span>Reload</span>
            </button>
            <button id="stop-btn" class="top-action" type="button" title="Stop playback">
                <i class="bi bi-stop-circle"></i>
                <span>Stop</span>
            </button>
        </div>
    </div>
    <div id="content">
        <aside id="playlist-panel" hidden>
            <div id="playlist-header">Playlist</div>
            <div id="playlist-items" role="list"></div>
        </aside>
        <div id="player-stage">
            <video id="video" controls autoplay playsinline></video>
            <div id="status">Preparing playback...</div>
        </div>
    </div>
</div>
    <script src="/javascript/player.js?v=20260310c"></script>
</body>
</html>

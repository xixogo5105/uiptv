name: Mobile Android
env:
  ARTIFACT_RETENTION_DAYS: 7

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore API 24 libmpv AAR
        id: libmpv-aar-cache
        uses: actions/cache@v5
        with:
          path: mobile/androidApp/libs/libmpv-android-api24.aar
          key: libmpv-api24-aar-${{ runner.os }}-v1-${{ hashFiles('scripts/build-mobile-with-libmpv.sh', 'mobile/androidApp/build.gradle.kts') }}
          restore-keys: |
            libmpv-api24-aar-${{ runner.os }}-v1-

      - name: Package Android debug APK
        env:
          UIPTV_LIBMPV_REUSE_AAR: "1"
        run: ./scripts/build-mobile-with-libmpv.sh :androidApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: uiptv-mobile-debug-apk
          path: mobile/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

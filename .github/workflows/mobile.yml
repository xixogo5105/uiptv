name: Mobile Android
env:
  ARTIFACT_RETENTION_DAYS: 7

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Android checks
        working-directory: mobile
        run: ./gradlew :shared:allTests :shared:koverVerify :androidApp:assembleDebug :androidApp:compileDebugAndroidTestKotlin

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: uiptv-mobile-debug-apk
          path: mobile/androidApp/build/outputs/apk/debug/androidApp-debug.apk
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

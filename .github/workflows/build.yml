name: Build, Package and Release
permissions:
  contents: read
env:
  ARTIFACT_RETENTION_DAYS: 7

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports/**
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  build_windows:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            profile: windows-x86_64
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build Windows package
        run: mvn -B clean package -P ${{ matrix.profile }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-windows-${{ matrix.arch }}
          path: target/dist/*
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}


  build_mac:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            profile: mac-x86_64
          - arch: aarch64
            profile: mac-aarch64
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build macOS package
        run: mvn -B clean package -P ${{ matrix.profile }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-macos-${{ matrix.arch }}
          path: target/dist/*
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}


  build_linux:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Detect RPM packaging support
        id: rpm_support
        shell: bash
        run: |
          if jpackage --type rpm --help >/dev/null 2>&1; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            echo "RPM packaging is supported on this runner."
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "RPM packaging is NOT supported on this runner. Skipping RPM artifact."
          fi

      - name: Build DEB package
        run: mvn -B clean package -P linux-x86_64,pkg-deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-linux-x86_64-deb
          path: target/dist/*.deb
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Clean dist directory
        run: rm -rf target/dist/*

      - name: Build RPM package
        if: steps.rpm_support.outputs.supported == 'true'
        run: mvn -B clean package -P linux-x86_64,pkg-rpm

      - name: Upload RPM artifact
        if: steps.rpm_support.outputs.supported == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-linux-x86_64-rpm
          path: target/dist/*.rpm
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Clean dist directory
        run: rm -rf target/dist/*

      - name: Build AppImage package
        run: mvn -B clean package -P linux-x86_64,pkg-app-image

      - name: Archive app-image artifact (x86_64)
        shell: bash
        run: |
          tar -C target/dist -czf target/UIPTV-linux-x86_64-app-image.tar.gz .

      - name: Upload AppImage artifact (x86_64)
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-linux-x86_64-app-image
          path: target/UIPTV-linux-x86_64-app-image.tar.gz
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Clean dist directory
        run: rm -rf target/dist/*

      # NOTE:
      # Do not build linux-aarch64 app-image on an x86_64 runner.
      # jpackage app-image launchers are native and not cross-compiled.

  build_linux_arm64_appimage:
    if: github.event_name == 'workflow_dispatch' && vars.ENABLE_ARM64_RUNNER == 'true'
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build AppImage package (aarch64)
        run: mvn -B clean package -P linux-aarch64,pkg-app-image

      - name: Archive app-image artifact (aarch64)
        shell: bash
        run: |
          tar -C target/dist -czf target/UIPTV-linux-aarch64-app-image.tar.gz .

      - name: Upload AppImage artifact (aarch64)
        uses: actions/upload-artifact@v7
        with:
          name: UIPTV-linux-aarch64-app-image
          path: target/UIPTV-linux-aarch64-app-image.tar.gz
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
